function drawDashboardChart(trends) {
  const canvas = document.getElementById("dashboardChart");
  if (!canvas || trends.length < 2) return;

  const isPrice = dashboardMetric === "price";
  const labels = trends.map(t => t.snapshot_date.slice(5));
  const data = trends.map(t => isPrice ? t.avg_price_ft : t.listing_count);
  const color = isPrice ? "#f59e0b" : "#3b82f6";

  const W = canvas.parentElement.offsetWidth;
  const H = 200;
  canvas.width = W;
  canvas.height = H;

  const ctx = canvas.getContext("2d");
  const pad = { top: 20, right: 16, bottom: 28, left: 44 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;

  const minV = Math.max(0, Math.min(...data) - 2);
  const maxV = Math.max(...data) + 2;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = "rgba(31,45,66,0.8)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (h / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
  }

  // X labels
  ctx.fillStyle = "#64748b";
  ctx.font = "10px -apple-system,sans-serif";
  ctx.textAlign = "center";
  const step = Math.ceil(labels.length / 8);
  labels.forEach((l, i) => {
    if (i % step === 0) {
      const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
      ctx.fillText(l, x, H - 6);
    }
  });

  // Y label formatting
  const fmtY = v => isPrice ? `$${Math.round(v).toLocaleString()}` : String(Math.round(v));
  ctx.fillStyle = "#64748b";
  ctx.font = "10px -apple-system,sans-serif";
  ctx.textAlign = "right";
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (h / 4) * i;
    const val = maxV - ((maxV - minV) / 4) * i;
    ctx.fillText(fmtY(val), pad.left - 6, y + 4);
  }

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  const rgb = isPrice ? "251,191,36" : "59,130,246";
  grad.addColorStop(0, `rgba(${rgb},0.28)`);
  grad.addColorStop(1, `rgba(${rgb},0)`);

  ctx.beginPath();
  data.forEach((v, i) => {
    const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.left + w, pad.top + h);
  ctx.lineTo(pad.left, pad.top + h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  data.forEach((v, i) => {
    const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots
  data.forEach((v, i) => {
    const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    ctx.beginPath();
    ctx.arc(x, y, i === data.length - 1 ? 4 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  });
}

let dragSrc = null;

function initDragSort() {
  const cards = document.querySelectorAll("#estateList .estate-card");
  cards.forEach(card => {
    card.addEventListener("dragstart", e => {
      dragSrc = card;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => {
      card.classList.remove("dragging");
      document.querySelectorAll(".estate-card").forEach(c => c.classList.remove("drag-over"));
    });
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      if (card !== dragSrc) {
        document.querySelectorAll(".estate-card").forEach(c => c.classList.remove("drag-over"));
        card.classList.add("drag-over");
      }
    });
    card.addEventListener("drop", async e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === card) return;
      const list = document.getElementById("estateList");
      const cards = [...list.querySelectorAll(".estate-card")];
      const fromIdx = cards.indexOf(dragSrc);
      const toIdx = cards.indexOf(card);
      if (fromIdx < toIdx) card.after(dragSrc);
      else card.before(dragSrc);
      const newOrder = [...list.querySelectorAll(".estate-card")].map((c, i) => ({
        id: Number(c.dataset.id),
        sort_order: i,
      }));
      await api("/api/estates/reorder", { method: "POST", body: JSON.stringify({ order: newOrder }) });
    });
  });
}


async function deleteEstate(e, id) {
  e.stopPropagation();
  if (!confirm("確認移除此屋苑追蹤？")) return;
  await api(`/api/estates/${id}`, { method: "DELETE" });
  if (activeEstateId === id) {
    activeEstateId = null;
    document.getElementById("main").innerHTML = `<div class="welcome"><div class="welcome-icon">🏠</div><h2>選擇屋苑</h2></div>`;
  }
  loadEstates();
}

// ── Search autocomplete ────────────────────────────────────────
const searchInput = document.getElementById("searchInput");
const autocomplete = document.getElementById("autocomplete");

searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  const val = searchInput.value.trim();
  if (val.length < 2) { autocomplete.classList.add("hidden"); return; }
  searchTimer = setTimeout(() => doSearch(val), 400);
});

searchInput.addEventListener("blur", () => {
  setTimeout(() => autocomplete.classList.add("hidden"), 200);
});

searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    handleSearchBtn();
  }
});

async function handleSearchBtn() {
  const val = searchInput.value.trim();
  if (val.length < 2) return;
  clearTimeout(searchTimer);
  await doSearch(val);
  // 如果只有一個結果就直接追蹤
  const items = autocomplete.querySelectorAll(".autocomplete-item[data-code]");
  if (items.length === 1) items[0].click();
}

async function doSearch(keyword) {
  try {
    const { results } = await api("/api/search", {
      method: "POST",
      body: JSON.stringify({ keyword }),
    });

    if (!results?.length) {
      autocomplete.innerHTML = '<div class="autocomplete-item" style="color:var(--muted)">沒有結果</div>';
      autocomplete.classList.remove("hidden");
      return;
    }

    autocomplete.innerHTML = "";
    results.slice(0, 8).forEach(r => {
      const div = document.createElement("div");
      div.className = "autocomplete-item";
      div.dataset.code = r.bigestcode || r.bigCode || "";
      div.dataset.name = r.bigEstateName || r.name || "";
      div.dataset.district = r.districtName || r.district || "";
      div.dataset.isBigest = r.isBigest ? "1" : "0";
      div.innerHTML = `
        <div class="autocomplete-name">${escHtml(r.bigEstateName || r.name)}</div>
        <div class="autocomplete-meta">${escHtml(r.districtName || r.district || '')} ${r.bigestcode || r.bigCode || ''}</div>
      `;
      div.addEventListener("click", () => {
        trackEstate(div.dataset.name, div.dataset.code, div.dataset.district, div.dataset.isBigest === "1");
      });
      autocomplete.appendChild(div);
    });
    autocomplete.classList.remove("hidden");
  } catch (err) {
    console.error("Search error:", err);
    autocomplete.innerHTML = `<div class="autocomplete-item" style="color:var(--down)">搜尋失敗：${err.message}</div>`;
    autocomplete.classList.remove("hidden");
  }
}

async function trackEstate(name, bigestcode, district, isBigest) {
  autocomplete.classList.add("hidden");
  searchInput.value = "";
  toast("正在抓取 " + name + " 資料…");
  try {
    const data = await api("/api/track", {
      method: "POST",
      body: JSON.stringify({ name, bigestcode, district, isBigest }),
    });
    toast(`已新增 ${name}，共 ${data.count} 個盤`, "success");
    await loadEstates();
    showEstate(data.estate.id, name, district);
  } catch (err) {
    toast("新增失敗：" + err.message, "error");
  }
}

function hsValHtml(hsPrice) {
  return `<span class="price-cell">$${(hsPrice/1e4).toFixed(0)}萬</span>`;
}

function hsDiffHtml(hsPrice, txnPrice) {
  if (!hsPrice || !txnPrice) return '';
  const pct = (hsPrice - txnPrice) / txnPrice * 100;
  const absPct = Math.abs(pct).toFixed(1);
  if (pct >= 0) return `<div class="unit-price"><span class="gain-pos">比估值低 ${absPct}%</span></div>`;
  return `<div class="unit-price"><span class="gain-neg">比估值高 ${absPct}%</span></div>`;
}

// 相對同苑近60日成交中位呎價平定貴（同抵買雷達同一把尺,由 /api/viewings 計好）。
// basis='tier' 時基準係同層帶(高/中/低層,以該座成交最高層三等分)嘅中位數,
// 同層唔夠5宗會 fallback 返全苑中位數。
function marketVsHtml(v) {
  const days = _appCfg.market_median_days ?? 60;
  const minSold = _appCfg.market_min_sold ?? 5;
  const band = _appCfg.verdict_band_pct ?? 3;
  if (v.vs_med_pct == null) {
    const why = v.market_n_sold != null && v.market_n_sold < minSold
      ? `近${days}日成交唔夠${minSold}宗` : '未有面積/售價';
    return `<span style="color:var(--muted);font-size:0.75rem" title="${why}">-</span>`;
  }
  const vs = v.vs_med_pct, abs = Math.abs(vs).toFixed(1);
  let badge;
  if (vs <= -band)      badge = `<span class="gain-pos">低市價 ${abs}%</span>`;
  else if (vs >= band)  badge = `<span class="gain-neg">貴市價 ${abs}%</span>`;
  else                  badge = `<span style="color:var(--muted);font-size:0.75rem">約市價 ${vs > 0 ? '+' : ''}${vs}%</span>`;
  const isTier = v.market_basis === 'tier';
  const label = isTier ? `${v.floor_tier}中位` : '全苑中位';
  const tip = isTier
    ? `同層帶近${days}日成交中位數（以該座成交最高層 ${v.tier_max_floor} 樓三等分）`
    : (v.floor_tier ? `${v.floor_tier}近${days}日成交唔夠${minSold}宗，改用全苑中位數` : `全苑近${days}日成交中位數`);
  // 估計市值 = 實用面積 × 中位呎價（同 badge 用同一個基準）。
  const estVal = (v.sold_med_psf && v.size_net) ? v.sold_med_psf * v.size_net : null;
  const estInline = estVal
    ? ` <span style="color:var(--accent2)" title="實用 ${v.size_net}呎 × 中位 $${v.sold_med_psf.toLocaleString()}/呎">估值 $${(estVal/1e4).toFixed(0)}萬</span>`
    : '';
  // 「N宗」可撳,彈出組成中位數嗰批成交。
  const nClick = `<span onclick="openEstateComps(${v.estate_id},'${v.market_basis||'estate'}','${v.floor_tier||''}','${escJsAttr(v.block||'')}','${escJsAttr(v.floor||'')}','${escJsAttr(v.unit||'')}')" style="cursor:pointer;border-bottom:1px dotted var(--muted)" title="睇成交紀錄">${v.market_n_sold}宗</span>`;
  return `<div style="font-size:0.8rem">${badge}${estInline}</div>`
    + `<div class="unit-price" title="${tip}">${label} $${(v.sold_med_psf||0).toLocaleString()} · ${nClick}</div>`;
}

const _median = arr => {
  if (!arr.length) return null;
  const s = [...arr].sort((a, b) => a - b), n = s.length;
  return n % 2 ? s[(n - 1) / 2] : Math.round((s[n / 2 - 1] + s[n / 2]) / 2);
};

// 把 groupListings 出嚟嘅行(可能係 combined)攤平做統一欄位;combined 取最平嗰口價。
function _normListingRow(l) {
  if (!l._combined) return l;
  const cheapest = (l.sources || [])[0] || {};
  return {
    building_name: l.building_name, floor: l.floor, unit: l.unit,
    size_net: l.size_net, bedrooms: l.bedrooms, direction: l.direction,
    price: l.price_min, price_per_ft: l.ppf_min,
    detail_url: cheapest.detail_url, source: cheapest.source,
    first_seen: l.first_seen, publish_date: l.publish_date,
  };
}

// 同一屋苑最新放盤入面,同房數 + 同樓層帶(高/中/低層)嘅類近盤(已跨 source 去重)。
// 樓層帶:睇樓記錄用 v.floor_tier(由真實樓層 ÷ 該座成交最高層三等分);放盤本身
// 已係 portal masked 嘅 高/中/低層,兩者對齊做 match(粗略,portal 分界未必一樣)。
function similarListings(v) {
  if (!v.floor_tier || v.bedrooms == null) return [];
  return groupListings(allListings || [])
    .map(_normListingRow)
    .filter(l => l.floor === v.floor_tier && Number(l.bedrooms) === Number(v.bedrooms) && l.price > 0);
}

// 版面跟 marketVsHtml:第一行 verdict badge(貴/低/約叫價 X%,同 marketVsHtml
// 用同一個 ±band 界線),第二行「X層中位 $XX,XXX/呎 · N個」。
function similarListingsHtml(v) {
  const band = _appCfg.verdict_band_pct ?? 3;
  if (!v.floor_tier || v.bedrooms == null) {
    return `<span style="color:var(--muted);font-size:0.75rem" title="未有房數/樓層帶">－</span>`;
  }
  const sim = similarListings(v);
  const tip = `${v.bedrooms}房 ${v.floor_tier} 在售盤`;
  if (!sim.length) return `<span style="color:var(--muted);font-size:0.75rem" title="冇同房數同樓層帶嘅在售盤(${tip})">0 個</span>`;
  const medPsf = _median(sim.map(s => s.price_per_ft).filter(Boolean));
  const ownPsf = (v.price && v.size_net) ? v.price / v.size_net : null;
  let badge;
  if (medPsf && ownPsf) {
    const vs = (ownPsf - medPsf) / medPsf * 100, abs = Math.abs(vs).toFixed(1);
    if (vs <= -band)      badge = `<span class="gain-pos">低叫價 ${abs}%</span>`;
    else if (vs >= band)  badge = `<span class="gain-neg">貴叫價 ${abs}%</span>`;
    else                  badge = `<span style="color:var(--muted);font-size:0.75rem">約叫價 ${vs > 0 ? '+' : ''}${vs.toFixed(1)}%</span>`;
  } else {
    badge = `<span style="color:var(--muted);font-size:0.75rem">-</span>`;
  }
  const nClick = `<span onclick="openSimilarListings(${v.id})" style="cursor:pointer;border-bottom:1px dotted var(--muted)" title="睇 ${tip}">${sim.length} 個</span>`;
  return `<div style="font-size:0.8rem">${badge}</div>`
    + `<div class="unit-price" title="${tip}">${medPsf ? `${v.floor_tier}中位 $${medPsf.toLocaleString()}/呎 · ` : ''}${nClick}</div>`;
}

// 類近在售盤 popup — 全部欄位可撳表頭排序（同成交紀錄 popup 一致）。
let _slRows = [];
let _slSort = { key: 'price_per_ft', dir: 'asc' };   // 預設叫價呎價由平到貴
const SL_COLS = [
  { key: 'unit',         label: '單位', align: 'left' },
  { key: 'size_net',     label: '面積', align: 'right' },
  { key: 'price',        label: '叫價', align: 'right' },
  { key: 'price_per_ft', label: '呎價', align: 'right' },
  { key: 'source',       label: '來源', align: 'right' },
];
const _slSrcName = s => s === 'ricacorp' ? '利嘉閣' : s === 'hkp' ? '香港置業' : '中原';
function _slSortVal(l, key) {
  if (key === 'unit') return `${l.building_name||''} ${l.floor||''} ${l.unit||''}`;
  if (key === 'source') return _slSrcName(l.source);
  return l[key];
}

function sortSlComps(key) {
  if (_slSort.key === key) _slSort.dir = _slSort.dir === 'asc' ? 'desc' : 'asc';
  else _slSort = { key, dir: (key === 'unit' || key === 'source') ? 'asc' : 'asc' };
  renderSlTable();
}

function renderSlTable() {
  const body = document.getElementById('sl-body');
  if (!body) return;
  if (!_slRows.length) { body.innerHTML = '<div style="color:var(--muted)">冇類近在售盤</div>'; return; }
  const { key, dir } = _slSort;
  const fmt = p => p ? `$${(p/1e4).toFixed(0)}萬` : '-';
  const rows = [..._slRows].sort((a, b) => {
    let av = _slSortVal(a, key), bv = _slSortVal(b, key);
    if (typeof av === 'string') { return dir === 'asc' ? (av||'').localeCompare(bv||'') : (bv||'').localeCompare(av||''); }
    av = av ?? -Infinity; bv = bv ?? -Infinity;
    return dir === 'asc' ? av - bv : bv - av;
  }).map(l => {
    const unit = [l.building_name, l.floor, l.unit].filter(Boolean).map(escHtml).join(' ');
    const link = l.detail_url
      ? `<a href="${safeUrl(l.detail_url)}" target="_blank" style="color:var(--accent2);text-decoration:none">${_slSrcName(l.source)} ↗</a>`
      : `<span style="color:var(--muted)">${_slSrcName(l.source)}</span>`;
    return `<tr class="hl-tr">
      <td style="padding:0.4rem 0.5rem 0.4rem 0">${unit}${l.direction ? ` <span style="color:var(--muted);font-size:0.72rem">向${escHtml(l.direction)}</span>` : ''}</td>
      <td style="text-align:right;padding:0.4rem 0.5rem;white-space:nowrap;color:var(--muted)">${l.size_net ? l.size_net+'呎' : '-'}</td>
      <td style="text-align:right;padding:0.4rem 0.5rem;white-space:nowrap;font-weight:600;color:var(--accent)">${fmt(l.price)}</td>
      <td style="text-align:right;padding:0.4rem 0.5rem;white-space:nowrap">${l.price_per_ft ? '$'+Math.round(l.price_per_ft).toLocaleString() : '-'}</td>
      <td style="text-align:right;padding:0.4rem 0 0.4rem 0.5rem;white-space:nowrap;font-size:0.75rem">${link}</td>
    </tr>`;
  }).join('');
  const arrow = k => k !== key ? '' : (dir === 'asc' ? ' ▲' : ' ▼');
  const ths = SL_COLS.map(c => `<th onclick="sortSlComps('${c.key}')" style="text-align:${c.align};padding:0.3rem 0.5rem;cursor:pointer;user-select:none;white-space:nowrap">${c.label}${arrow(c.key)}</th>`).join('');
  renderFrozenTable(body, ths, rows);
}

// 撳「N 個」彈出同房數同樓層帶嘅在售盤(可撳表頭排序,預設叫價呎價由平到貴)。
function openSimilarListings(viewingId) {
  const v = window._viewingMap?.[viewingId];
  if (!v) return;
  _slRows = similarListings(v);
  _slSort = { key: 'price_per_ft', dir: 'asc' };
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.display = 'flex';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="modal" style="max-width:560px;max-height:90vh;overflow-y:auto">
    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    <div class="modal-title">類近在售盤</div>
    <div class="modal-sub">${escHtml(_viewingEstateName||'')} · ${v.bedrooms}房 · ${v.floor_tier} · ${_slRows.length}個（撳表頭可排序）</div>
    <div id="sl-body" style="margin-top:0.5rem"></div>
  </div>`;
  document.body.appendChild(overlay);
  renderSlTable();
}

// 撳「N宗」彈出組成中位數嗰批成交紀錄（同層帶或全苑,由後端用同一 tier 邏輯篩）。
let _ecComps = [];
let _ecSort = { key: 'reg_date', dir: 'desc' };

const EC_COLS = [
  { key: 'unit',         label: '單位',   align: 'left' },
  { key: 'size_net',     label: '面積',   align: 'right' },
  { key: 'price',        label: '成交價', align: 'right' },
  { key: 'price_per_ft', label: '呎價',   align: 'right' },
  { key: 'reg_date',     label: '登記日', align: 'right' },
];

function _ecSortVal(c, key) {
  if (key === 'unit') return `${c.building||''} ${c.floor||''} ${c.unit||''}`;
  return c[key];
}

function sortEcComps(key) {
  if (_ecSort.key === key) _ecSort.dir = _ecSort.dir === 'asc' ? 'desc' : 'asc';
  else _ecSort = { key, dir: key === 'reg_date' ? 'desc' : 'asc' };
  renderEcTable();
}

function renderEcTable() {
  const body = document.getElementById('ec-body');
  if (!body) return;
  if (!_ecComps.length) { body.innerHTML = '<div style="color:var(--muted)">冇成交紀錄</div>'; return; }
  const { key, dir } = _ecSort;
  const rows = [..._ecComps].sort((a, b) => {
    let av = _ecSortVal(a, key), bv = _ecSortVal(b, key);
    if (typeof av === 'string') { av = av || ''; bv = bv || ''; return dir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av); }
    av = av ?? -Infinity; bv = bv ?? -Infinity;
    return dir === 'asc' ? av - bv : bv - av;
  });
  const fmt = p => p ? `$${(p/1e4).toFixed(0)}萬` : '-';
  const rowsHtml = rows.map(c => `<tr class="hl-tr">
      <td style="padding:0.4rem 0.5rem 0.4rem 0">${escHtml(c.building||'')} ${escHtml(c.floor||'')} ${escHtml(c.unit||'')}</td>
      <td style="text-align:right;padding:0.4rem 0.5rem;white-space:nowrap;color:var(--muted)">${c.size_net?c.size_net+'呎':'-'}</td>
      <td style="text-align:right;padding:0.4rem 0.5rem;white-space:nowrap;font-weight:600;color:var(--accent)">${fmt(c.price)}</td>
      <td style="text-align:right;padding:0.4rem 0.5rem;white-space:nowrap">$${Math.round(c.price_per_ft).toLocaleString()}</td>
      <td style="text-align:right;padding:0.4rem 0 0.4rem 0.5rem;white-space:nowrap;color:var(--muted);font-size:0.75rem">${(c.reg_date||'').slice(0,10)}</td>
    </tr>`).join('');
  const arrow = k => k !== key ? '' : (dir === 'asc' ? ' ▲' : ' ▼');
  const ths = EC_COLS.map(col => `<th onclick="sortEcComps('${col.key}')" style="text-align:${col.align};padding:0.3rem 0.5rem;cursor:pointer;user-select:none;white-space:nowrap">${col.label}${arrow(col.key)}</th>`).join('');
  renderFrozenTable(body, ths, rowsHtml);
}

async function openEstateComps(estateId, basis, tier, ownBuilding, ownFloor, ownUnit) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.display = 'flex';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="modal" style="max-width:540px;max-height:90vh;overflow-y:auto">
    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    <div class="modal-title">成交紀錄</div>
    <div class="modal-sub" id="ec-sub">載入中…</div>
    <div id="ec-body" style="margin-top:0.5rem"><div class="loading"><div class="spinner"></div> 載入中…</div></div>
  </div>`;
  document.body.appendChild(overlay);
  try {
    const params = new URLSearchParams({ estate_id: estateId, basis });
    if (basis === 'tier' && tier) params.set('tier', tier);
    // 撇除自己嗰宗成交(如果撳緊嗰個 viewing 個單位就係嗰宗成交)——由後端
    // 用呢三個值 match building/floor/unit 濾走,唔好用自己嚟做自己嘅參考。
    if (ownBuilding) params.set('own_building', ownBuilding);
    if (ownFloor) params.set('own_floor', ownFloor);
    if (ownUnit) params.set('own_unit', ownUnit);
    const { comps, days } = await api('/api/estate-comps?' + params);
    const scope = basis === 'tier' && tier ? `${tier}成交` : '全苑成交';
    document.getElementById('ec-sub').textContent = `${scope}（近${days}日 · ${comps.length}宗，中位呎價基準 · 撳表頭可排序）`;
    _ecComps = comps;
    _ecSort = { key: 'reg_date', dir: 'desc' };
    renderEcTable();
  } catch (e) {
    document.getElementById('ec-body').innerHTML = `<span style="color:var(--down)">載入失敗:${escHtml(e.message)}</span>`;
  }
}

async function fetchHSVal(rowId, estate, block, floor, flat, estateId, txnPrice) {
  const span = document.getElementById(rowId);
  const btn = document.getElementById(rowId + '-btn');
  if (!span) return;
  if (btn) { btn.disabled = true; btn.textContent = '查詢中…'; }
  try {
    const params = new URLSearchParams({ estate, block, floor, flat });
    if (estateId) params.set('estateId', estateId);
    const data = await api(`/api/hangseng-valuation?${params}`);
    const histBtn = `<div style="margin-top:4px"><button class="history-btn" onclick="showHSHistory('${escJsAttr(block)}','${escJsAttr(floor)}','${escJsAttr(flat)}','${estateId}')">歷史</button></div>`;
    span.innerHTML = hsValHtml(Number(data.price)) + histBtn;
    const diffSpan = document.getElementById(rowId + '-diff');
    if (diffSpan) diffSpan.innerHTML = hsDiffHtml(Number(data.price), txnPrice);
    if (btn) { btn.disabled = false; btn.textContent = '查估值'; }
  } catch {
    span.textContent = '－';
    if (btn) { btn.disabled = false; btn.textContent = '查估值'; }
  }
}

async function showHSHistory(block, floor, flat, estateId) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      <div class="modal-title">恆生估值歷史</div>
      <div class="modal-sub">${block}座 ${floor}樓 ${flat}室</div>
      <div id="hsHistoryContent"><div class="loading"><div class="spinner"></div> 載入中…</div></div>
    </div>
  `;
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  try {
    const { history } = await api(`/api/hangseng-valuation-history?estateId=${estateId}&block=${encodeURIComponent(block)}&floor=${encodeURIComponent(floor)}&flat=${encodeURIComponent(flat)}`);
    const content = document.getElementById("hsHistoryContent");
    if (!history.length) { content.innerHTML = '<div class="no-data">暫無歷史記錄</div>'; return; }
    const rows = history.map(h => `
      <tr>
        <td>${h.fetched_at?.slice(0,10) || '-'}</td>
        <td class="price-cell">$${(h.price/1e4).toFixed(0)}萬</td>
        <td class="unit-price">${h.valuation_date || '-'}</td>
      </tr>
    `).join('');
    content.innerHTML = `<table class="history-table"><thead><tr><th>查詢日期</th><th>估值</th><th>估值日期</th></tr></thead><tbody>${rows}</tbody></table>`;
  } catch (err) {
    document.getElementById("hsHistoryContent").innerHTML = `<div class="no-data">載入失敗：${err.message}</div>`;
  }
}

function switchTab(tab, estateId) {
  document.querySelectorAll(".estate-tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".estate-tab").forEach(t => {
    if (t.getAttribute("onclick")?.includes(`'${tab}'`)) t.classList.add("active");
  });
  document.getElementById("tab-listings").style.display = tab === "listings" ? "" : "none";
  document.getElementById("tab-transactions").style.display = tab === "transactions" ? "" : "none";
  document.getElementById("tab-viewings").style.display = tab === "viewings" ? "" : "none";
  const batchBtn = document.getElementById("batch-hs-btn");
  if (batchBtn) batchBtn.style.display = (tab === "transactions" || tab === "viewings") ? "" : "none";
  if (tab === "transactions") loadTransactions(estateId, 0, false);
  if (tab === "viewings") loadViewings(estateId);
}

// ── Viewing modal ──────────────────────────────────────────────
let _viewingEstateId = null;
let _lastViewings = [];
let _viewingEstateName = '';
let _viewingImages = []; // [{dataUrl, file}]
let _viewingEditId = null;

let _notesOptions = [];      // string[] — consumed by the per-unit note dropdown
let _notesParams = [];       // {id, value}[] — backing rows for the settings CRUD editor

async function loadNotesOptions() {
  try {
    const r = await api('/api/system-params?category=notes_option');
    _notesParams = (r && r.items) || [];
    _notesOptions = _notesParams.map(p => p.value);
  } catch(_) {}
}

function findMatchingListings(viewing) {
  if (!viewing.block || !viewing.unit) return [];
  const blockNum = String(viewing.block).replace(/[座]/g, '').trim().toUpperCase();
  const unitNorm = String(viewing.unit).replace(/[室號]/g, '').trim().toUpperCase();
  const beds = Number(viewing.bedrooms) || 0;
  return (allListings || []).filter(l => {
    if (l.removed_date) return false;
    const lBlockRaw = String(l.building_name || '').replace(/[座]/g, '').trim().toUpperCase();
    const lBlock = lBlockRaw.match(/\d+/)?.[0] || lBlockRaw;
    const lUnit = String(l.unit || '').replace(/[室號]/g, '').trim().toUpperCase();
    const lBeds = Number(l.bedrooms) || 0;
    return lBlock === blockNum && lUnit === unitNorm && (!beds || !lBeds || lBeds === beds);
  });
}

function buildMatchCell(v) {
  if (!v.block || !v.unit) return '-';
  const matches = findMatchingListings(v);
  const confirmed = v.linked_ref_no;
  if (!matches.length && !confirmed) return '<span style="color:var(--muted);font-size:0.75rem">冇匹配</span>';

  // If confirmed but listing no longer in allListings, show fallback
  if (confirmed && !matches.find(l => l.ref_no === confirmed)) {
    return `<span style="color:var(--muted);font-size:0.75rem">已確認 (已下架)</span>
      <button onclick="confirmViewingListing(${v.id},null)" style="font-size:0.75rem;background:none;border:none;color:var(--muted);cursor:pointer;padding:0">✕ 取消</button>`;
  }

  const dismissed = new Set(JSON.parse(v.dismissed_refs || '[]'));
  if (!matches.length && !confirmed) return '<span style="color:var(--muted);font-size:0.75rem">冇匹配</span>';

  return matches.map(l => {
    const isConfirmed = confirmed && l.ref_no === confirmed;
    const isDismissed = !isConfirmed && dismissed.has(l.ref_no);
    const price = l.price ? `$${(l.price/1e4).toFixed(0)}萬` : '';
    const floorLabel = escHtml(l.floor || '');
    const linkStyle = `color:var(--accent2);text-decoration:${isDismissed ? 'line-through' : 'none'};opacity:${isDismissed ? '0.4' : '1'}`;
    const srcLabel = sourceLabel(l.source);
    const link = l.detail_url ? `<a href="${safeUrl(l.detail_url)}" target="_blank" style="${linkStyle}">${floorLabel} ${price} (${srcLabel}) ↗</a>` : `<span style="${linkStyle}">${floorLabel} ${price} (${srcLabel})</span>`;
    const confirmOnclick = isConfirmed ? `confirmViewingListing(${v.id},null)` : `confirmViewingListing(${v.id},'${escHtml(l.ref_no||'')}')`;
    const confirmStyle = isConfirmed
      ? `font-size:0.75rem;background:var(--accent2);border:none;border-radius:4px;color:#fff;cursor:pointer;padding:1px 5px`
      : `font-size:0.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;padding:1px 5px;display:${(confirmed || isDismissed) ? 'none' : ''}`;
    const rowOpacity = confirmed && !isConfirmed ? '0.3' : '1';
    const xBtn = !isConfirmed && !confirmed
      ? isDismissed
        ? `<button onclick="dismissViewingListing(${v.id},'${escHtml(l.ref_no||'')}',true)" style="font-size:0.75rem;background:none;border:none;color:var(--muted);cursor:pointer;padding:1px 3px" title="取消刪除線">✕</button>`
        : `<button onclick="dismissViewingListing(${v.id},'${escHtml(l.ref_no||'')}')" style="font-size:0.75rem;background:none;border:none;color:var(--muted);cursor:pointer;padding:1px 3px" title="唔係呢個">✕</button>`
      : '';
    return `<div style="font-size:0.78rem;display:flex;align-items:center;gap:0.3rem;opacity:${rowOpacity}">${link}
      <button onclick="${confirmOnclick}" style="${confirmStyle}" ${isConfirmed ? 'title="取消"' : ''}>✓</button>${xBtn}
    </div>`;
  }).join('');
}

// buildMatchCell 靠 allListings。喺「睇過嘅盤」tab 一次過有多個屋苑,re-render
// 時要用返嗰個 viewing 屋苑嘅在售放盤(存喺 window._matchListingsByEstate);
// 屋苑頁「睇樓記錄」冇填呢個 map,會 fall back 用返當時嘅 allListings(已經啱)。
function _matchCellFor(v) {
  const map = window._matchListingsByEstate;
  if (map && map[v.estate_id]) {
    const saved = allListings; allListings = map[v.estate_id];
    const html = buildMatchCell(v); allListings = saved; return html;
  }
  return buildMatchCell(v);
}

async function dismissViewingListing(viewingId, refNo, reverse = false) {
  const v = _lastViewings?.find(v => v.id === viewingId);
  if (!v) return;
  const dismissed = new Set(JSON.parse(v.dismissed_refs || '[]'));
  reverse ? dismissed.delete(refNo) : dismissed.add(refNo);
  v.dismissed_refs = dismissed.size ? JSON.stringify([...dismissed]) : null;
  api(`/api/viewings/${viewingId}`, { method: 'PATCH', body: JSON.stringify({ dismissed_refs: v.dismissed_refs }) }).catch(() => {});
  const cell = document.getElementById(`vmatch-${viewingId}`);
  if (cell) cell.innerHTML = _matchCellFor(v);
}

async function confirmViewingListing(viewingId, refNo) {
  api(`/api/viewings/${viewingId}`, { method: 'PATCH', body: JSON.stringify({ linked_ref_no: refNo }) }).catch(() => {});
  const cell = document.getElementById(`vmatch-${viewingId}`);
  if (!cell) return;
  if (!refNo) {
    const v = _lastViewings?.find(v => v.id === viewingId);
    if (v) { v.linked_ref_no = null; cell.innerHTML = _matchCellFor(v); }
    return;
  }
  // highlight confirmed, grey out others, add unlink button
  cell.querySelectorAll('div').forEach(div => {
    const btn = div.querySelector('button');
    if (btn && btn.getAttribute('onclick')?.includes(`'${refNo}'`)) {
      div.style.opacity = '1';
      btn.textContent = '✓';
      btn.style.background = 'var(--accent2)';
      btn.style.color = '#fff';
      btn.style.border = 'none';
      btn.setAttribute('onclick', `confirmViewingListing(${viewingId},null)`);
      btn.title = '取消';
    } else {
      div.style.opacity = '0.3';
      if (btn) btn.style.display = 'none';
    }
  });
}

function getNotesOptions() {
  return _notesOptions;
}

function populateNotesSelect(currentValue) {
  const opts = getNotesOptions();
  const selected = new Set((currentValue || '').split(',').map(s => s.trim()).filter(Boolean));
  // find the "free text" part — anything not in preset opts
  const presetSelected = [...selected].filter(s => opts.includes(s));
  const freeText = [...selected].filter(s => !opts.includes(s)).join(', ');
  const container = document.getElementById('vf-notes-chips');
  container.innerHTML = opts.map(o => {
    const active = presetSelected.includes(o);
    return `<button type="button" class="notes-chip${active ? ' active' : ''}" onclick="toggleNotesChip(this,'${escHtml(o)}')">${escHtml(o)}</button>`;
  }).join('');
  document.getElementById('vf-notes-text').value = freeText;
}

function toggleNotesChip(btn, val) {
  btn.classList.toggle('active');
}

function getNotesValue() {
  const chips = [...document.querySelectorAll('#vf-notes-chips .notes-chip.active')].map(b => b.textContent.trim());
  const text = document.getElementById('vf-notes-text').value.trim();
  return [...chips, ...(text ? [text] : [])].join(', ') || null;
}

async function openSettingsModal() {
  document.getElementById('settingsModalOverlay').style.display = 'flex';
  renderNotesOptions();
  renderCfgOptions();
  renderPrefsSummary();
  await Promise.all([loadNotesOptions(), loadAppConfig(), loadPreferences()]);
  renderNotesOptions();
  renderCfgOptions();
  renderPrefsSummary();
}

function openPrefsModal(prefill) {

  document.getElementById('pref-size-min').value = p.size_min || '';

function setPrefBeds(btn) {
  document.querySelectorAll('#pref-beds .filter-chip').forEach(b => b.classList.remove('active'));

async function savePrefsFromModal() {
  const body = {
    price_min: document.getElementById('pref-price-min').value,
    price_max: document.getElementById('pref-price-max').value,
    size_min: document.getElementById('pref-size-min').value,
    size_max: document.getElementById('pref-size-max').value,
    beds: document.querySelector('#pref-beds .filter-chip.active')?.dataset.beds || '',
  };
  if (document.getElementById('pref-dismiss').checked) body.dismissed = true;
  try {
    const d = await api('/api/preferences', { method: 'PUT', body: JSON.stringify(body) });
    _userPrefs = d.prefs;
  } catch (e) { alert('儲存失敗：' + e.message); return; }
  document.getElementById('prefsModalOverlay').style.display = 'none';
  renderPrefsSummary();
  // 偏好改咗：dashboard 動態即時跟新偏好重篩
  syncHlPrefChips();
  if (document.getElementById('highlights-body')) loadTodayHighlights();
  if (document.getElementById('history-body')) loadHistoryHighlights(document.getElementById('historyMonthsSel')?.value || 1);
}

// 略過／✕／點背景：淨係 tick 咗「不再提醒」先寫低 dismissed，否則下次登入照提
async function closePrefsModal() {
  if (document.getElementById('pref-dismiss').checked && !(_userPrefs && _userPrefs.dismissed)) {
    try { _userPrefs = (await api('/api/preferences', { method: 'PUT', body: JSON.stringify({ dismissed: true }) })).prefs; } catch (_) {}
  }
  document.getElementById('prefsModalOverlay').style.display = 'none';
}

// ── Dashboard 動態跟偏好 filter ──
let _hlPrefFilterOn = true; // 「🎯 偏好」chip：預設開，撳一下睇返全部

// 偏好有冇可以攞嚟篩嘅欄位（dismissed-only 就唔使顯示 chip）
function _hlPrefsUsable() {
  const p = _userPrefs || {};
  return !!(p.price_min || p.price_max || p.beds || p.size_min || p.size_max);
}

// Highlights row 篩選：欄位缺失（例如成交冇房數）嗰項條件就唔計，唔一刀切走。
// 「睇過嘅盤」相關組唔經呢度——自己睇過嘅嘢一定要顯示。
function prefMatchHl(r) {
  if (!_hlPrefFilterOn || !_hlPrefsUsable()) return true;
  const p = _userPrefs;
  const price = r.price ?? r.new_price;
  if (p.price_min && price != null && price < p.price_min * 1e4) return false;
  if (p.price_max && price != null && price > p.price_max * 1e4) return false;
  if (p.beds && r.bedrooms != null) {
    if (p.beds === '4+' ? r.bedrooms < 4 : String(r.bedrooms) !== p.beds) return false;
  }
  if (p.size_min && r.size_net != null && r.size_net < p.size_min) return false;
  if (p.size_max && r.size_net != null && r.size_net > p.size_max) return false;
  return true;
}

function toggleHlPrefFilter() {
  _hlPrefFilterOn = !_hlPrefFilterOn;
  document.querySelectorAll('.hl-pref-toggle').forEach(b => b.classList.toggle('active', _hlPrefFilterOn));
  loadTodayHighlights();
  if (document.getElementById('history-body')) {
    loadHistoryHighlights(document.getElementById('historyMonthsSel')?.value || 1);
  }
}

// 有可篩偏好先顯示「🎯 偏好」chip
function syncHlPrefChips() {
  document.querySelectorAll('.hl-pref-toggle').forEach(b => {
    b.style.display = _hlPrefsUsable() ? '' : 'none';
    b.classList.toggle('active', _hlPrefFilterOn);
  });
}

function renderPrefsSummary() {
  const el = document.getElementById('settings-prefs-summary');
  if (!el) return;
  const p = _userPrefs || {};
  const parts = [];
  if (p.price_min || p.price_max) parts.push(`$${p.price_min || '?'}–${p.price_max || '?'}萬`);
  if (p.beds) parts.push(`${p.beds}房`);
  if (p.size_min || p.size_max) parts.push(`${p.size_min || '?'}–${p.size_max || '?'}呎`);
  el.textContent = parts.length ? parts.join(' · ') : '未設定';
  el.style.color = parts.length ? 'var(--text)' : 'var(--muted)';
}

// 分析參數列表：label + number input + 說明。onchange 即刻 PUT,後端 clamp
// 完會回最新值,input 同 _appCfg 都更新返。用 _cfgGroup 按 tab/功能分類過濾。
function renderCfgGroupSelect() {
  const sel = document.getElementById('settings-cfg-group');
  if (!sel) return;
  const opts = ['全部', ..._cfgGroups];
  if (!opts.includes(_cfgGroup)) _cfgGroup = '全部';
  sel.innerHTML = opts.map(g => `<option value="${escHtml(g)}"${g === _cfgGroup ? ' selected' : ''}>${escHtml(g)}</option>`).join('');
}

function renderCfgOptions() {
  renderCfgGroupSelect();
  const list = document.getElementById('settings-cfg-list');
  if (!list) return;
  if (!_cfgDefs.length) {
    list.innerHTML = `<div style="font-size:0.8rem;color:var(--muted);padding:0.3rem 0">載入中…</div>`;
    return;
  }
  const defs = _cfgGroup === '全部'
    ? _cfgDefs
    : _cfgDefs.filter(d => (d.groups || []).includes(_cfgGroup));
  if (!defs.length) {
    list.innerHTML = `<div style="font-size:0.8rem;color:var(--muted);padding:0.3rem 0">呢個分類冇參數。</div>`;
    return;
  }
  list.innerHTML = defs.map(d => {
    // 共用參數(影響多過一個 tab)喺「全部」view 標埋屬邊啲功能。
    const tags = _cfgGroup === '全部' && (d.groups || []).length > 1
      ? ` <span style="font-size:0.68rem;color:var(--accent2)">· ${d.groups.map(escHtml).join(' / ')}</span>` : '';
    return `
    <div>
      <div style="display:flex;gap:0.6rem;align-items:center;justify-content:space-between">
        <label for="cfg-${d.key}" style="font-size:0.85rem;color:var(--text)">${escHtml(d.label)}${tags}</label>
        <input id="cfg-${d.key}" type="number" value="${d.value}" min="${d.min}" max="${d.max}" step="any"
          onchange="updateCfgOption('${d.key}', this.value)"
          style="width:90px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;padding:0.4rem 0.5rem;box-sizing:border-box;font-family:inherit;text-align:right">
      </div>
      <div style="font-size:0.75rem;color:var(--muted);margin-top:0.15rem">${escHtml(d.desc)}（${d.min}–${d.max}，預設 ${d.def}）</div>
    </div>`;
  }).join('');
}

async function updateCfgOption(key, value) {
  try {
    const { items } = await api('/api/config', { method: 'PUT', body: JSON.stringify({ [key]: Number(value) }) });
    _cfgDefs = items || _cfgDefs;
    _appCfg = Object.fromEntries(_cfgDefs.map(d => [d.key, d.value]));
    const input = document.getElementById('cfg-' + key);
    const d = _cfgDefs.find(x => x.key === key);
    if (input && d) input.value = d.value;   // 反映 clamp 後嘅值
    _radarLoaded = false;                     // 下次開抵買雷達 tab 用新參數重新載
  } catch (e) {
    alert('儲存失敗:' + e.message);
    renderCfgOptions();
  }
}

}

async function addNotesOption() {

function openViewingModal(viewing = null) {
  if (!_viewingEstateId) return;
  _viewingEditId = viewing ? viewing.id : null;
  document.getElementById('viewingModalOverlay').style.display = 'flex';
  document.getElementById('viewing-modal-estate-name').textContent = _viewingEstateName;
  document.querySelector('#viewingModalOverlay .modal-title').textContent = viewing ? '✏️ 更改睇樓記錄' : '＋ 新增睇樓記錄';
  const today = new Date(Date.now() + 8*3600000).toISOString().slice(0,10);
  document.getElementById('vf-date').value = viewing ? viewing.view_date : today;
  document.getElementById('vf-block').value = viewing ? (viewing.block || '') : '';
  document.getElementById('vf-floor').value = viewing ? viewing.floor : '';
  document.getElementById('vf-unit').value = viewing ? viewing.unit : '';
  document.getElementById('vf-size').value = viewing ? viewing.size_net : '';
  document.getElementById('vf-bedrooms').value = viewing ? (viewing.bedrooms || 2) : 2;
  document.getElementById('vf-direction').value = viewing ? (viewing.direction || '') : '';
  document.getElementById('vf-price').value = viewing ? (viewing.price / 10000) : '';
  document.getElementById('vf-mgmt').value = viewing ? (viewing.mgmt_fee || '') : '';
  populateNotesSelect(viewing ? (viewing.notes || '') : '');
  const preview = document.getElementById('vf-img-preview');
  preview.innerHTML = '';
  _viewingImages = [];
  if (viewing?.images) {
    const existing = JSON.parse(viewing.images);
    existing.forEach(dataUrl => {
      const idx = _viewingImages.length;
      _viewingImages.push({ dataUrl });
      const thumb = document.createElement('div');
      thumb.className = 'vf-img-thumb';
      thumb.innerHTML = `<img src="${safeImgSrc(dataUrl)}"><button type="button" class="vf-img-rm" onclick="removeViewingImg(${idx})">✕</button>`;
      preview.appendChild(thumb);
    });
  }
  if (!viewing) {
    api(`/api/viewings/last-mgmt-fee?estate_id=${_viewingEstateId}`).then(r => {
      if (r?.mgmt_fee) document.getElementById('vf-mgmt').value = r.mgmt_fee;
    }).catch(() => {});
  }
}

function closeViewingModal() {
  document.getElementById('viewingModalOverlay').style.display = 'none';
}

function previewImages(input) {
  const files = [...input.files];
  const preview = document.getElementById('vf-img-preview');
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = e => {
      const idx = _viewingImages.length;
      _viewingImages.push({ dataUrl: e.target.result, file });
      const thumb = document.createElement('div');
      thumb.className = 'vf-img-thumb';
      thumb.innerHTML = `<img src="${safeImgSrc(e.target.result)}"><button type="button" class="vf-img-rm" onclick="removeViewingImg(${idx})">✕</button>`;
      preview.appendChild(thumb);
    };
    reader.readAsDataURL(file);
  }
  input.value = '';
}

function removeViewingImg(idx) {
  _viewingImages[idx] = null;
  const thumbs = document.querySelectorAll('.vf-img-thumb');
  if (thumbs[idx]) thumbs[idx].remove();
}

async function submitViewing(e) {
  e.preventDefault();
  const btn = e.target.querySelector('.vf-submit');
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    const images = _viewingImages.filter(Boolean).map(i => i.dataUrl);
    const price = Math.round(parseFloat(document.getElementById('vf-price').value) * 10000);
    const body = {
      estate_id: _viewingEstateId,
      view_date: document.getElementById('vf-date').value,
      block: document.getElementById('vf-block').value.trim(),
      floor: document.getElementById('vf-floor').value.trim(),
      unit: document.getElementById('vf-unit').value.trim(),
      size_net: parseInt(document.getElementById('vf-size').value),
      bedrooms: parseInt(document.getElementById('vf-bedrooms').value) || 2,
      direction: document.getElementById('vf-direction').value || null,
      price,
      mgmt_fee: parseFloat(document.getElementById('vf-mgmt').value) || null,
      images: images.length ? JSON.stringify(images) : null,
      notes: getNotesValue(),
    };
    let savedId;
    if (_viewingEditId) {
      await api(`/api/viewings/${_viewingEditId}`, { method: 'PUT', body: JSON.stringify(body) });
      savedId = _viewingEditId;
    } else {
      const res = await api('/api/viewings', { method: 'POST', body: JSON.stringify(body) });
      savedId = res.id;
    }
    closeViewingModal();
    if (document.getElementById('tab-viewings')?.style.display !== 'none') {
      await loadViewings(_viewingEstateId);
    }
    // Auto-fetch HS valuation in background
    fetchViewingHSVal(savedId, body.block, body.floor, body.unit, body.price);
  } catch(err) {
    alert('儲存失敗，請再試');
  } finally {
    btn.disabled = false; btn.textContent = '儲存記錄';
  }
}

async function fetchViewingHSVal(viewingId, block, floor, unit, price) {
  if (!viewingId || !_viewingEstateName || !block || !floor || !unit) return;
  try {
    const floorNum = String(floor).replace(/[^0-9]/g, '');
    const flatLetter = String(unit).replace(/[^A-Za-z0-9]/g, '');
    if (!floorNum || !flatLetter) return;
    const params = new URLSearchParams({ estate: _viewingEstateName, block, floor: floorNum, flat: flatLetter, estateId: _viewingEstateId });
    const data = await api(`/api/hangseng-valuation?${params}`);
    if (data.price) {
      await api(`/api/viewings/${viewingId}`, { method: 'PATCH', body: JSON.stringify({ hs_price: Number(data.price) }) });
      const cell = document.getElementById(`vhs-${viewingId}`);
      if (cell) cell.innerHTML = hsValHtml(Number(data.price)) + hsDiffHtml(Number(data.price), price);
    }
  } catch {}
}

async function manualFetchViewingHSVal(viewingId, estateId, block, floor, unit, price) {
  const cell = document.getElementById(`vhs-${viewingId}`);
  if (cell) cell.innerHTML = '<span style="color:var(--muted);font-size:0.75rem">查詢中…</span>';
  const prevEstateId = _viewingEstateId;
  const prevName = _viewingEstateName;
  // Temporarily set estate context if needed
  if (!_viewingEstateId) _viewingEstateId = estateId;
  if (!_viewingEstateName) {
    const titleEl = document.querySelector('.estate-title');
    if (titleEl) _viewingEstateName = titleEl.textContent.trim();
  }
  await fetchViewingHSVal(viewingId, block, floor, unit, price);
  if (!prevEstateId) _viewingEstateId = null;
  if (!prevName) _viewingEstateName = '';
  if (cell && !cell.innerHTML.includes('萬')) {
    cell.innerHTML = '<span style="color:var(--muted);font-size:0.75rem">查無資料</span>';
  }
}

async function loadViewings(estateId) {
  const panel = document.getElementById('tab-viewings');
  if (!panel) return;
  panel.innerHTML = '<div class="listings-section"><div class="loading"><div class="spinner"></div> 載入睇樓記錄…</div></div>';
  try {
    const { viewings } = await api(`/api/viewings?estate_id=${estateId}`);
    _lastViewings = viewings;
    const tabBtn = document.getElementById('tab-btn-viewings');
    if (tabBtn) tabBtn.textContent = `睇樓記錄(${viewings?.length || 0})`;
    if (!viewings?.length) {
      panel.innerHTML = '<div class="listings-section" style="padding:1.5rem;color:var(--muted);text-align:center">未有睇樓記錄<br><small>按「新增睇樓」新增第一個記錄</small></div>';
      return;
    }
    const fmt = p => p ? `$${(p/1e4).toFixed(p%10000===0?0:1)}萬` : '-';
    window._viewingImgsMap = {};
    window._viewingMap = {};
    const rows = viewings.map(v => {
      const imgs = v.images ? JSON.parse(v.images) : [];
      window._viewingImgsMap[v.id] = imgs;
      window._viewingMap[v.id] = v;
      const imgHtml = imgs.length ? `<img class="viewing-card-img" src="${safeImgSrc(imgs[0])}" onclick="viewImgFull(${v.id},0)" style="height:56px;border-radius:4px;cursor:pointer;margin-top:0.3rem">${imgs.length>1?`<span style="font-size:0.75rem;color:var(--muted);display:block;margin-top:2px">+${imgs.length-1} 張</span>`:''}` : '';
      const fmtBlock = v.block ? ((/座$/.test(v.block) ? v.block : v.block+'座')) : null;
      const fmtFloor = v.floor ? ((/樓$/.test(v.floor)||/層$/.test(v.floor) ? v.floor : v.floor+'樓')) : null;
      const fmtUnit = v.unit ? ((/室$/.test(v.unit)||/號$/.test(v.unit) ? v.unit : v.unit+'室')) : null;
      const unitStr = [fmtBlock, fmtFloor, fmtUnit].filter(Boolean).map(s => escHtml(s)).join(' ');
      const mgmtMonthly = v.mgmt_fee ? (v.mgmt_fee > 100 ? Math.round(v.mgmt_fee) : (v.size_net ? Math.round(v.mgmt_fee * v.size_net) : null)) : null;
      const psfStr = v.price && v.size_net ? `$${Math.round(v.price/v.size_net).toLocaleString()}/呎` : '-';
      const vData = encodeURIComponent(JSON.stringify(v));
      const hsCell = v.hs_price
        ? hsValHtml(v.hs_price) + hsDiffHtml(v.hs_price, v.price)
        : `<button class="hs-val-btn" onclick="manualFetchViewingHSVal(${v.id},${estateId},'${escHtml(v.block||'')}','${escHtml(v.floor)}','${escHtml(v.unit)}',${v.price||0})">查估值</button>`;
      const subLine = [v.direction ? `向${escHtml(v.direction)}` : '', v.bedrooms ? v.bedrooms+'房' : ''].filter(Boolean).join(' ');
      const sizeStr = v.size_net ? v.size_net+'呎' : '-';
      return `<tr>
        <td>${v.view_date}</td>
        <td><strong>${unitStr}</strong>${subLine ? `<br><span style="color:var(--muted);font-size:0.75rem">${subLine}</span>` : ''}</td>
        <td><strong style="color:var(--accent)">${fmt(v.price)}</strong> <strong>${sizeStr}</strong><br><span style="color:var(--muted);font-size:0.75rem">${psfStr}</span></td>
        <td id="vhs-${v.id}">${hsCell}</td>
        <td>${marketVsHtml(v)}</td>
        <td>${similarListingsHtml(v)}</td>
        <td id="vprev-${v.id}"><span style="color:var(--muted);font-size:0.75rem;cursor:pointer" onclick="fetchUnitTxn(${v.id})">查詢</span></td>
        <td>${v.txn_price && v.txn_reg_date >= v.view_date ? `<span style="color:var(--accent)"><strong>${fmt(v.txn_price)}</strong></span><br><span style="color:var(--muted);font-size:0.75rem">${v.txn_reg_date}</span>` : '-'}</td>
        <td>${mgmtMonthly ? `$${mgmtMonthly.toLocaleString()}/月` : '-'}</td>
        <td id="vmatch-${v.id}">${buildMatchCell(v)}</td>
        <td>${v.notes ? `<span style="font-size:0.78rem;background:var(--surface2);border-radius:4px;padding:0.15rem 0.4rem">${escHtml(v.notes)}</span>` : '-'}</td>
        <td>${imgHtml || '-'}</td>
        <td style="white-space:nowrap">
          <button class="viewing-del-btn" onclick='openViewingModal(JSON.parse(decodeURIComponent("${vData}")))' title="更改" style="background:var(--surface2);margin-right:0.3rem">✏️</button>
          <button class="viewing-del-btn" onclick="deleteViewing(${v.id},${estateId})" title="刪除">🗑</button>
        </td>
      </tr>`;
    }).join('');
    panel.innerHTML = `<div class="listings-section" id="viewingsTableWrap"></div>`;
    renderFrozenTable(
      document.getElementById('viewingsTableWrap'),
      `<th>睇樓日期</th><th>單位</th><th>售價</th><th>恒生估值</th><th>相對市價</th><th>類近在售</th><th>上次購買</th><th>成交記錄</th><th>管理費(每月)</th><th>對應放盤</th><th>備注</th><th>圖片</th><th></th>`,
      rows, 10, 'history-table data-table'
    );

    // Auto-fetch 上次購買 for all rows using DetailByUnitCode
    for (const v of viewings) {
      fetchUnitTxn(v.id);
      await new Promise(r => setTimeout(r, 300));
    }
  } catch {
    panel.innerHTML = '<div class="listings-section" style="padding:1.5rem;color:var(--muted);text-align:center">載入失敗</div>';
  }
}

async function fetchUnitTxn(viewingId) {
  const v = window._viewingMap?.[viewingId];
  if (!v) return;
  const cell = document.getElementById(`vprev-${viewingId}`);
  if (!cell) return;
  const fmt = p => p ? `$${(p/1e4).toFixed(0)}萬` : '-';
  const building = /座$/.test(v.block||'') ? v.block : (v.block||'') + '座';
  const floor    = /[樓層]$/.test(v.floor||'') ? v.floor : (v.floor||'') + '樓';
  const unit     = /[室號]$/.test(v.unit||'') ? v.unit : (v.unit||'') + '室';
  try {
    const params = new URLSearchParams({ estate: _viewingEstateName, building, floor, unit, view_date: v.view_date || '' });
    const data = await api(`/api/viewings/unit-txn?${params}`);
    const t = data.txn;
    if (!t?.price) {
      cell.innerHTML = data.estateUrl
        ? `<a href="${safeUrl(data.estateUrl)}" target="_blank" style="color:var(--muted);font-size:0.75rem">查歷史↗</a>`
        : '-';
      return;
    }
    const dateStr = t.reg_date ? t.reg_date.slice(0, 7) : null;
    const linkStart = data.estateUrl ? `<a href="${safeUrl(data.estateUrl)}" target="_blank" style="text-decoration:none">` : '';
    const linkEnd = data.estateUrl ? '</a>' : '';
    cell.innerHTML = `${linkStart}<span style="color:var(--muted)"><strong>${fmt(t.price)}</strong></span>${dateStr ? `<br><span style="color:var(--muted);font-size:0.75rem">${dateStr}</span>` : ''}${linkEnd}`;
  } catch { cell.innerHTML = '-'; }
}

async function deleteViewing(id, estateId) {
  if (!confirm('確定刪除這個睇樓記錄？')) return;
  await api(`/api/viewings/${id}`, { method: 'DELETE' });
  loadViewings(estateId);
}

function viewImgFull(viewingId, startIdx) {
  const images = window._viewingImgsMap[viewingId] || [];
  if (!images.length) return;
  let cur = startIdx || 0;

  const ov = document.createElement('div');
  ov.id = 'img-lightbox';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center';

  const render = () => {
    const thumbs = images.map((src, i) => `<img src="${safeImgSrc(src)}" data-i="${i}" style="height:64px;width:64px;object-fit:cover;border-radius:4px;cursor:pointer;flex-shrink:0;border:2.5px solid ${i===cur?'#e53e3e':'transparent'};opacity:${i===cur?1:0.6};transition:border 0.15s,opacity 0.15s">`).join('');
    ov.innerHTML = `
      <button onclick="document.getElementById('img-lightbox').remove()" style="position:absolute;top:1rem;right:1.2rem;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;line-height:1;z-index:1">✕</button>
      <div style="position:relative;display:flex;align-items:center;justify-content:center;width:100%;max-height:78vh">
        ${images.length>1?`<button onclick="event.stopPropagation();_lbNav(-1)" style="position:absolute;left:1rem;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:2rem;padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer;z-index:1">‹</button>`:''}
        <img id="lb-main" src="${safeImgSrc(images[cur])}" style="max-width:88vw;max-height:76vh;border-radius:6px;box-shadow:0 8px 32px rgba(0,0,0,0.7);object-fit:contain">
        ${images.length>1?`<button onclick="event.stopPropagation();_lbNav(1)" style="position:absolute;right:1rem;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:2rem;padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer;z-index:1">›</button>`:''}
      </div>
      ${images.length>1?`<div id="lb-thumbs" style="display:flex;gap:0.5rem;margin-top:1rem;overflow-x:auto;max-width:92vw;padding:0.3rem 0.5rem">${thumbs}</div>`:''}
      <div style="color:rgba(255,255,255,0.5);font-size:0.8rem;margin-top:0.5rem">${cur+1} / ${images.length}</div>`;
    ov.querySelector('#lb-thumbs')?.querySelectorAll('img').forEach(el => {
      el.addEventListener('click', e => { e.stopPropagation(); cur = +el.dataset.i; render(); });
    });
  };

  window._lbNav = (dir) => {
    cur = (cur + dir + images.length) % images.length;
    render();
  };

  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  document.addEventListener('keydown', function lbKey(e) {
    if (!document.getElementById('img-lightbox')) { document.removeEventListener('keydown', lbKey); return; }
    if (e.key === 'ArrowLeft') window._lbNav(-1);
    if (e.key === 'ArrowRight') window._lbNav(1);
    if (e.key === 'Escape') ov.remove();
  });

  document.body.appendChild(ov);
  render();
}


async function batchFetchHSVal() {
  const btn = document.getElementById("batch-hs-btn");
  const queryBtns = [...document.querySelectorAll('.hs-val-btn')].filter(b => b.textContent === '查估值' && !b.disabled);
  if (!queryBtns.length) { if (btn) { btn.textContent = '已全部查完'; setTimeout(() => { btn.textContent = '批量查估值'; }, 2000); } return; }
  if (btn) { btn.disabled = true; btn.textContent = `查詢中 0/${queryBtns.length}`; }
  for (let i = 0; i < queryBtns.length; i++) {
    if (btn) btn.textContent = `查詢中 ${i+1}/${queryBtns.length}`;
    queryBtns[i].click();
    await new Promise(r => setTimeout(r, 600));
  }
  if (btn) { btn.disabled = false; btn.textContent = '批量查估值'; }
}

let txnOffset = 0;
let txnEstateId = null;
let allTransactions = [];
let txnSortCol = "reg_date";
let txnSortDir = "desc";
let txnFilters = { dateMonths: 0, heldMin: '', heldMax: '', building: 'all', unit: 'all' };

function setTxnFilter(key, val) {
  txnFilters[key] = val;
  renderTransactionsTable(txnEstateId, txnOffset, !!document.querySelector(".load-more-btn"));
}

function applyHeldFilter() {
  txnFilters.heldMin = document.getElementById('txnHeldMin')?.value || '';
  txnFilters.heldMax = document.getElementById('txnHeldMax')?.value || '';
  renderTransactionsTable(txnEstateId, txnOffset, !!document.querySelector(".load-more-btn"));
}

function applyTxnFilters(txns) {
  return txns.filter(t => {
    if (txnFilters.dateMonths > 0) {
      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - txnFilters.dateMonths);
      if (!t.reg_date || new Date(t.reg_date) < cutoff) return false;
    }
    const years = t.held_days ? t.held_days / 365 : null;
    if (txnFilters.heldMin !== '' && (years === null || years < Number(txnFilters.heldMin))) return false;
    if (txnFilters.heldMax !== '' && (years === null || years > Number(txnFilters.heldMax))) return false;
    if (txnFilters.building !== 'all' && t.building !== txnFilters.building) return false;
    if (txnFilters.unit !== 'all' && t.unit !== txnFilters.unit) return false;
    return true;
  });
}

async function loadTransactions(estateId, offset, append) {
  txnEstateId = estateId;
  txnOffset = offset;
  const panel = document.getElementById("tab-transactions");

  if (!append) {
    panel.innerHTML = '<div class="listings-section"><div class="loading"><div class="spinner"></div> 載入中…</div></div>';
    txnFilters = { dateMonths: 0, heldMin: '', heldMax: '', building: 'all', unit: 'all' };
  } else {
    const btn = document.querySelector(".load-more-btn");
    if (btn) { btn.disabled = true; btn.textContent = '載入中…'; }
  }

  try {
    const { transactions } = await api(`/api/estates/${estateId}/transactions?offset=${offset}`);

    if (append) {
      allTransactions = allTransactions.concat(transactions);
    } else {
      allTransactions = transactions;
      txnSortCol = "reg_date";
      txnSortDir = "desc";
    }

    const hasMore = transactions.length >= 50;
    renderTransactionsTable(estateId, offset, hasMore);

    if (append && transactions.length === 0) {
      toast('已載入全部成交記錄', 'success');
    } else if (append) {
      toast(`已載入 ${transactions.length} 條記錄`, 'success');
    }
  } catch (err) {
    if (append) {
      const btn = document.querySelector(".load-more-btn");
      if (btn) { btn.disabled = false; btn.textContent = '載入更多…'; }
      toast(`載入失敗：${err.message}`, 'error');
    } else {
      panel.innerHTML = `<div class="listings-section"><div class="no-data">載入失敗：${err.message}</div></div>`;
    }
  }
}

function setTxnSort(col) {
  if (txnSortCol === col) txnSortDir = txnSortDir === "asc" ? "desc" : "asc";
  else { txnSortCol = col; txnSortDir = col === "reg_date" ? "desc" : "asc"; }
  renderTransactionsTable(txnEstateId, txnOffset, !!document.querySelector(".load-more-btn"));
}

function renderTransactionsTable(estateId, offset, hasMore) {
  const panel = document.getElementById("tab-transactions");
  if (!panel) return;
  const estateName = document.querySelector('.estate-title')?.textContent?.trim() || '';

  const colMap = {
    reg_date:       t => t.reg_date || '',
    price:          t => t.price || 0,
    price_per_ft:   t => t.price_per_ft_net || 0,
    held_days:      t => t.held_days || 0,
    gain_annual:    t => (t.held_days && t.gain_pct != null) ? (Math.pow(1 + t.gain_pct/100, 365/t.held_days) - 1)*100 : -Infinity,
    hs_price:       t => t.hs_price || 0,
  };
  const filtered = applyTxnFilters(allTransactions);
  const sorted = [...filtered].sort((a, b) => {
    const fn = colMap[txnSortCol] || (() => 0);
    const av = fn(a), bv = fn(b);
    return txnSortDir === "asc" ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });

  const thCols = [
    { key: "reg_date",     label: "登記日期" },
    { key: null,           label: "單位" },
    { key: "price",        label: "成交價" },
    { key: "price_per_ft", label: "實呎價" },
    { key: "held_days",    label: "持有年期" },
    { key: "gain_annual",  label: "升跌" },
    { key: "hs_price",     label: "恆生估值" },
    { key: null,           label: "查估值" },
    { key: null,           label: "" },
  ];
  const ths = thCols.map(c => {
    if (!c.key) return `<th>${c.label}</th>`;
    const cls = txnSortCol === c.key ? `sortable sort-${txnSortDir}` : "sortable";
    return `<th class="${cls}" onclick="setTxnSort('${c.key}')">${c.label}</th>`;
  }).join('');

  const rows = sorted.map((t, i) => {
    const years = t.held_days ? t.held_days / 365 : null;
    const heldStr = years ? years.toFixed(1) + '年' : '-';
    let annualHtml = '', totalHtml = '';
    if (t.gain_pct != null && years) {
      const annualPct = (Math.pow(1 + t.gain_pct / 100, 1 / years) - 1) * 100;
      const cls = t.gain_pct >= 0 ? 'gain-pos' : 'gain-neg';
      const arrow = t.gain_pct >= 0 ? '▲' : '▼';
      annualHtml = `<span class="${cls}">${arrow} ${Math.abs(annualPct).toFixed(1)}%/年</span>`;
      totalHtml = `<div class="unit-price">${arrow} ${Math.abs(t.gain_pct).toFixed(1)}%</div>`;
    } else if (t.gain_pct != null) {
      const cls = t.gain_pct >= 0 ? 'gain-pos' : 'gain-neg';
      annualHtml = `<span class="${cls}">${t.gain_pct >= 0 ? '▲' : '▼'} ${Math.abs(t.gain_pct).toFixed(1)}%</span>`;
    }
    const blockNum   = (t.building || '').match(/\d+/)?.[0] || t.building || '';
    const floorNum   = (t.floor || '').match(/\d+/)?.[0] || '';
    const flatLetter = (t.unit || '').replace(/[室層樓]/g, '').trim();
    const rowId = `txn-hs-${estateId}-s-${i}`;
    const canQuery = estateName && blockNum && floorNum && flatLetter;
    const onclickFetch = `fetchHSVal('${rowId}','${estateName.replace(/'/g,"\\'")}','${blockNum}','${floorNum}','${flatLetter.replace(/'/g,"\\'")}','${estateId}',${t.price||0})`;
    const onclickHist = `showHSHistory('${blockNum}','${floorNum}','${flatLetter.replace(/'/g,"\\'")}','${estateId}')`;
    const histBtn = t.hs_price ? `<div style="margin-top:4px"><button class="history-btn" onclick="${onclickHist}">歷史</button></div>` : '';
    const hsValCell = t.hs_price
      ? `<span id="${rowId}">${hsValHtml(t.hs_price)}${histBtn}</span>`
      : `<span id="${rowId}"></span>`;
    const hsQueryCell = canQuery
      ? `<button class="hs-val-btn" id="${rowId}-btn" onclick="${onclickFetch}">查估值</button>`
      : '-';
    const srcBadge = t.source === 'ricacorp'
      ? `<span style="font-size:0.68rem;color:var(--accent);background:rgba(251,191,36,0.12);border-radius:4px;padding:1px 5px;margin-left:5px">利嘉閣</span>`
      : `<span style="font-size:0.68rem;color:var(--muted);margin-left:5px">中原</span>`;
    return `<tr>
      <td class="txn-date">${t.reg_date || '-'}${t.instrument_date && t.instrument_date !== t.reg_date ? `<div class="unit-price">簽約 ${t.instrument_date.slice(5)}</div>` : ''}</td>
      <td>${escHtml(t.building||'')} ${escHtml(t.floor||'')} ${escHtml(t.unit||'')}${srcBadge}</td>
      <td><span class="price-cell">$${t.price ? (t.price/1e4).toFixed(0)+'萬' : '-'}</span><span id="${rowId}-diff">${t.hs_price ? hsDiffHtml(t.hs_price, t.price) : ''}</span></td>
      <td>
        <div>$${t.price_per_ft_net ? t.price_per_ft_net.toLocaleString() : '-'}/呎</div>
        <div class="unit-price">實${t.size_net ? t.size_net+'呎' : ''}</div>
      </td>
      <td>${heldStr}</td>
      <td>${annualHtml}${totalHtml}</td>
      <td>${hsValCell}</td>
      <td>${hsQueryCell}</td>
      <td>${t.detail_url ? `<a href="${safeUrl(t.detail_url)}" target="_blank" class="detail-link">詳情 ↗</a>` : ''}</td>
    </tr>`;
  }).join('');

  if (allTransactions.length === 0) {
    panel.innerHTML = '<div class="listings-section"><div class="no-data">暫無成交記錄</div></div>';
    return;
  }
  const datePresets = [
    { label: '所有', months: 0 },
    { label: '3個月', months: 3 },
    { label: '6個月', months: 6 },
    { label: '1年', months: 12 },
    { label: '2年', months: 24 },
    { label: '3年', months: 36 },
    { label: '5年', months: 60 },
  ];
  const txnBuildings = ["all", ...Array.from(new Set(allTransactions.map(t=>t.building).filter(Boolean))).sort()];
  const txnUnits = ["all", ...Array.from(new Set(allTransactions.map(t=>t.unit).filter(Boolean))).sort()];
  const txnSel = (key, opts) =>
    `<select class="filter-select" onchange="setTxnFilter('${key}',this.value)">${opts.map(o=>`<option value="${o}"${txnFilters[key]===o?'selected':''}>${o==='all'?'全部':o}</option>`).join('')}</select>`;
  const filterBar = `
    <div class="filter-bar">
      <div class="filter-pair">
        <span class="filter-label">登記日期</span>
        <div class="filter-group">
          ${datePresets.map(p => `<button class="filter-chip ${txnFilters.dateMonths===p.months?'active':''}" onclick="setTxnFilter('dateMonths',${p.months})">${p.label}</button>`).join('')}
        </div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">座</span>
        <div class="filter-group">${txnSel('building', txnBuildings)}</div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">單位</span>
        <div class="filter-group">${txnSel('unit', txnUnits)}</div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">持有年期</span>
        <div class="filter-group">
          <input class="filter-input" id="txnHeldMin" type="text" inputmode="decimal" placeholder="最少" value="${txnFilters.heldMin}" style="width:52px">
          <span style="color:var(--muted);font-size:0.75rem">–</span>
          <input class="filter-input" id="txnHeldMax" type="text" inputmode="decimal" placeholder="最多" value="${txnFilters.heldMax}" style="width:52px">
          <span class="filter-label">年</span>
          <button class="filter-chip" onclick="applyHeldFilter()">搜尋</button>
        </div>
      </div>
      <span class="filter-count">${filtered.length !== allTransactions.length ? `${filtered.length} / ${allTransactions.length} 條` : `${allTransactions.length} 條`}</span>
    </div>`;

  // 樓層溢價:將已載入成交按樓層分組,平均實呎價 → 高層值唔值個溢價
  const buckets = [['1-9樓', 1, 9], ['10-19樓', 10, 19], ['20-29樓', 20, 29], ['30樓+', 30, 999]];
  const premium = buckets.map(([label, lo, hi]) => {
    const vals = filtered.filter(t => {
      const f = parseInt(String(t.floor || '').replace(/\D/g, ''));
      return f >= lo && f <= hi && t.price_per_ft_net;
    }).map(t => t.price_per_ft_net);
    return vals.length ? { label, avg: Math.round(vals.reduce((s, v) => s + v, 0) / vals.length), n: vals.length } : null;
  }).filter(Boolean);
  const premiumStrip = premium.length >= 2
    ? `<div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:baseline;padding:0.5rem 0.75rem;margin-bottom:0.5rem;background:var(--surface2);border-radius:8px;font-size:0.78rem">
        <span style="color:var(--muted)">樓層溢價(平均實呎)</span>
        ${premium.map(p => `<span>${p.label} <span style="color:var(--accent);font-weight:600">$${p.avg.toLocaleString()}</span> <span style="color:var(--muted);font-size:0.72rem">(${p.n}宗)</span></span>`).join('')}
      </div>` : '';

  panel.innerHTML = `
    <div class="listings-section">
      ${filterBar}
      ${premiumStrip}
      <div id="txnTableWrap"></div>
      ${hasMore ? `<button class="load-more-btn" onclick="loadTransactions(${estateId}, ${allTransactions.length}, true)">載入更多…</button>` : ''}
    </div>`;
  renderFrozenTable(document.getElementById('txnTableWrap'), ths, rows);
}

        </div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">來源</span>
        <div class="filter-group">
          <button class="filter-chip ${filters.source==='all'?'active':''}" onclick="setFilter('source','all')">全部</button>
          ${SOURCES.map(s => `<button class="filter-chip ${filters.source===s.id?'active':''}" onclick="setFilter('source','${s.id}')">${s.label}</button>`).join('')}
        </div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">放盤日數</span>
        <div class="filter-group">
          ${[['all','全部'],['30','30日+'],['60','60日+'],['90','90日+'],['180','180日+']].map(([v,t]) => `<button class="filter-chip ${filters.dom===v?'active':''}" onclick="setFilter('dom','${v}')">${t}</button>`).join('')}
        </div>
      </div>
      <span class="filter-count" id="filterCount"></span>
