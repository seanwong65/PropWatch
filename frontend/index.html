<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PropWatch — 香港樓市追蹤</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Surface scale — clearer layering between page / cards / raised cards */
      --bg: #0a0f1a;
      --surface: #131b2b;
      --surface1: #131b2b;
      --surface2: #1c2740;
      --border: #26344d;
      --text: #f1f5f9;
      --muted: #94a3b8;        /* brightened from #64748b → ~7:1 on --bg, passes WCAG AA */
      --accent: #fbbf24;
      --on-accent: #1a1206;    /* dark ink for text sitting on --accent (amber) */
      --accent2: #3b82f6;
      --up: #10b981;
      --down: #ef4444;
      --radius: 10px;
      --btn-bg: #3a5c59;
      --btn-hover: #4d7a77;

      /* Type scale — six steps, replaces ~18 ad-hoc sizes */
      --fs-xs: 0.75rem;    /* 12px  meta / labels / table footers */
      --fs-sm: 0.8125rem;  /* 13px  secondary body / tables */
      --fs-base: 0.875rem; /* 14px  primary body */
      --fs-md: 1rem;       /* 16px  card titles / estate names */
      --fs-lg: 1.25rem;    /* 20px  section headings */
      --fs-xl: 1.75rem;    /* 28px  stat numbers */

      /* 8pt spacing scale */
      --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-6: 24px; --sp-8: 32px;

      /* Header height — single source of truth for viewport math */
      --header-h: 56px;
    }

    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang HK", "PingFang TC", "Noto Sans HK", "Noto Sans CJK TC",
        "Microsoft JhengHei", "Hiragino Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.6;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      height: var(--header-h);
      padding: 0 max(1.5rem, env(safe-area-inset-right)) 0 max(1.5rem, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,15,26,0.92);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; }
    .logo-icon { font-size: 1.4rem; }
    .logo h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    .sync-btn {
      background: var(--btn-bg);
      border: 1px solid var(--btn-bg);
      color: var(--text);
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.8rem;
      line-height: 1.2;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sync-btn:hover { background: var(--btn-hover); border-color: var(--btn-hover); }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - var(--header-h));
      height: calc(100dvh - var(--header-h));
    }

    /* Sidebar */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .search-box {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .search-input-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 0.9rem 0.65rem 2.2rem;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent2); }
    .search-icon {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .search-btn {
      position: absolute;
      right: 0.4rem;
      top: 50%;
      transform: translateY(-50%);
      background: var(--btn-bg);
      color: var(--text);
      border: none;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .search-btn:hover { background: var(--btn-hover); }

    .autocomplete {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .autocomplete-item {
      padding: 0.7rem 0.9rem;
      cursor: pointer;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: var(--border); }
    .autocomplete-name { font-weight: 600; }
    .autocomplete-meta { color: var(--muted); font-size: 0.75rem; margin-top: 0.15rem; }

    .estate-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .estate-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .estate-card:hover { border-color: var(--accent2); }
    .estate-card.active { border-color: var(--accent); background: rgba(251,191,36,0.06); }
    .estate-card-name { font-weight: 600; font-size: 0.9rem; }
    .estate-card-meta { color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem; }
    .estate-card-delete {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 5px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .estate-card:hover .estate-card-delete { opacity: 1; }
    .estate-card-delete:hover { color: var(--down); }

    .estate-card-star {
      position: absolute;
      top: 0.6rem;
      right: 2rem;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1;
    }
    .estate-card:hover .estate-card-star { opacity: 1; }
    .estate-card-star.starred { opacity: 1; color: var(--accent); }
    .estate-card-star:hover { color: var(--accent); }

    .drag-handle {
      position: absolute;
      top: 50%;
      left: 0.5rem;
      transform: translateY(-50%);
      color: var(--border);
      cursor: grab;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.15s;
      user-select: none;
    }
    .estate-card:hover .drag-handle { opacity: 1; }
    .estate-card { padding-left: 1.6rem; }
    .estate-card.drag-over { border-color: var(--accent2); background: rgba(59,130,246,0.06); }
    .estate-card.dragging { opacity: 0.4; }

    .sidebar-empty {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Main content */
    .main {
      overflow-y: auto;
      padding: 1.5rem 2rem;
    }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
      color: var(--muted);
      text-align: center;
    }
    .welcome-icon { font-size: 3rem; }
    .welcome h2 { font-size: 1.1rem; color: var(--text); }
    .welcome p { font-size: 0.85rem; max-width: 280px; line-height: 1.6; }

    /* Dashboard */
    .dashboard { padding: 1.5rem 2rem; }
    .dashboard-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
    }
    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .dashboard-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .dashboard-card:hover { border-color: var(--accent2); }
    .dashboard-card-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; }
    .dashboard-card-count { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .dashboard-card-label { font-size:0.75rem; color: var(--muted); }
    .dashboard-chart-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .highlights-section {
      background: var(--surface2);
      border: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
      border-radius: var(--radius);
      padding: 1rem;
      margin-top: 1.25rem;
    }
    .highlights-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 1.25rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .highlights-group {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .highlights-group:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .highlights-estate-header {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .highlights-subgroup { margin-top: 0.75rem; }
    .highlights-group-label {
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
      padding: 0.2rem 0;
    }
    .hl-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
      color: var(--text);
    }
    .hl-tr td {
      padding: 0.4rem 0.5rem 0.4rem 0;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
      vertical-align: middle;
    }
    .hl-tr:last-child td { border-bottom: none; }
    .hl-th th { padding: 0.25rem 0.5rem 0.25rem 0; font-size:0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
    .hl-c1 { width: 28%; }
    .hl-c2 { width: 20%; }
    .hl-c3 { width: 20%; }
    .hl-c4 { width: 20%; }
    .hl-c5 { width: 14%; }
    .hl-c6 { width: 10%; text-align: right; }
    .hl-link { color: #3b82f6; font-size: 0.78rem; white-space: nowrap; text-decoration: none; }
    .hl-link:hover { text-decoration: underline; }
    .highlights-estate { color: var(--muted); font-size: 0.75rem; }
    .dashboard-chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .estate-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }
    .estate-select:focus { border-color: var(--accent2); }

    /* Estate detail */
    .estate-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .estate-title { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    .estate-sub { color: var(--muted); font-size: 0.85rem; margin-top: 0.25rem; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .stat-label { color: var(--muted); font-size:0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value { font-size: 1.4rem; font-weight: 700; margin-top: 0.25rem; color: var(--accent); }
    .stat-breakdown { display: flex; flex-direction: column; gap: 0.15rem; margin-top: 0.5rem; }
    .stat-breakdown span { font-size:0.75rem; color: var(--muted); }
    .stat-unit { font-size:0.75rem; color: var(--muted); font-weight: 400; }

    /* Chart */
    .chart-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .chart-wrap { position: relative; height: 160px; }
    canvas { width: 100% !important; }

    .no-data {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Listings table */
    .listings-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .listings-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      padding: 0.65rem 1rem;
      text-align: left;
      color: var(--muted);
      font-size:0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid rgba(31,45,66,0.5);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .price-cell { font-weight: 700; color: var(--accent); }
    .unit-price { color: var(--text); font-size: 0.75rem; margin-top: 0.1rem; }
    .floor-badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size:0.75rem;
      font-weight: 600;
    }
    .floor-high { background: rgba(16,185,129,0.15); color: var(--up); }
    .floor-mid  { background: rgba(59,130,246,0.15); color: var(--accent2); }
    .floor-low  { background: rgba(251,191,36,0.15); color: var(--accent); }

    .detail-link {
      color: var(--accent2);
      text-decoration: none;
      font-size: 0.75rem;
    }
    .detail-link:hover { text-decoration: underline; }

    .price-change-up { color: var(--down); font-size:0.75rem; font-weight: 600; }
    .price-change-down { color: var(--up); font-size:0.75rem; font-weight: 600; }
    .price-change-flat { color: var(--muted); font-size:0.75rem; }
    .ref-link { color: var(--muted); font-size:0.75rem; text-decoration: none; }
    .ref-link:hover { color: var(--accent2); }
    .price-prev { color: var(--muted); font-size:0.75rem; text-decoration: line-through; }
    .history-btn {
      background: var(--btn-bg);
      border: 1px solid var(--btn-bg);
      color: var(--text);
      border-radius: 4px;
      font-size:0.75rem;
      padding: 0.1rem 0.4rem;
      cursor: pointer;
      margin-top: 0.2rem;
      display: inline-block;
    }
    .history-btn:hover { background: var(--btn-hover); border-color: var(--btn-hover); }

    /* History modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      min-width: 320px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .modal-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    .modal-sub { color: var(--muted); font-size: 0.78rem; margin-bottom: 1rem; }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      margin-top: -0.2rem;
    }
    /* Viewing modal form */
    .vf-label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; margin-top: 0.75rem; }
    .vf-label span { color: var(--down); margin-left: 2px; }
    .vf-input, .vf-select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 0.45rem 0.65rem;
      font-size: 0.82rem; outline: none; box-sizing: border-box;
    }
    .vf-input:focus, .vf-select:focus { border-color: var(--accent2); }
    .vf-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .vf-upload-label {
      display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
      background: var(--surface2); border: 1px dashed var(--border); border-radius: 6px;
      padding: 0.6rem 0.75rem; font-size: 0.8rem; color: var(--muted);
      transition: border-color 0.2s;
    }
    .vf-upload-label:hover { border-color: var(--accent2); color: var(--text); }
    .vf-img-preview { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
    .vf-img-thumb {
      position: relative; width: 64px; height: 64px;
      border-radius: 4px; overflow: hidden; background: var(--surface2);
    }
    .vf-img-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .vf-img-rm {
      position: absolute; top: 1px; right: 2px; background: rgba(0,0,0,0.6);
      border: none; color: #fff; font-size:0.75rem; cursor: pointer;
      border-radius: 2px; padding: 0 3px; line-height: 14px;
    }
    .notes-chip { background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:0.25rem 0.7rem;font-size:0.78rem;cursor:pointer;transition:all 0.15s; }
    .notes-chip.active { background:var(--accent2);border-color:var(--accent2);color:#fff; }
    .vf-submit {
      margin-top: 1.1rem; width: 100%; background: var(--btn-bg);
      border: none; color: var(--text); border-radius: 6px;
      padding: 0.55rem; font-size: 0.88rem; font-weight: 600; cursor: pointer;
    }
    .vf-submit:hover { background: var(--btn-hover); }
    /* Viewings tab */
    .viewings-list { padding: 0.75rem 0; }
    .viewing-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.85rem 1rem; margin-bottom: 0.75rem;
    }
    .viewing-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .viewing-card-title { font-weight: 700; font-size: 0.88rem; }
    .viewing-card-date { color: var(--muted); font-size: 0.75rem; }
    .viewing-card-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.3rem 0.75rem;
      font-size: 0.78rem; margin-bottom: 0.5rem;
    }
    .viewing-card-kv { display: flex; flex-direction: column; }
    .viewing-card-k { color: var(--muted); font-size:0.75rem; margin-bottom: 1px; }
    .viewing-card-imgs { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.4rem; }
    .viewing-card-img {
      width: 72px; height: 72px; object-fit: cover; border-radius: 4px;
      cursor: pointer; border: 1px solid var(--border);
    }
    .viewing-del-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.78rem; padding: 0.1rem 0.35rem; border-radius: 4px;
    }
    .viewing-del-btn:hover { color: var(--down); }

    .history-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .history-table th {
      color: var(--muted);
      font-size:0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.4rem 0.5rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .history-table td { padding: 0.5rem; border-bottom: 1px solid rgba(31,45,66,0.5); }
    .history-table tr:last-child td { border-bottom: none; }
    .history-row-latest td { color: var(--accent); font-weight: 600; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2rem;
      justify-content: center;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1.1rem;
      font-size: 0.85rem;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: fadeIn 0.2s ease;
    }
    .toast.success { border-color: var(--up); }
    .toast.error { border-color: var(--down); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Estate tabs */
    .estate-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .estate-tab {
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .estate-tab:hover { color: var(--text); }
    .estate-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Transaction table */
    .gain-pos { color: var(--up); font-size: 0.75rem; font-weight: 600; }
    .gain-neg { color: var(--down); font-size: 0.75rem; font-weight: 600; }
    .txn-date { color: var(--text); font-size: 0.75rem; }
    .hs-val-btn {
      background: var(--btn-bg); border: 1px solid var(--btn-bg); color: var(--text);
      border-radius: 4px; padding: 2px 8px; font-size:0.75rem; cursor: pointer;
      white-space: nowrap;
    }
    .hs-val-btn:hover { background: var(--btn-hover); border-color: var(--btn-hover); }
    .load-more-btn {
      display: block;
      width: 100%;
      padding: 0.75rem;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--accent2);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .load-more-btn:hover { background: rgba(59,130,246,0.06); }

    /* Sortable table headers */
    th.sortable {
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th.sortable:hover { color: var(--text); }
    th.sort-asc::after  { content: " ▲"; color: var(--accent); }
    th.sort-desc::after { content: " ▼"; color: var(--accent); }

    /* Filter bar */
    .filter-bar {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }
    .filter-pair {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }
    .filter-label {
      font-size:0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .filter-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-chip:hover  { border-color: var(--accent2); color: var(--text); }
    .filter-chip.active { background: rgba(251,191,36,0.12); border-color: var(--accent); color: var(--accent); }
    .filter-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      width: 72px;
      outline: none;
    }
    .filter-input:focus { border-color: var(--accent2); }
    .filter-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.25rem 0.4rem;
      font-size: 0.75rem;
      outline: none;
      cursor: pointer;
      max-width: 120px;
    }
    .filter-select:focus { border-color: var(--accent2); }
    .filter-sep {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 0.2rem;
    }
    .filter-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Hamburger button — hidden on desktop */
    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.3rem 0.5rem;
      flex-direction: column;
      gap: 5px;
      margin-right: 0.6rem;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: background 0.2s;
    }
    .hamburger:hover span { background: var(--accent); }

    /* Sidebar mobile top bar */
    .sidebar-mobile-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-home-btn, .sidebar-close-btn {
      background: var(--btn-bg);
      border: 1px solid var(--btn-bg);
      color: var(--text);
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .sidebar-home-btn:hover { background: var(--btn-hover); border-color: var(--btn-hover); }
    .sidebar-close-btn:hover { background: var(--btn-hover); border-color: var(--btn-hover); }
    @media (max-width: 768px) {
      .sidebar-mobile-bar { display: flex; }
    }

    /* Mobile drawer overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 199;
    }
    .sidebar-overlay.open { display: block; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 80vw; max-width: 300px;
        border-right: 1px solid var(--border);
        border-bottom: none;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        z-index: 200;
        background: var(--surface);
      }
      .sidebar.open { transform: translateX(0); }
      .hamburger { display: flex; }
      /* Tighten header so all controls fit one row on phones (no vertical spill) */
      header { padding: 0 max(0.6rem, env(safe-area-inset-right)) 0 max(0.6rem, env(safe-area-inset-left)); }
      header > div:last-child { gap: 0.35rem !important; }
      .logo-icon { display: none; }
      .logo h1 { font-size: 1rem; }
      .sync-btn { padding: 0.4rem 0.6rem; font-size: 0.75rem; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 0.5rem; }
      .dashboard { padding: 0.75rem 0.75rem; }
      .highlights-group { margin-bottom: 1rem; padding-bottom: 1rem; }
      .highlights-title { margin-bottom: 0.75rem; }
      .highlights-estate-header { font-size: 0.95rem; margin-bottom: 0.5rem; }
      .highlights-subgroup { margin-top: 0.5rem; }
      .hl-tr td { padding: 0.3rem 0.4rem 0.3rem 0; }
    }

    /* Tablet range — iPad landscape & small laptops: tighten the sidebar */
    @media (min-width: 769px) and (max-width: 1024px) {
      .layout { grid-template-columns: 260px 1fr; }
      .main { padding: 1rem; }
    }

    /* Shared horizontal-scroll table utility (replaces scattered inline styles) */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .data-table { min-width: 700px; white-space: nowrap; }
    /* 最新放盤表:淨係顯示約10行,之後上下+左右都可以喺個框入面拉(唔使
       成頁咁長)。max-height 由 JS 度返嚟set(睇 renderListingsTable)。 */
    .table-scroll-capped { overflow-y: auto; }
    /* 固定表頭:獨立一個唔比人直接拖嘅表格,橫向位置由 JS 同表身同步
       (renderListingsTable 度做),做出「表頭企定,表身先郁」嘅效果。 */
    .table-scroll-header { overflow: hidden; }

    /* 全站捲軸半透明(Chrome/Safari/Edge 用 ::-webkit-scrollbar,Firefox 用
       scrollbar-color)。淨係影響外觀,唔改任何 scroll 行為。 */
    * { scrollbar-width: thin; scrollbar-color: rgba(148,163,184,0.35) transparent; }
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.35); border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.55); background-clip: padding-box; }
    ::-webkit-scrollbar-corner { background: transparent; }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="屋苑列表">
      <span></span><span></span><span></span>
    </button>
    <div class="logo" onclick="goHome()" style="cursor:pointer">
      <span class="logo-icon">🏙️</span>
      <h1>Prop<span>Watch</span></h1>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:0.5rem">
    <button class="sync-btn" onclick="syncAll()">↻ 立即同步</button>
    <button class="sync-btn" onclick="openSettingsModal()" style="background:var(--surface2);border-color:var(--border);font-size:1rem;padding:0.35rem 0.6rem" title="設定">⚙️</button>
    <button class="sync-btn" id="logout-btn" onclick="doLogout()" style="background:var(--surface2);border-color:var(--border);display:none" title="登出">登出</button>
  </div>
</header>

<!-- Login Screen -->
<div id="login-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;align-items:center;justify-content:center">
  <div style="background:var(--surface1);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.4)">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2rem">🏙️</div>
      <div style="font-size:1.4rem;font-weight:700;color:var(--accent)">PropWatch</div>
    </div>
    <div id="login-error" style="color:#e57373;font-size:0.85rem;margin-bottom:0.75rem;display:none"></div>
    <input id="login-username" type="text" placeholder="用戶名" autocomplete="username"
      style="width:100%;padding:0.65rem 0.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;box-sizing:border-box;margin-bottom:0.75rem"
      onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()">
    <input id="login-password" type="password" placeholder="密碼" autocomplete="current-password"
      style="width:100%;padding:0.65rem 0.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;box-sizing:border-box;margin-bottom:1rem"
      onkeydown="if(event.key==='Enter')loginSubmit()">
    <input id="login-password2" type="password" placeholder="確認密碼" autocomplete="new-password"
      style="display:none;width:100%;padding:0.65rem 0.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;box-sizing:border-box;margin-bottom:1rem"
      onkeydown="if(event.key==='Enter')loginSubmit()">
    <button id="login-submit-btn" onclick="loginSubmit()" style="width:100%;padding:0.75rem;background:var(--accent);border:none;border-radius:8px;color:var(--on-accent);font-size:1rem;font-weight:600;cursor:pointer">登入</button>
    <div style="text-align:center;margin-top:0.9rem">
      <span id="login-mode-toggle" onclick="toggleLoginMode()" style="color:var(--muted);font-size:0.82rem;cursor:pointer;border-bottom:1px dotted var(--muted)">未有帳戶？註冊</span>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<!-- 首次登入睇樓偏好 Modal -->
<div class="modal-overlay" id="prefsModalOverlay" style="display:none" onclick="if(event.target===this)closePrefsModal()">
  <div class="modal" style="max-width:420px">
    <button class="modal-close" onclick="closePrefsModal()">✕</button>
    <div class="modal-title">🎯 睇樓偏好</div>
    <p style="font-size:0.82rem;color:var(--muted);margin:0.25rem 0 1rem">話俾系統知你想搵咩樓，開「最新放盤」時會自動幫你 filter。全部 optional，之後喺 ⚙️ 設定都改到。</p>
    <label class="vf-label">想睇幾錢嘅樓（萬）</label>
    <div style="display:flex;align-items:center;gap:0.5rem">
      <input class="vf-input" type="number" id="pref-price-min" placeholder="最低" style="margin:0">
      <span style="color:var(--muted)">–</span>
      <input class="vf-input" type="number" id="pref-price-max" placeholder="最高" style="margin:0">
    </div>
    <label class="vf-label" style="margin-top:0.9rem">目標房數</label>
    <div id="pref-beds" style="display:flex;gap:0.4rem;flex-wrap:wrap">
      <button type="button" class="filter-chip active" data-beds="" onclick="setPrefBeds(this)">唔限</button>
      <button type="button" class="filter-chip" data-beds="1" onclick="setPrefBeds(this)">1房</button>
      <button type="button" class="filter-chip" data-beds="2" onclick="setPrefBeds(this)">2房</button>
      <button type="button" class="filter-chip" data-beds="3" onclick="setPrefBeds(this)">3房</button>
      <button type="button" class="filter-chip" data-beds="4+" onclick="setPrefBeds(this)">4+房</button>
    </div>
    <label class="vf-label" style="margin-top:0.9rem">實呎</label>
    <div style="display:flex;align-items:center;gap:0.5rem">
      <input class="vf-input" type="number" id="pref-size-min" placeholder="最低" style="margin:0">
      <span style="color:var(--muted)">–</span>
      <input class="vf-input" type="number" id="pref-size-max" placeholder="最高" style="margin:0">
    </div>
    <label style="display:flex;align-items:center;gap:0.45rem;margin-top:1.1rem;font-size:0.85rem;color:var(--muted);cursor:pointer">
      <input type="checkbox" id="pref-dismiss" style="accent-color:var(--accent)"> 以後不再提醒
    </label>
    <div style="display:flex;gap:0.5rem;margin-top:1rem">
      <button class="vf-submit" onclick="savePrefsFromModal()" style="flex:1;margin:0">儲存</button>
      <button class="vf-submit" onclick="closePrefsModal()" style="flex:1;margin:0;background:var(--surface2);color:var(--text)">略過</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModalOverlay" style="display:none" onclick="if(event.target===this)closeSettingsModal()">
  <div class="modal" style="max-width:460px;max-height:90vh;overflow-y:auto">
    <button class="modal-close" onclick="closeSettingsModal()">✕</button>
    <div class="modal-title">⚙️ 設定</div>
    <div class="modal-sub">備注選項</div>
    <p style="font-size:0.78rem;color:var(--muted);margin:0.25rem 0 0.75rem">每個選項獨立儲存，改動即時生效</p>
    <div id="settings-notes-list" style="display:flex;flex-direction:column;gap:0.4rem;margin-bottom:0.6rem"></div>
    <div style="display:flex;gap:0.4rem">
      <input id="settings-notes-new" placeholder="新增選項…" onkeydown="if(event.key==='Enter')addNotesOption()"
        style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;padding:0.5rem 0.6rem;box-sizing:border-box;font-family:inherit">
      <button class="vf-submit" onclick="addNotesOption()" style="width:auto;padding:0.5rem 1rem;margin:0;white-space:nowrap">＋ 新增</button>
    </div>
    <div class="modal-sub" style="margin-top:1.25rem">🎯 睇樓偏好</div>
    <p style="font-size:0.78rem;color:var(--muted);margin:0.25rem 0 0.5rem">開「最新放盤」時自動 apply 嘅 filter（售價／房數／實呎），留空＝唔限</p>
    <div style="display:flex;align-items:center;gap:0.6rem">
      <span id="settings-prefs-summary" style="flex:1;font-size:0.85rem"></span>
      <button class="vf-submit" style="width:auto;padding:0.5rem 1rem;margin:0;white-space:nowrap" onclick="openPrefsModal(_userPrefs||{})">修改</button>
    </div>
    <div class="modal-sub" style="margin-top:1.25rem;display:flex;align-items:center;justify-content:space-between;gap:0.6rem">
      <span>📐 分析參數</span>
      <select id="settings-cfg-group" onchange="_cfgGroup=this.value;renderCfgOptions()"
        style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem;padding:0.35rem 0.5rem;font-family:inherit"></select>
    </div>
    <p style="font-size:0.78rem;color:var(--muted);margin:0.25rem 0 0.75rem">相對市價／抵買雷達／議價指數／email 用嘅數字，改完即時生效（有上下限自動修正）。用右上角揀分類，睇某個 tab／功能用嘅參數。</p>
    <div id="settings-cfg-list" style="display:flex;flex-direction:column;gap:0.7rem"></div>
  </div>
</div>

<!-- Comp (參考成交) Modal -->
<div class="modal-overlay" id="compModalOverlay" style="display:none" onclick="if(event.target===this)closeCompModal()">
  <div class="modal" style="max-width:520px">
    <button class="modal-close" onclick="closeCompModal()">✕</button>
    <div class="modal-title" id="comp-modal-title" style="font-size:1rem"></div>
    <div class="modal-sub">參考成交(近 12 個月)</div>
    <div id="comp-modal-body" style="margin-top:0.5rem"></div>
  </div>
</div>

<!-- Viewing Modal -->
<div class="modal-overlay" id="viewingModalOverlay" style="display:none" onclick="if(event.target===this)closeViewingModal()">
  <div class="modal" style="max-width:520px;max-height:90vh;overflow-y:auto">
    <button class="modal-close" onclick="closeViewingModal()">✕</button>
    <div class="modal-title">＋ 新增睇樓記錄</div>
    <div class="modal-sub" id="viewing-modal-estate-name"></div>
    <form id="viewingForm" onsubmit="submitViewing(event)">
      <label class="vf-label">睇樓日期<span>*</span></label>
      <input class="vf-input" type="date" id="vf-date" required>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem">
        <div>
          <label class="vf-label">座數<span>*</span></label>
          <input class="vf-input" type="text" id="vf-block" placeholder="例：3座" required>
        </div>
        <div>
          <label class="vf-label">樓層<span>*</span></label>
          <input class="vf-input" type="text" id="vf-floor" placeholder="例：高層" required>
        </div>
        <div>
          <label class="vf-label">室<span>*</span></label>
          <input class="vf-input" type="text" id="vf-unit" placeholder="例：A室" required>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem">
        <div>
          <label class="vf-label">實用呎數<span>*</span></label>
          <input class="vf-input" type="number" id="vf-size" placeholder="呎" min="1" required>
        </div>
        <div>
          <label class="vf-label">方向</label>
          <select class="vf-select" id="vf-direction">
            <option value="">-- 不選 --</option>
            <option>東</option><option>南</option><option>西</option><option>北</option>
            <option>東南</option><option>東北</option><option>西南</option><option>西北</option>
          </select>
        </div>
        <div>
          <label class="vf-label">房數<span>*</span></label>
          <select class="vf-select" id="vf-bedrooms">
            <option value="1">1房</option>
            <option value="2" selected>2房</option>
            <option value="3">3房</option>
          </select>
        </div>
      </div>

      <div class="vf-row2">
        <div>
          <label class="vf-label">售價（萬）<span>*</span></label>
          <input class="vf-input" type="number" id="vf-price" placeholder="例：880" min="1" step="0.01" required>
        </div>
        <div>
          <label class="vf-label">管理費/呎<span>*</span></label>
          <input class="vf-input" type="number" id="vf-mgmt" placeholder="$" min="0" step="0.01" required>
        </div>
      </div>

      <label class="vf-label">備注</label>
      <div id="vf-notes-chips" style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.45rem"></div>
      <textarea class="vf-input" id="vf-notes-text" placeholder="自由輸入備注…" rows="2" style="margin-bottom:0.6rem;resize:vertical;font-family:inherit;font-size:inherit"></textarea>

      <label class="vf-label">圖片（可選）</label>
      <label class="vf-upload-label">
        <span>📷</span> 上傳圖片
        <input type="file" id="vf-images" multiple accept="image/*" style="display:none" onchange="previewImages(this)">
      </label>
      <div class="vf-img-preview" id="vf-img-preview"></div>

      <button type="submit" class="vf-submit">儲存記錄</button>
    </form>
  </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-mobile-bar">
      <button class="sidebar-home-btn" onclick="goHome();closeSidebar()">🏠 主頁</button>
      <button class="sidebar-close-btn" onclick="closeSidebar()">✕ 關閉</button>
    </div>

// 幫任何表格加「固定表頭 + 淨係顯示約10行 + 上下左右都可以喺框入面拉」
// 效果(同最新放盤表一致)。做法:先用 auto layout render 一次完整表
// (thead+tbody)量度瀏覽器實際計出嚟嘅每欄闊度(照顧晒全部行嘅內容,
// 唔止得第一行),即刻拆做兩個表——表頭獨立一個唔捲動嘅細表格,表身
// 留喺可捲動嘅框(限高 rowsToShow 行),兩個表用返量到嘅 colgroup +
// table-layout:fixed 鎖定對齊,再用 JS 雙向同步橫向捲動位置。
// container:要接管嘅 div(全部由呢個 function 生成,原有 innerHTML 會被覆蓋)。
// theadTr:<thead><tr> 入面嘅內容(一串 <th>...</th>)。
// tbodyHtml:<tbody> 入面嘅內容(一串 <tr>...</tr>)。
// 返 { headerWrap, bodyWrap } 俾 caller 有需要可以再操作。
function renderFrozenTable(container, theadTr, tbodyHtml, rowsToShow = 10, tableClass = 'data-table') {
  if (!container) return null;
  container.innerHTML = `<div class="table-scroll"><table class="${tableClass}"><thead><tr>${theadTr}</tr></thead><tbody>${tbodyHtml}</tbody></table></div>`;
  const measureTable = container.querySelector('table');
  const colWidths = Array.from(measureTable.querySelectorAll('thead th')).map(th => th.getBoundingClientRect().width);
  const totalWidth = colWidths.reduce((a, b) => a + b, 0);
  const colgroupHtml = colWidths.length ? `<colgroup>${colWidths.map(w => `<col style="width:${w}px">`).join('')}</colgroup>` : '';
  const fixedStyle = `table-layout:fixed;width:${totalWidth}px`;
  container.innerHTML = `
    <div class="table-scroll-header"><table class="${tableClass}" style="${fixedStyle}">${colgroupHtml}<thead><tr>${theadTr}</tr></thead></table></div>
    <div class="table-scroll table-scroll-capped"><table class="${tableClass}" style="${fixedStyle}">${colgroupHtml}<tbody>${tbodyHtml}</tbody></table></div>`;
  const headerWrap = container.children[0];
  const bodyWrap = container.children[1];
  let guard = false;
  headerWrap.onscroll = () => { if (guard) return; guard = true; bodyWrap.scrollLeft = headerWrap.scrollLeft; guard = false; };
  bodyWrap.onscroll = () => { if (guard) return; guard = true; headerWrap.scrollLeft = bodyWrap.scrollLeft; guard = false; };
  const bodyRows = bodyWrap.querySelectorAll('tbody tr');
  const n = Math.min(rowsToShow, bodyRows.length);
  let h = 0;
  for (let i = 0; i < n; i++) h += bodyRows[i].offsetHeight;
  if (h > 0) bodyWrap.style.maxHeight = h + 'px';
  return { headerWrap, bodyWrap };
}

// ── API calls ──────────────────────────────────────────────────
function getToken() { return localStorage.getItem("propwatch_token"); }

async function api(path, opts = {}) {
  const token = getToken();
  const res = await fetch(API + path, {
    headers: { "Content-Type": "application/json", ...(token ? { "Authorization": "Bearer " + token } : {}) },
    ...opts,
  });
  if (res.status === 401) { showLoginScreen(); throw new Error("請先登入"); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "請求失敗");
  return data;
}

function showLoginScreen() {
  localStorage.removeItem("propwatch_token");

}

  document.getElementById('login-mode-toggle').textContent = isReg ? '已有帳戶？登入' : '未有帳戶？註冊';
  document.getElementById('login-error').style.display = 'none';
}
function loginSubmit() { _loginMode === 'register' ? doRegister() : doLogin(); }

async function doLogin() {
  const username = document.getElementById("login-username").value.trim();
  const password = document.getElementById("login-password").value;
  const errEl = document.getElementById("login-error");
  errEl.style.display = "none";
  try {
    const data = await fetch(API + "/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    }).then(async r => { const d = await r.json(); if (!r.ok) throw new Error(d.error); return d; });
    localStorage.setItem("propwatch_token", data.token);
    hideLoginScreen();
    loadEstates();
    loadNotesOptions();
    checkFirstLoginPrefs();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

async function doRegister() {
  const username = document.getElementById("login-username").value.trim();
  const password = document.getElementById("login-password").value;
  const password2 = document.getElementById("login-password2").value;
  const errEl = document.getElementById("login-error");
  errEl.style.display = "none";
  if (password !== password2) {
    errEl.textContent = "兩次密碼唔一致";
    errEl.style.display = "block";
    return;
  }
  try {
    const data = await fetch(API + "/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    }).then(async r => { const d = await r.json(); if (!r.ok) throw new Error(d.error); return d; });
    localStorage.setItem("propwatch_token", data.token);
    hideLoginScreen();
    loadEstates();
    loadNotesOptions();
    checkFirstLoginPrefs();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

        <div><div style="font-size:0.75rem;color:var(--muted)">已配對</div><div style="font-size:1.4rem;font-weight:600">${s.count}<span style="font-size:0.8rem;color:var(--muted);font-weight:400"> 宗</span></div></div>
      </div>
      <p style="font-size:0.75rem;color:var(--muted);margin-bottom:0.5rem">已下架放盤配對到對應成交,計叫價與實際成交嘅落差(負數＝低於叫價成交)。配對靠 座+室+面積+時序,樓層為遮蔽故信心分「高/中」。</p>
      <div id="askingSoldWrap"></div>`;
    renderFrozenTable(
      document.getElementById('askingSoldWrap'),
      `<th style="padding:0.3rem 0.5rem 0.3rem 0">屋苑 / 單位</th><th style="text-align:right;padding:0.3rem 0.5rem">叫價</th><th style="text-align:right;padding:0.3rem 0.5rem">成交</th><th style="text-align:right;padding:0.3rem 0.5rem">落差</th><th style="text-align:right;padding:0.3rem 0 0.3rem 0.5rem">登記 · 信心</th>`,
      rows
    );
  } catch (e) {
    body.innerHTML = `<span style="color:var(--down)">載入失敗:${escHtml(e.message)}</span>`;
  }
}

let _compsData = [];
const _wan = n => (n / 10000).toLocaleString(undefined, { maximumFractionDigits: 0 });
// Single-block estates store the estate name as the block — don't repeat it.
const _unitTitle = v => {
  const blk = (v.block && String(v.block) !== v.estate_name) ? escHtml(String(v.block)) + '座' : '';
  return `${blk}${escHtml(String(v.floor))}樓${escHtml(String(v.unit))}室`;
};

async function loadViewingComps() {
  const body = document.getElementById('comps-body');
  try {
    const r = await api('/api/viewings/comps');
    _compsData = r.items || [];
    if (!_compsData.length) {
      body.innerHTML = '<span style="color:var(--muted)">未有睇樓記錄。喺屋苑頁「睇樓記錄」新增,呢度就會顯示參考成交。</span>';
      return;
    }
    _lastViewings = _compsData;   // 俾 ✓/✕ (confirm/dismiss) 搵返個 viewing

    // 對應在售放盤:攞每個「追蹤中」屋苑嘅在售放盤,計匹配(前身係「追蹤中放盤」
    // tab,而家併入呢度)。listings 存落 window._matchListingsByEstate,俾
    // buildMatchCell(靠 allListings) 同 confirm/dismiss re-render 用返啱嘅屋苑。
    const _listed0 = _compsData.filter(v => v.status !== 'sold');
    const _estIds = [...new Set(_listed0.map(v => v.estate_id).filter(Boolean))];
    window._matchListingsByEstate = {};
    await Promise.all(_estIds.map(async eid => {
      try { const { listings } = await api(`/api/estates/${eid}/listings`); window._matchListingsByEstate[eid] = listings || []; }
      catch (_) { window._matchListingsByEstate[eid] = []; }
    }));
    const matchHtmlById = {};
    { const _saved = allListings;
      for (const v of _listed0) { allListings = window._matchListingsByEstate[v.estate_id] || []; matchHtmlById[v.id] = buildMatchCell(v); }
      allListings = _saved; }

    const cardHead = v => `<div style="display:flex;justify-content:space-between;align-items:baseline;gap:0.5rem;flex-wrap:wrap">
        <div style="font-size:0.9rem;font-weight:600;color:var(--text)">${escHtml(v.estate_name)} · ${_unitTitle(v)}</div>
        <div style="font-size:0.75rem;color:var(--muted)">${v.size_net || '?'}呎${v.bedrooms ? ' · ' + v.bedrooms + '房' : ''}</div>
      </div>`;

    const listedCard = v => {
      let badge = '';
      if (v.range && v.verdict != null) {
        if (v.verdict <= -3) badge = `<span style="color:var(--up);font-size:0.75rem;font-weight:600">低於參考 ${Math.abs(v.verdict)}% · 偏抵</span>`;
        else if (v.verdict >= 3) badge = `<span style="color:var(--down);font-size:0.75rem;font-weight:600">高於參考 ${v.verdict}% · 偏貴</span>`;
        else badge = `<span style="color:var(--muted);font-size:0.75rem">約市價</span>`;
      }
      const rangeTxt = v.range
        ? `$${_wan(v.range.price_low)}–${_wan(v.range.price_high)}萬 <span style="color:var(--muted);font-size:0.75rem">@$${v.range.ppf_low.toLocaleString()}–${v.range.ppf_high.toLocaleString()}</span>`
        : `<span style="color:var(--muted)">近12個月冇足夠參考成交</span>`;
      // 對應在售放盤(前身係「追蹤中放盤」tab)。有匹配先顯示;✓/✕ 掣要
      // stopPropagation,唔好連埋觸發成張卡嘅 openCompModal。
      const match = matchHtmlById[v.id];
      const hasMatch = match && match !== '-' && !match.includes('冇匹配');
      const matchRow = hasMatch
        ? `<div onclick="event.stopPropagation()" style="margin-top:0.35rem;padding-top:0.35rem;border-top:1px solid var(--border)">
             <div style="font-size:0.72rem;color:var(--muted);margin-bottom:0.15rem">對應在售放盤</div>
             <div id="vmatch-${v.id}">${match}</div>
           </div>` : '';
      return `<div onclick="openCompModal(${v.id})" style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.7rem 0.85rem;margin-bottom:0.5rem;cursor:pointer">
        ${cardHead(v)}
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:0.5rem;flex-wrap:wrap;margin-top:0.35rem">
          <div style="font-size:0.8rem;color:var(--muted)">睇樓價 <span style="color:var(--text);font-weight:600">$${_wan(v.price)}萬</span></div>
          ${badge}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:0.5rem;margin-top:0.35rem;padding-top:0.35rem;border-top:1px solid var(--border)">
          <div style="font-size:0.8rem;color:var(--accent)">推算 ${rangeTxt}</div>
          <div style="font-size:0.75rem;color:var(--muted);white-space:nowrap">${v.comp_count} 宗參考 ›</div>
        </div>
        ${matchRow}
      </div>`;
    };

    const soldCard = v => {
      const vs = v.sold.vs_view;
      const gap = vs == null ? '' : `<span style="font-size:0.75rem;color:${vs <= 0 ? 'var(--up)' : 'var(--down)'}">成交 ${vs > 0 ? '+' : ''}${vs}% ${vs <= 0 ? '低於' : '高於'}睇樓價</span>`;
      return `<div onclick="openCompModal(${v.id})" style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.7rem 0.85rem;margin-bottom:0.5rem;cursor:pointer">
        ${cardHead(v)}
        <div style="display:flex;justify-content:space-between;align-items:center;gap:0.5rem;flex-wrap:wrap;margin-top:0.35rem">
          <div style="font-size:0.8rem;color:var(--muted)">睇樓價 <span style="color:var(--text)">$${_wan(v.price)}萬</span> → 成交價 <span style="color:var(--up);font-weight:700">$${_wan(v.sold.price)}萬</span></div>
          <div style="font-size:0.75rem;color:var(--muted);white-space:nowrap">${v.sold.reg_date} · ${v.comp_count} 宗參考 ›</div>
        </div>
        ${gap ? `<div style="margin-top:0.3rem">${gap}</div>` : ''}
      </div>`;
    };

    const sold = _compsData.filter(v => v.status === 'sold');
    const listed = _compsData.filter(v => v.status !== 'sold');
    const heading = (t, n) => `<div style="font-size:0.9rem;font-weight:700;color:var(--text);margin:0.2rem 0 0.5rem">${t} <span style="color:var(--muted);font-size:0.75rem;font-weight:400">${n}</span></div>`;
    body.innerHTML =
      (listed.length ? heading('🔍 未成交(追蹤中)', listed.length) +
        `<p style="font-size:0.75rem;color:var(--muted);margin:-0.2rem 0 0.5rem">配近 12 個月同屋苑可比成交推算合理價,同埋對應返而家市面嘅在售放盤。撳卡睇詳情。</p>` +
        listed.map(listedCard).join('') : '') +
      (sold.length ? `<div style="height:0.4rem"></div>` + heading('✅ 已成交', sold.length) +
        `<p style="font-size:0.75rem;color:var(--muted);margin:-0.2rem 0 0.5rem">呢啲單位睇完之後已經成交,顯示真實成交價。</p>` +
        sold.map(soldCard).join('') : '');
  } catch (e) {
    body.innerHTML = `<span style="color:var(--down)">載入失敗:${escHtml(e.message)}</span>`;
  }
}

function openCompModal(id) {
  const v = _compsData.find(x => x.id === id);
  if (!v) return;
  const tierLabel = { 1: '① 同一線(同座同室 · 上下層)', 2: '② 同座 · 相近面積', 3: '③ 同屋苑 · 相近面積' };
  const vFloor = parseInt(String(v.floor).replace(/\D/g, '')) || null;
  let html = '';
  for (const tier of [1, 2, 3]) {
    const rows = v.comps.filter(c => c.tier === tier);
    if (!rows.length) continue;
    html += `<div style="font-size:0.78rem;color:var(--muted);margin:0.75rem 0 0.35rem">${tierLabel[tier]}</div>`;
    html += `<table style="width:100%;border-collapse:collapse;font-size:0.82rem"><tbody>` + rows.map(c => {
      const cFloor = parseInt(String(c.floor).replace(/\D/g, '')) || null;
      const diff = (tier === 1 && vFloor && cFloor) ? ` <span style="color:var(--muted);font-size:0.75rem">(${cFloor > vFloor ? '+' : ''}${cFloor - vFloor}層)</span>` : '';
      return `<tr style="border-top:1px solid var(--border)">
        <td style="padding:0.35rem 0.4rem 0.35rem 0;color:var(--text)">${escHtml(String(c.building))}${escHtml(String(c.floor))}${escHtml(String(c.unit))}${diff}</td>
        <td style="text-align:right;padding:0.35rem 0.4rem;color:var(--muted)">${c.size_net || '?'}呎</td>
        <td style="text-align:right;padding:0.35rem 0.4rem;white-space:nowrap">$${_wan(c.price)}萬</td>
        <td style="text-align:right;padding:0.35rem 0.4rem;white-space:nowrap;color:var(--muted)">@$${(c.price_per_ft || 0).toLocaleString()}</td>
        <td style="text-align:right;padding:0.35rem 0 0.35rem 0.4rem;white-space:nowrap;color:var(--muted);font-size:0.75rem">${c.reg_date}</td>
      </tr>`;
    }).join('') + `</tbody></table>`;
  }
  if (!html) html = '<div style="color:var(--muted);font-size:0.85rem;padding:0.5rem 0">近 12 個月冇同屋苑可比成交。</div>';
  const ownPpf = (v.price && v.size_net) ? Math.round(v.price / v.size_net) : null;
  // Already-sold: real transaction price is the headline; otherwise the estimate.
  let headBox;
  if (v.status === 'sold' && v.sold) {
    const vs = v.sold.vs_view;
    const gap = vs == null ? '' : ` <span style="font-size:0.78rem;color:${vs <= 0 ? 'var(--up)' : 'var(--down)'}">(較睇樓價 ${vs > 0 ? '+' : ''}${vs}%)</span>`;
    headBox = `<div style="background:rgba(16,185,129,0.1);border:1px solid var(--up);border-radius:8px;padding:0.5rem 0.7rem;margin-bottom:0.5rem"><span style="color:var(--muted);font-size:0.78rem">本單位真實成交 </span><span style="color:var(--up);font-weight:700">$${_wan(v.sold.price)}萬</span> <span style="color:var(--muted);font-size:0.75rem">${v.sold.reg_date}</span>${gap}</div>`;
  } else {
    const rangeTxt = v.range ? `$${_wan(v.range.price_low)}–${_wan(v.range.price_high)}萬 (@$${v.range.ppf_low.toLocaleString()}–${v.range.ppf_high.toLocaleString()})` : '近 12 個月冇足夠參考';
    headBox = `<div style="background:rgba(251,191,36,0.08);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.7rem;margin-bottom:0.5rem"><span style="color:var(--muted);font-size:0.78rem">推算合理價 </span><span style="color:var(--accent);font-weight:600">${rangeTxt}</span></div>`;
  }
  const blkRaw = (v.block && String(v.block) !== v.estate_name) ? String(v.block) + '座' : '';
  document.getElementById('comp-modal-title').textContent = `${v.estate_name} · ${blkRaw}${v.floor}樓${v.unit}室`;
  document.getElementById('comp-modal-body').innerHTML =
    `<div style="font-size:0.82rem;color:var(--muted);margin-bottom:0.5rem">${v.size_net || '?'}呎${v.bedrooms ? ' · ' + v.bedrooms + '房' : ''} · 睇樓價 <span style="color:var(--text);font-weight:600">$${_wan(v.price)}萬</span>${ownPpf ? ` @$${ownPpf.toLocaleString()}` : ''}</div>
     ${headBox}
     ${html}`;
  document.getElementById('compModalOverlay').style.display = 'flex';
}
function closeCompModal() { document.getElementById('compModalOverlay').style.display = 'none'; }

async function loadTodayHighlights() {
  const body = document.getElementById("highlights-body");
  const dateEl = document.getElementById("highlights-date");
  if (!body) return;
  try {
    const data = await api("/api/today-highlights");
    if (dateEl) dateEl.textContent = data.date || "";
    const fmt = p => p ? `$${(p/1e4).toFixed(0)}萬` : "-";
    const pct = (n, o) => o ? ((n-o)/o*100).toFixed(1) : null;
    // Shared row renderer — mirrors buildEmailHtml columns exactly
    // Each section returns <tr> rows; caller wraps in <table>
    const srcLink = (url, source) => {
      const label = sourceLabel(source);
      return url
        ? `<a href="${safeUrl(url)}" target="_blank" class="hl-link" style="font-size:0.75rem">${label} ↗</a>`
        : `<span style="font-size:0.75rem;color:var(--muted)">${label}</span>`;
    };
    const TR = (c1, c2, c3, c4, c5='') =>
      `<tr class="hl-tr"><td class="hl-c1">${c1}</td><td class="hl-c2">${c2}</td><td class="hl-c3">${c3}</td><td class="hl-c4">${c4}</td><td class="hl-c5">${c5}</td></tr>`;
    const TH = (h1, h2, h3, h4, h5='') =>
      `<thead><tr class="hl-th"><th class="hl-c1">${h1}</th><th class="hl-c2">${h2}</th><th class="hl-c3">${h3}</th><th class="hl-c4">${h4}</th><th class="hl-c5">${h5}</th></tr></thead>`;
    const tbl = (headers, rows) => `<table class="hl-table">${headers}<tbody>${rows}</tbody></table>`;

    const hlTxnQueue = [];
    let html = "";

    // 對應放盤售價變動
    const linkedChanges = data.linkedPriceChanges || [];
    if (linkedChanges.length) {
      let rows = "";
      for (const c of linkedChanges) {
        const diff = c.new_price - c.old_price;
        const diffHtml = `<span style="color:${diff<=0?'var(--up)':'var(--down)'}">${diff<=0?'▼':'▲'} ${fmt(Math.abs(diff))}</span>`;
        const link = c.detail_url ? `<a href="${safeUrl(c.detail_url)}" target="_blank" style="color:var(--accent2);text-decoration:none">↗</a>` : '';
        rows += TR(
          `<strong>${escHtml(c.estate_name||'')}</strong> ${escHtml(c.building_name||'')} ${escHtml(c.floor||'')} ${escHtml(c.l_unit||'')} ${link}`,
          c.view_price ? fmt(c.view_price) : '-',
          `<span style="text-decoration:line-through">${fmt(c.old_price)}</span>`,
          `<span style="font-weight:700;color:var(--accent)">${fmt(c.new_price)}</span>`,
          diffHtml
        );
      }
      html += `<div class="highlights-group" style="border:1px solid rgba(251,191,36,0.35);border-radius:8px;padding:0.75rem;background:rgba(251,191,36,0.06);margin-bottom:1rem"><div class="highlights-group-label" style="color:#fbbf24;font-size:0.9rem;margin-bottom:0.5rem">🏷️ 睇過嘅放盤售價變動 (${linkedChanges.length})</div>${tbl(TH('屋苑 / 單位','睇樓價','原價','新價','變動'), rows)}</div>`;
    }

    // 睇過嘅單位成交 — consolidated at top across all estates
    const allViewedTxns = (data.byEstate || []).flatMap(e => (e.viewedTxns || []).map(v => ({ ...v, estate_name: e.estate })));
    if (allViewedTxns.length) {
      let rows = "";
      for (const v of allViewedTxns) {
        const diff = v.view_price && v.txn_price ? v.txn_price - v.view_price : null;
        const diffHtml = diff != null
          ? `<span style="color:${diff<=0?'var(--up)':'var(--down)'}">${diff<=0?'▼':'▲'} ${fmt(Math.abs(diff))}</span>`
          : '-';
        rows += TR(
          `<strong>${escHtml(v.estate_name||'')}</strong> ${escHtml(v.building||'')} ${escHtml(v.floor||'')} ${escHtml(v.unit||'')}`,
          v.view_price ? fmt(v.view_price) : '-',
          `<span style="font-weight:700;color:var(--accent)">${v.txn_price ? fmt(v.txn_price) : '-'}</span>`,
          diffHtml,
          `<span style="font-size:0.75rem">${v.view_date||''}</span>`
        );
      }
      html += `<div class="highlights-group" style="border:1px solid rgba(248,113,113,0.35);border-radius:8px;padding:0.75rem;background:rgba(248,113,113,0.06);margin-bottom:1rem"><div class="highlights-group-label" style="color:#f87171;font-size:0.9rem;margin-bottom:0.5rem">👀 睇過嘅單位成交 (${allViewedTxns.length})</div>${tbl(TH('屋苑 / 單位','睇樓價','成交價','差價','睇樓日期'), rows)}</div>`;
    }

    syncHlPrefChips();
    for (const _g of (data.byEstate || [])) {
      const estate = _g.estate;
      // 跟用戶睇樓偏好篩（🎯 chip 可以熄）；「睇過嘅盤」兩組喺上面，唔經呢度
      const newTransactions = (_g.newTransactions || []).filter(prefMatchHl);
      const priceChanges = (_g.priceChanges || []).filter(prefMatchHl);
      const newListings = (_g.newListings || []).filter(prefMatchHl);
      const removedListings = (_g.removedListings || []).filter(prefMatchHl);
      let inner = "";

      if (newTransactions.length) {
        let rows = "";
        for (let ti = 0; ti < newTransactions.length; ti++) {
          const t = newTransactions[ti];
          const years = t.held_days ? t.held_days / 365 : null;
          const heldStr = years ? years.toFixed(1) + '年' : '-';
          let gainHtml = '-';
          if (t.gain_pct != null && years) {
            const annualPct = (Math.pow(1 + t.gain_pct / 100, 1 / years) - 1) * 100;
            const cls = t.gain_pct >= 0 ? 'gain-pos' : 'gain-neg';
            const arrow = t.gain_pct >= 0 ? '▲' : '▼';
            gainHtml = `<span class="${cls}">${arrow} ${Math.abs(annualPct).toFixed(1)}%/年</span><div class="unit-price">${arrow} ${Math.abs(t.gain_pct).toFixed(1)}%</div>`;
          } else if (t.gain_pct != null) {
            const cls = t.gain_pct >= 0 ? 'gain-pos' : 'gain-neg';
            gainHtml = `<span class="${cls}">${t.gain_pct>=0?'▲':'▼'} ${Math.abs(t.gain_pct).toFixed(1)}%</span>`;
          }
          const rowId = `hl-txn-${estate.replace(/\s/g,'')}-${ti}`;
          rows += `<tr class="hl-tr">
            <td class="hl-c1">${escHtml(t.building||'')} ${escHtml(t.floor||'')} ${escHtml(t.unit||'')}</td>
            <td class="hl-c2">${t.size_net ? t.size_net+'實呎' : ''}</td>
            <td class="hl-c3"><span style="font-weight:700;color:var(--accent)">${t.price ? fmt(t.price) : '-'}</span><span id="${rowId}-diff"></span></td>
            <td class="hl-c4">${heldStr}<div class="unit-price">${gainHtml}</div></td>
            <td class="hl-c5"><span id="${rowId}-val" style="color:var(--accent)"></span></td>
            <td class="hl-c6">${t.detail_url ? `<a href="${safeUrl(t.detail_url)}" target="_blank" class="hl-link">詳情 ↗</a>` : ''}</td>
          </tr>`;
          hlTxnQueue.push({ rowId, estate, t });
        }
        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:#a78bfa">🏠 新成交 (${newTransactions.length})</div>${tbl(TH('單位','面積','成交價','持有 / 升跌','恆生估值',''), rows)}</div>`;
      }

      if (priceChanges.length) {
        let rows = "";
        for (const c of priceChanges) {
          const d = pct(c.new_price, c.old_price);
          const col = d > 0 ? 'var(--up)' : 'var(--down)';
          rows += TR(
            `${escHtml(c.building_name||'')} ${escHtml(c.floor||'')} ${escHtml(c.unit||'')}`,
            `<span style="text-decoration:line-through">${fmt(c.old_price)}</span>`,
            `<span style="font-weight:700">${fmt(c.new_price)}</span>${c.ref_no ? `<br><button class="history-btn" style="font-size:0.75rem;padding:0.1rem 0.35rem;margin-top:0.2rem" onclick="showHistory('${escHtml(c.ref_no)}','${escHtml((c.building_name||'')+' '+(c.floor||'')+(c.unit||''))}')">歷史 ↓</button>` : ''}`,
            `<span style="color:${col}">${d>0?'▲':'▼'} ${Math.abs(d)}%</span>`,
            srcLink(c.detail_url, c.source)
          );
        }
        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:var(--accent)">💰 售價變動 (${priceChanges.length})</div>${tbl(TH('單位','原價','新價','變動','來源'), rows)}</div>`;
      }

      if (newListings.length) {
        let rows = "";
        for (const l of newListings) {
          rows += TR(

        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:var(--up)">🆕 新放盤 (${newListings.length})</div>${tbl(TH('單位','房間 / 面積','價格','呎價','來源'), rows)}</div>`;
      }

      if (removedListings.length) {
        let rows = "";
        for (const l of removedListings) {
          rows += TR(
            `${escHtml(l.building_name||'')} ${escHtml(l.floor||'')} ${escHtml(l.unit||'')}`,
            l.bedrooms!=null ? l.bedrooms+'房' : '-',
            `<span style="text-decoration:line-through">${fmt(l.price)}</span>`,
            '',
            srcLink(l.detail_url, l.source)
          );
        }
        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:var(--down)">❌ 已下架 (${removedListings.length})</div>${tbl(TH('單位','房間','原價','','來源'), rows)}</div>`;
      }

      if (inner) {
        const estateObj = dashboardEstates.find(e => e.name === estate);
        const hdr = estateObj
          ? `<div class="highlights-estate-header" style="cursor:pointer" onclick="showEstate(${estateObj.id},'${escHtml(estate).replace(/'/g,"\\'")}','${escHtml(estateObj.district||'').replace(/'/g,"\\'")}');closeSidebar()">${escHtml(estate)} <span style="font-size:0.75rem;color:var(--accent2);vertical-align:middle">↗</span></div>`
          : `<div class="highlights-estate-header">${escHtml(estate)}</div>`;
        html += `<div class="highlights-group">${hdr}${inner}</div>`;
      }
    }

    if (!html) html = `<span style="color:var(--muted)">今日暫無更新${_hlPrefFilterOn && _hlPrefsUsable() ? '（🎯 偏好 filter 開緊——右上角撳一下可以睇返全部）' : ''}</span>`;
    body.innerHTML = html;

    // Auto-fetch HS valuation for new transactions (throttled to avoid
    // tripping HSBC's own rate-limit when there are many at once)
    const HS_AUTOFETCH_CONCURRENCY = _appCfg.hs_autofetch_concurrency ?? 3;
    const hsQueue = [];
    for (const { rowId, estate: estateName, t } of hlTxnQueue) {
      const blockNum   = (t.building || '').match(/\d+/)?.[0] || '';
      const floorNum   = (t.floor || '').match(/\d+/)?.[0] || '';
      const flatLetter = (t.unit || '').replace(/[室層樓]/g, '').trim();
      if (!estateName || !blockNum || !floorNum || !flatLetter) continue;
      hsQueue.push({ rowId, estateName, blockNum, floorNum, flatLetter, t });
    }
    const runHsAutofetch = async () => {
      let item;
      while ((item = hsQueue.shift())) {
        const { rowId, estateName, blockNum, floorNum, flatLetter, t } = item;
        try {
          const eid = (dashboardEstates.find(e => e.name === estateName) || {}).id || '';
          const params = new URLSearchParams({ estate: estateName, block: blockNum, floor: floorNum, flat: flatLetter });
          if (eid) params.set('estateId', eid);
          const hsData = await api(`/api/hangseng-valuation?${params}`);
          if (hsData?.price) {
            const hp = Number(hsData.price);
            const diffSpan = document.getElementById(rowId + '-diff');
            if (diffSpan) diffSpan.innerHTML = hsDiffHtml(hp, t.price);
            const valSpan = document.getElementById(rowId + '-val');
            if (valSpan) {
              valSpan.innerHTML = `${hsValHtml(hp)}<button class="history-btn" style="display:block;margin-top:3px" onclick="showHSHistory('${escJsAttr(blockNum)}','${escJsAttr(floorNum)}','${escJsAttr(flatLetter)}','${eid}')">歷史</button>`;
            }
          }
        } catch {}
      }
    };
    for (let i = 0; i < HS_AUTOFETCH_CONCURRENCY; i++) runHsAutofetch();
  } catch(e) {
    if (body) body.innerHTML = `<span style="color:var(--muted)">載入失敗</span>`;
  }
}

async function loadHistoryHighlights(months) {
  const body = document.getElementById("history-body");
  if (!body) return;
  body.innerHTML = `<span style="color:var(--muted)">載入中…</span>`;
  try {
    const data = await api(`/api/history-highlights?months=${months}`);
    const fmt = p => p ? `$${(p/1e4).toFixed(0)}萬` : "-";
    const pct = (n, o) => o ? ((n-o)/o*100).toFixed(1) : null;
    const lnk = url => url ? `<a href="${safeUrl(url)}" target="_blank" class="hl-link">詳情 ↗</a>` : '';
    const TR = (c1, c2, c3, c4, c5='') =>
      `<tr class="hl-tr"><td class="hl-c1">${c1}</td><td class="hl-c2">${c2}</td><td class="hl-c3">${c3}</td><td class="hl-c4">${c4}</td><td class="hl-c5">${c5}</td></tr>`;
    const TH = (h1, h2, h3, h4, h5='') =>
      `<thead><tr class="hl-th"><th class="hl-c1">${h1}</th><th class="hl-c2">${h2}</th><th class="hl-c3">${h3}</th><th class="hl-c4">${h4}</th><th class="hl-c5">${h5}</th></tr></thead>`;
    const tbl = (headers, rows) => `<table class="hl-table">${headers}<tbody>${rows}</tbody></table>`;

    let html = "";

    // 對應放盤售價變動
    const linkedChanges = data.linkedPriceChanges || [];
    if (linkedChanges.length) {
      let rows = "";
      for (const c of linkedChanges) {
        const diff = c.new_price - c.old_price;
        const diffHtml = `<span style="color:${diff<=0?'var(--up)':'var(--down)'}">${diff<=0?'▼':'▲'} ${fmt(Math.abs(diff))}</span>`;
        const link = c.detail_url ? `<a href="${safeUrl(c.detail_url)}" target="_blank" style="color:var(--accent2);text-decoration:none">↗</a>` : '';
        rows += TR(
          `<strong>${escHtml(c.estate_name||'')}</strong> ${escHtml(c.building_name||'')} ${escHtml(c.floor||'')} ${escHtml(c.l_unit||'')} ${link}`,
          c.view_price ? fmt(c.view_price) : '-',
          `<span style="text-decoration:line-through">${fmt(c.old_price)}</span>`,
          `<span style="font-weight:700;color:var(--accent)">${fmt(c.new_price)}</span>`,
          diffHtml

      }
      html += `<div class="highlights-group" style="border:1px solid rgba(251,191,36,0.35);border-radius:8px;padding:0.75rem;background:rgba(251,191,36,0.06);margin-bottom:1rem"><div class="highlights-group-label" style="color:#fbbf24;font-size:0.9rem;margin-bottom:0.5rem">🏷️ 睇過嘅放盤售價變動 (${linkedChanges.length})</div>${tbl(TH('屋苑 / 單位','睇樓價','原價','新價','變動'), rows)}</div>`;
    }

    // 睇過嘅單位成交 — at top
    const allViewedTxns = data.allViewedTxns || [];

      let rows = "";
      for (const v of allViewedTxns) {
        const diff = v.view_price && v.txn_price ? v.txn_price - v.view_price : null;
        const diffHtml = diff != null
          ? `<span style="color:${diff<=0?'var(--up)':'var(--down)'}">${diff<=0?'▼':'▲'} ${fmt(Math.abs(diff))}</span>`
          : '-';
        rows += TR(
          `${v.reg_date||v.first_seen||''}`,
          `<span style="color:var(--text)"><strong>${escHtml(v.estate_name||'')}</strong> ${escHtml(v.building||'')} ${escHtml(v.floor||'')} ${escHtml(v.unit||'')}</span>`,
          v.view_price ? fmt(v.view_price) : '-',
          `<span style="font-weight:700;color:var(--accent)">${v.txn_price ? fmt(v.txn_price) : '-'}</span>`,
          diffHtml
        );
      }
      html += `<div class="highlights-group" style="border:1px solid rgba(248,113,113,0.35);border-radius:8px;padding:0.75rem;background:rgba(248,113,113,0.06);margin-bottom:1rem"><div class="highlights-group-label" style="color:#f87171;font-size:0.9rem;margin-bottom:0.5rem">👀 睇過嘅單位成交 (${allViewedTxns.length})</div>${tbl(TH('成交日期','屋苑 / 單位','睇樓價','成交價','差價'), rows)}</div>`;
    }

    syncHlPrefChips();
    for (const _g of (data.byEstate || [])) {

      // 跟用戶睇樓偏好篩（🎯 chip 可以熄）

      const priceChanges = (_g.priceChanges || []).filter(prefMatchHl);
      const newListings = (_g.newListings || []).filter(prefMatchHl);
      const removedListings = (_g.removedListings || []).filter(prefMatchHl);
      let inner = "";

      if (newTransactions.length) {
        let rows = "";

          const years = t.held_days ? t.held_days / 365 : null;

          if (t.gain_pct != null && years) {
            const annualPct = (Math.pow(1 + t.gain_pct / 100, 1 / years) - 1) * 100;
            const cls = t.gain_pct >= 0 ? 'gain-pos' : 'gain-neg';
            const arrow = t.gain_pct >= 0 ? '▲' : '▼';
            gainHtml = `<span class="${cls}">${arrow} ${Math.abs(annualPct).toFixed(1)}%/年</span><div class="unit-price">${arrow} ${Math.abs(t.gain_pct).toFixed(1)}%</div>`;
          }
          rows += TR(
            `${escHtml(t.building||'')} ${escHtml(t.floor||'')} ${escHtml(t.unit||'')}`,
            `${t.size_net ? t.size_net+'實呎' : ''}<div class="unit-price">${t.first_seen||''}</div>`,
            `<span style="font-weight:700;color:var(--accent)">${t.price ? fmt(t.price) : '-'}</span>`,
            `${heldStr}<div class="unit-price">${gainHtml}</div>`,
            lnk(t.detail_url)

        }
        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:#a78bfa">🏠 新成交 (${newTransactions.length})</div>${tbl(TH('單位','面積 / 日期','成交價','持有 / 升跌',''), rows)}</div>`;
      }

      if (priceChanges.length) {

        for (const c of priceChanges) {

          const col = d > 0 ? 'var(--up)' : 'var(--down)';
          rows += TR(
            `<span style="color:var(--muted)">${c.new_date||''}</span>`,
            `${escHtml(c.building_name||'')} ${escHtml(c.floor||'')} ${escHtml(c.unit||'')}`,
            `<span style="text-decoration:line-through">${fmt(c.old_price)}</span>`,
            `<span style="font-weight:700">${fmt(c.new_price)}</span>`,
            `<span style="color:${col}">${d>0?'▲':'▼'} ${Math.abs(d)}%</span>`
          );
        }
        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:var(--accent)">💰 售價變動 (${priceChanges.length})</div>${tbl(TH('變動日期','單位','原價','新價','變動'), rows)}</div>`;
      }

      if (newListings.length) {
        let rows = "";
        for (const l of newListings) {
          rows += TR(
            `<span style="color:var(--muted)">${l.first_seen_date||''}</span>`,
            `${escHtml(l.building_name||'')} ${escHtml(l.floor||'')} ${escHtml(l.unit||'')}`,
            `${l.bedrooms!=null?l.bedrooms+'房':'-'}${l.size_net?' '+l.size_net+'呎':''}`,
            `<span style="font-weight:700;color:var(--accent)">${fmt(l.price)}</span>`,
            l.price_per_ft ? `$${Math.round(l.price_per_ft).toLocaleString()}/呎` : ''
          );
        }
        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:var(--up)">🆕 新放盤 (${newListings.length})</div>${tbl(TH('上盤日期','單位','房間 / 面積','價格','呎價'), rows)}</div>`;
      }

      if (removedListings.length) {
        let rows = "";
        for (const r of removedListings) {
          rows += TR(
            `<span style="color:var(--muted)">${r.last_seen_date||''}</span>`,
            `${escHtml(r.building_name||'')} ${escHtml(r.floor||'')} ${escHtml(r.unit||'')}`,
            r.bedrooms != null ? `${r.bedrooms}房` : '-',
            `<span style="text-decoration:line-through">${fmt(r.price)}</span>`,
            lnk(r.detail_url)
          );
        }
        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:var(--down)">❌ 已下架 (${removedListings.length})</div>${tbl(TH('下架日期','單位','房間','原價',''), rows)}</div>`;
      }

      if (inner) {
        const estateObj = dashboardEstates.find(e => e.name === estate);
        const hdr = estateObj
          ? `<div class="highlights-estate-header" style="cursor:pointer" onclick="showEstate(${estateObj.id},'${escHtml(estate).replace(/'/g,"\\'")}','${escHtml(estateObj.district||'').replace(/'/g,"\\'")}');closeSidebar()">${escHtml(estate)} <span style="font-size:0.75rem;color:var(--accent2);vertical-align:middle">↗</span></div>`
          : `<div class="highlights-estate-header">${escHtml(estate)}</div>`;
        html += `<div class="highlights-group">${hdr}${inner}</div>`;

    }
    if (!html) html = `<span style="color:var(--muted)">所選時段內暫無動態${_hlPrefFilterOn && _hlPrefsUsable() ? '（🎯 偏好 filter 開緊——右上角撳一下可以睇返全部）' : ''}</span>`;
    body.innerHTML = html;
  } catch(e) {
    if (body) body.innerHTML = `<span style="color:var(--muted)">載入失敗</span>`;
  }
}
