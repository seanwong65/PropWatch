name = "propwatch-worker"
main = "index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "propwatch-db"
database_id = "b4330ef2-78c4-48be-ae88-b1d94614faad"

# HKT = UTC+8.  "0 16 * * *" = 00:00 HKT → daily sync (all sources).
#               "0 1 * * *"  = 09:00 HKT → "今日動態" email (separate invocation).
[triggers]
crons = ["0 16 * * *", "0 1 * * *"]
