async function loadEstateInfo(estateId) {
  const bar = document.getElementById("estate-info-bar");
  if (!bar) return;
  try {
    const info = await api(`/api/estates/${estateId}/estate-info`);
    const currentYear = new Date().getFullYear();
    const rows = [];
    if (info.completion_year) rows.push(['樓齡', `${currentYear - info.completion_year} 年`]);
    if (info.phases)          rows.push(['期數', `${info.phases} 期`]);
    if (info.blocks)          rows.push(['座數', `${info.blocks} 座`]);
    if (info.total_units)     rows.push(['單位數目', `${info.total_units.toLocaleString()} 個`]);
    if (info.developer)       rows.push(['發展商', info.developer]);
    const tracking = bar.dataset.tracking;
    if (tracking) rows.push(['追蹤天數', `${tracking} 天`]);
    if (!rows.length) return;
    bar.innerHTML = `
      <div style="margin-top:0.75rem;background:var(--surface2);border-radius:var(--radius);padding:0.75rem 1rem;display:inline-flex;flex-wrap:wrap;gap:0.5rem 1.5rem">
        ${rows.map(([label, val]) => `
          <div style="display:flex;flex-direction:column;gap:0.1rem">
            <span style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em">${escHtml(label)}</span>
            <span style="font-size:0.85rem;font-weight:600;color:var(--text)">${escHtml(val)}</span>
          </div>`).join('')}
      </div>`;
  } catch { /* silently skip if unavailable */ }
}

function hsValHtml(hsPrice) {
  return `<span class="price-cell">$${(hsPrice/1e4).toFixed(0)}萬</span>`;
}

function hsDiffHtml(hsPrice, txnPrice) {
  if (!hsPrice || !txnPrice) return '';
  const pct = (hsPrice - txnPrice) / txnPrice * 100;
  const absPct = Math.abs(pct).toFixed(1);
  if (pct >= 0) return `<div class="unit-price"><span class="gain-pos">比估值低 ${absPct}%</span></div>`;
  return `<div class="unit-price"><span class="gain-neg">比估值高 ${absPct}%</span></div>`;
}

async function fetchHSVal(rowId, estate, block, floor, flat, estateId, txnPrice) {
  const span = document.getElementById(rowId);
  const btn = document.getElementById(rowId + '-btn');
  if (!span) return;
  if (btn) { btn.disabled = true; btn.textContent = '查詢中…'; }
  try {
    const params = new URLSearchParams({ estate, block, floor, flat });
    if (estateId) params.set('estateId', estateId);
    const data = await api(`/api/hangseng-valuation?${params}`);
    const histBtn = `<div style="margin-top:4px"><button class="history-btn" onclick="showHSHistory('${block}','${floor}','${flat}','${estateId}')">歷史</button></div>`;
    span.innerHTML = hsValHtml(Number(data.price)) + histBtn;
    const diffSpan = document.getElementById(rowId + '-diff');
    if (diffSpan) diffSpan.innerHTML = hsDiffHtml(Number(data.price), txnPrice);
    if (btn) { btn.disabled = false; btn.textContent = '查估值'; }
  } catch {
    span.textContent = '－';
    if (btn) { btn.disabled = false; btn.textContent = '查估值'; }
  }
}

async function showHSHistory(block, floor, flat, estateId) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      <div class="modal-title">恆生估值歷史</div>
      <div class="modal-sub">${block}座 ${floor}樓 ${flat}室</div>
      <div id="hsHistoryContent"><div class="loading"><div class="spinner"></div> 載入中…</div></div>
    </div>
  `;
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  try {
    const { history } = await api(`/api/hangseng-valuation-history?estateId=${estateId}&block=${encodeURIComponent(block)}&floor=${encodeURIComponent(floor)}&flat=${encodeURIComponent(flat)}`);
    const content = document.getElementById("hsHistoryContent");
    if (!history.length) { content.innerHTML = '<div class="no-data">暫無歷史記錄</div>'; return; }
    const rows = history.map(h => `
      <tr>
        <td>${h.fetched_at?.slice(0,10) || '-'}</td>
        <td class="price-cell">$${(h.price/1e4).toFixed(0)}萬</td>
        <td class="unit-price">${h.valuation_date || '-'}</td>
      </tr>
    `).join('');
    content.innerHTML = `<table class="history-table"><thead><tr><th>查詢日期</th><th>估值</th><th>估值日期</th></tr></thead><tbody>${rows}</tbody></table>`;
  } catch (err) {
    document.getElementById("hsHistoryContent").innerHTML = `<div class="no-data">載入失敗：${err.message}</div>`;
  }
}

function switchTab(tab, estateId) {
  document.querySelectorAll(".estate-tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".estate-tab").forEach(t => {
    if (t.getAttribute("onclick")?.includes(`'${tab}'`)) t.classList.add("active");
  });
  document.getElementById("tab-listings").style.display = tab === "listings" ? "" : "none";
  document.getElementById("tab-transactions").style.display = tab === "transactions" ? "" : "none";
  document.getElementById("tab-viewings").style.display = tab === "viewings" ? "" : "none";
  const batchBtn = document.getElementById("batch-hs-btn");
  if (batchBtn) batchBtn.style.display = (tab === "transactions" || tab === "viewings") ? "" : "none";
  if (tab === "transactions") loadTransactions(estateId, 0, false);
  if (tab === "viewings") loadViewings(estateId);
}

// ── Viewing modal ──────────────────────────────────────────────
let _viewingEstateId = null;
let _lastViewings = [];
let _viewingEstateName = '';
let _viewingImages = []; // [{dataUrl, file}]
let _viewingEditId = null;

let _notesOptions = [];

async function loadNotesOptions() {
  try {
    const r = await api('/api/settings');
    _notesOptions = (r.notes_options || '').split('\n').map(s => s.trim()).filter(Boolean);
  } catch(_) {}
}

function findMatchingListings(viewing) {
  if (!viewing.block || !viewing.unit) return [];
  const blockNum = String(viewing.block).replace(/[座]/g, '').trim().toUpperCase();
  const unitNorm = String(viewing.unit).replace(/[室號]/g, '').trim().toUpperCase();
  const beds = Number(viewing.bedrooms) || 0;
  return (allListings || []).filter(l => {
    if (l.removed_date) return false;
    const lBlockRaw = String(l.building_name || '').replace(/[座]/g, '').trim().toUpperCase();
    const lBlock = lBlockRaw.match(/\d+/)?.[0] || lBlockRaw;
    const lUnit = String(l.unit || '').replace(/[室號]/g, '').trim().toUpperCase();
    const lBeds = Number(l.bedrooms) || 0;
    return lBlock === blockNum && lUnit === unitNorm && (!beds || !lBeds || lBeds === beds);
  });
}

function buildMatchCell(v) {
  if (!v.block || !v.unit) return '-';
  const matches = findMatchingListings(v);
  const confirmed = v.linked_ref_no;
  if (!matches.length && !confirmed) return '<span style="color:var(--muted);font-size:0.75rem">冇匹配</span>';

  // If confirmed but listing no longer in allListings, show fallback
  if (confirmed && !matches.find(l => l.ref_no === confirmed)) {
    return `<span style="color:var(--muted);font-size:0.75rem">已確認 (已下架)</span>
      <button onclick="confirmViewingListing(${v.id},null)" style="font-size:0.68rem;background:none;border:none;color:var(--muted);cursor:pointer;padding:0">✕ 取消</button>`;
  }

  const dismissed = new Set(JSON.parse(v.dismissed_refs || '[]'));
  if (!matches.length && !confirmed) return '<span style="color:var(--muted);font-size:0.75rem">冇匹配</span>';

  return matches.map(l => {
    const isConfirmed = confirmed && l.ref_no === confirmed;
    const isDismissed = !isConfirmed && dismissed.has(l.ref_no);
    const price = l.price ? `$${(l.price/1e4).toFixed(0)}萬` : '';
    const floorLabel = escHtml(l.floor || '');
    const linkStyle = `color:var(--accent2);text-decoration:${isDismissed ? 'line-through' : 'none'};opacity:${isDismissed ? '0.4' : '1'}`;
    const link = l.detail_url ? `<a href="${escHtml(l.detail_url)}" target="_blank" style="${linkStyle}">${floorLabel} ${price} ↗</a>` : `<span style="${linkStyle}">${floorLabel} ${price}</span>`;
    const confirmOnclick = isConfirmed ? `confirmViewingListing(${v.id},null)` : `confirmViewingListing(${v.id},'${escHtml(l.ref_no||'')}')`;
    const confirmStyle = isConfirmed
      ? `font-size:0.68rem;background:var(--accent2);border:none;border-radius:4px;color:#fff;cursor:pointer;padding:1px 5px`
      : `font-size:0.68rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;padding:1px 5px;display:${(confirmed || isDismissed) ? 'none' : ''}`;
    const rowOpacity = confirmed && !isConfirmed ? '0.3' : '1';
    const xBtn = !isConfirmed && !confirmed
      ? isDismissed
        ? `<button onclick="dismissViewingListing(${v.id},'${escHtml(l.ref_no||'')}',true)" style="font-size:0.68rem;background:none;border:none;color:var(--muted);cursor:pointer;padding:1px 3px" title="取消刪除線">✕</button>`
        : `<button onclick="dismissViewingListing(${v.id},'${escHtml(l.ref_no||'')}')" style="font-size:0.68rem;background:none;border:none;color:var(--muted);cursor:pointer;padding:1px 3px" title="唔係呢個">✕</button>`
      : '';
    return `<div style="font-size:0.78rem;display:flex;align-items:center;gap:0.3rem;opacity:${rowOpacity}">${link}
      <button onclick="${confirmOnclick}" style="${confirmStyle}" ${isConfirmed ? 'title="取消"' : ''}>✓</button>${xBtn}
    </div>`;
  }).join('');
}

async function dismissViewingListing(viewingId, refNo, reverse = false) {
  const v = _lastViewings?.find(v => v.id === viewingId);
  if (!v) return;
  const dismissed = new Set(JSON.parse(v.dismissed_refs || '[]'));
  reverse ? dismissed.delete(refNo) : dismissed.add(refNo);
  v.dismissed_refs = dismissed.size ? JSON.stringify([...dismissed]) : null;
  api(`/api/viewings/${viewingId}`, { method: 'PATCH', body: JSON.stringify({ dismissed_refs: v.dismissed_refs }) }).catch(() => {});
  const cell = document.getElementById(`vmatch-${viewingId}`);
  if (cell) cell.innerHTML = buildMatchCell(v);
}

async function confirmViewingListing(viewingId, refNo) {
  api(`/api/viewings/${viewingId}`, { method: 'PATCH', body: JSON.stringify({ linked_ref_no: refNo }) }).catch(() => {});
  const cell = document.getElementById(`vmatch-${viewingId}`);
  if (!cell) return;
  if (!refNo) {
    const v = _lastViewings?.find(v => v.id === viewingId);
    if (v) { v.linked_ref_no = null; cell.innerHTML = buildMatchCell(v); }
    return;
  }
  // highlight confirmed, grey out others, add unlink button
  cell.querySelectorAll('div').forEach(div => {
    const btn = div.querySelector('button');
    if (btn && btn.getAttribute('onclick')?.includes(`'${refNo}'`)) {
      div.style.opacity = '1';
      btn.textContent = '✓';
      btn.style.background = 'var(--accent2)';
      btn.style.color = '#fff';
      btn.style.border = 'none';
      btn.setAttribute('onclick', `confirmViewingListing(${viewingId},null)`);
      btn.title = '取消';
    } else {
      div.style.opacity = '0.3';
      if (btn) btn.style.display = 'none';
    }
  });
}

function getNotesOptions() {
  return _notesOptions;
}

function populateNotesSelect(currentValue) {
  const opts = getNotesOptions();
  const selected = new Set((currentValue || '').split(',').map(s => s.trim()).filter(Boolean));
  // find the "free text" part — anything not in preset opts
  const presetSelected = [...selected].filter(s => opts.includes(s));
  const freeText = [...selected].filter(s => !opts.includes(s)).join(', ');
  const container = document.getElementById('vf-notes-chips');
  container.innerHTML = opts.map(o => {
    const active = presetSelected.includes(o);
    return `<button type="button" class="notes-chip${active ? ' active' : ''}" onclick="toggleNotesChip(this,'${escHtml(o)}')">${escHtml(o)}</button>`;
  }).join('');
  document.getElementById('vf-notes-text').value = freeText;
}

function toggleNotesChip(btn, val) {
  btn.classList.toggle('active');
}

function getNotesValue() {
  const chips = [...document.querySelectorAll('#vf-notes-chips .notes-chip.active')].map(b => b.textContent.trim());
  const text = document.getElementById('vf-notes-text').value.trim();
  return [...chips, ...(text ? [text] : [])].join(', ') || null;
}

function openSettingsModal() {
  document.getElementById('settingsModalOverlay').style.display = 'flex';
  document.getElementById('settings-notes-options').value = _notesOptions.join('\n');
}

function closeSettingsModal() {
  document.getElementById('settingsModalOverlay').style.display = 'none';
}

async function saveSettings() {
  const val = document.getElementById('settings-notes-options').value;
  await api('/api/settings', { method: 'PUT', body: JSON.stringify({ notes_options: val }) });
  _notesOptions = val.split('\n').map(s => s.trim()).filter(Boolean);
  closeSettingsModal();
}

function openViewingModal(viewing = null) {
  if (!_viewingEstateId) return;
  _viewingEditId = viewing ? viewing.id : null;
  document.getElementById('viewingModalOverlay').style.display = 'flex';
  document.getElementById('viewing-modal-estate-name').textContent = _viewingEstateName;
  document.querySelector('#viewingModalOverlay .modal-title').textContent = viewing ? '✏️ 更改睇樓記錄' : '＋ 新增睇樓記錄';
  const today = new Date(Date.now() + 8*3600000).toISOString().slice(0,10);
  document.getElementById('vf-date').value = viewing ? viewing.view_date : today;
  document.getElementById('vf-block').value = viewing ? (viewing.block || '') : '';
  document.getElementById('vf-floor').value = viewing ? viewing.floor : '';
  document.getElementById('vf-unit').value = viewing ? viewing.unit : '';
  document.getElementById('vf-size').value = viewing ? viewing.size_net : '';
  document.getElementById('vf-bedrooms').value = viewing ? (viewing.bedrooms || 2) : 2;
  document.getElementById('vf-direction').value = viewing ? (viewing.direction || '') : '';
  document.getElementById('vf-price').value = viewing ? (viewing.price / 10000) : '';
  document.getElementById('vf-mgmt').value = viewing ? (viewing.mgmt_fee || '') : '';
  populateNotesSelect(viewing ? (viewing.notes || '') : '');
  const preview = document.getElementById('vf-img-preview');
  preview.innerHTML = '';
  _viewingImages = [];
  if (viewing?.images) {
    const existing = JSON.parse(viewing.images);
    existing.forEach(dataUrl => {
      const idx = _viewingImages.length;
      _viewingImages.push({ dataUrl });
      const thumb = document.createElement('div');
      thumb.className = 'vf-img-thumb';
      thumb.innerHTML = `<img src="${dataUrl}"><button type="button" class="vf-img-rm" onclick="removeViewingImg(${idx})">✕</button>`;
      preview.appendChild(thumb);
    });
  }
  if (!viewing) {
    api(`/api/viewings/last-mgmt-fee?estate_id=${_viewingEstateId}`).then(r => {
      if (r?.mgmt_fee) document.getElementById('vf-mgmt').value = r.mgmt_fee;
    }).catch(() => {});
  }
}

function closeViewingModal() {
  document.getElementById('viewingModalOverlay').style.display = 'none';
}

function previewImages(input) {
  const files = [...input.files];
  const preview = document.getElementById('vf-img-preview');
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = e => {
      const idx = _viewingImages.length;
      _viewingImages.push({ dataUrl: e.target.result, file });
      const thumb = document.createElement('div');
      thumb.className = 'vf-img-thumb';
      thumb.innerHTML = `<img src="${e.target.result}"><button type="button" class="vf-img-rm" onclick="removeViewingImg(${idx})">✕</button>`;
      preview.appendChild(thumb);
    };
    reader.readAsDataURL(file);
  }
  input.value = '';
}

function removeViewingImg(idx) {
  _viewingImages[idx] = null;
  const thumbs = document.querySelectorAll('.vf-img-thumb');
  if (thumbs[idx]) thumbs[idx].remove();
}

async function submitViewing(e) {
  e.preventDefault();
  const btn = e.target.querySelector('.vf-submit');
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    const images = _viewingImages.filter(Boolean).map(i => i.dataUrl);
    const price = Math.round(parseFloat(document.getElementById('vf-price').value) * 10000);
    const body = {
      estate_id: _viewingEstateId,
      view_date: document.getElementById('vf-date').value,
      block: document.getElementById('vf-block').value.trim(),
      floor: document.getElementById('vf-floor').value.trim(),
      unit: document.getElementById('vf-unit').value.trim(),
      size_net: parseInt(document.getElementById('vf-size').value),
      bedrooms: parseInt(document.getElementById('vf-bedrooms').value) || 2,
      direction: document.getElementById('vf-direction').value || null,
      price,
      mgmt_fee: parseFloat(document.getElementById('vf-mgmt').value) || null,
      images: images.length ? JSON.stringify(images) : null,
      notes: getNotesValue(),
    };
    let savedId;
    if (_viewingEditId) {
      await api(`/api/viewings/${_viewingEditId}`, { method: 'PUT', body: JSON.stringify(body) });
      savedId = _viewingEditId;
    } else {
      const res = await api('/api/viewings', { method: 'POST', body: JSON.stringify(body) });
      savedId = res.id;
    }
    closeViewingModal();
    if (document.getElementById('tab-viewings')?.style.display !== 'none') {
      await loadViewings(_viewingEstateId);
    }
    // Auto-fetch HS valuation in background
    fetchViewingHSVal(savedId, body.block, body.floor, body.unit, body.price);
  } catch(err) {
    alert('儲存失敗，請再試');
  } finally {
    btn.disabled = false; btn.textContent = '儲存記錄';
  }
}

async function fetchViewingHSVal(viewingId, block, floor, unit, price) {
  if (!viewingId || !_viewingEstateName || !block || !floor || !unit) return;
  try {
    const floorNum = String(floor).replace(/[^0-9]/g, '');
    const flatLetter = String(unit).replace(/[^A-Za-z0-9]/g, '');
    if (!floorNum || !flatLetter) return;
    const params = new URLSearchParams({ estate: _viewingEstateName, block, floor: floorNum, flat: flatLetter, estateId: _viewingEstateId });
    const data = await api(`/api/hangseng-valuation?${params}`);
    if (data.price) {
      await api(`/api/viewings/${viewingId}`, { method: 'PATCH', body: JSON.stringify({ hs_price: Number(data.price) }) });
      const cell = document.getElementById(`vhs-${viewingId}`);
      if (cell) cell.innerHTML = hsValHtml(Number(data.price)) + hsDiffHtml(Number(data.price), price);
    }
  } catch {}
}

async function manualFetchViewingHSVal(viewingId, estateId, block, floor, unit, price) {
  const cell = document.getElementById(`vhs-${viewingId}`);
  if (cell) cell.innerHTML = '<span style="color:var(--muted);font-size:0.75rem">查詢中…</span>';
  const prevEstateId = _viewingEstateId;
  const prevName = _viewingEstateName;
  // Temporarily set estate context if needed
  if (!_viewingEstateId) _viewingEstateId = estateId;
  if (!_viewingEstateName) {
    const titleEl = document.querySelector('.estate-title');
    if (titleEl) _viewingEstateName = titleEl.textContent.trim();
  }
  await fetchViewingHSVal(viewingId, block, floor, unit, price);
  if (!prevEstateId) _viewingEstateId = null;
  if (!prevName) _viewingEstateName = '';
  if (cell && !cell.innerHTML.includes('萬')) {
    cell.innerHTML = '<span style="color:var(--muted);font-size:0.75rem">查無資料</span>';
  }
}

async function loadViewings(estateId) {
  const panel = document.getElementById('tab-viewings');
  if (!panel) return;
  panel.innerHTML = '<div class="listings-section"><div class="loading"><div class="spinner"></div> 載入睇樓記錄…</div></div>';
  try {
    const { viewings } = await api(`/api/viewings?estate_id=${estateId}`);
    _lastViewings = viewings;
    const tabBtn = document.getElementById('tab-btn-viewings');
    if (tabBtn) tabBtn.textContent = `睇樓記錄(${viewings?.length || 0})`;
    if (!viewings?.length) {
      panel.innerHTML = '<div class="listings-section" style="padding:1.5rem;color:var(--muted);text-align:center">未有睇樓記錄<br><small>按「新增睇樓」新增第一個記錄</small></div>';
      return;
    }
    const fmt = p => p ? `$${(p/1e4).toFixed(p%10000===0?0:1)}萬` : '-';
    window._viewingImgsMap = {};
    window._viewingMap = {};
    const rows = viewings.map(v => {
      const imgs = v.images ? JSON.parse(v.images) : [];
      window._viewingImgsMap[v.id] = imgs;
      window._viewingMap[v.id] = v;
      const imgHtml = imgs.length ? `<img class="viewing-card-img" src="${imgs[0]}" onclick="viewImgFull(${v.id},0)" style="height:56px;border-radius:4px;cursor:pointer;margin-top:0.3rem">${imgs.length>1?`<span style="font-size:0.72rem;color:var(--muted);display:block;margin-top:2px">+${imgs.length-1} 張</span>`:''}` : '';
      const fmtBlock = v.block ? ((/座$/.test(v.block) ? v.block : v.block+'座')) : null;
      const fmtFloor = v.floor ? ((/樓$/.test(v.floor)||/層$/.test(v.floor) ? v.floor : v.floor+'樓')) : null;
      const fmtUnit = v.unit ? ((/室$/.test(v.unit)||/號$/.test(v.unit) ? v.unit : v.unit+'室')) : null;
      const unitStr = [fmtBlock, fmtFloor, fmtUnit].filter(Boolean).map(s => escHtml(s)).join(' ');
      const mgmtMonthly = v.mgmt_fee ? (v.mgmt_fee > 100 ? Math.round(v.mgmt_fee) : (v.size_net ? Math.round(v.mgmt_fee * v.size_net) : null)) : null;
      const psfStr = v.price && v.size_net ? `$${Math.round(v.price/v.size_net).toLocaleString()}/呎` : '-';
      const vData = encodeURIComponent(JSON.stringify(v));
      const hsCell = v.hs_price
        ? hsValHtml(v.hs_price) + hsDiffHtml(v.hs_price, v.price)
        : `<button class="hs-val-btn" onclick="manualFetchViewingHSVal(${v.id},${estateId},'${escHtml(v.block||'')}','${escHtml(v.floor)}','${escHtml(v.unit)}',${v.price||0})">查估值</button>`;
      return `<tr>
        <td>${v.view_date}</td>
        <td><strong>${unitStr}</strong>${v.direction ? `<br><span style="color:var(--muted);font-size:0.75rem">向${escHtml(v.direction)}</span>` : ''}</td>
        <td>${v.bedrooms ? v.bedrooms+'房' : '-'}</td>
        <td>${v.size_net ? v.size_net+'呎' : '-'}</td>
        <td style="color:var(--accent)"><strong>${fmt(v.price)}</strong><br><span style="color:var(--muted);font-size:0.75rem">${psfStr}</span></td>
        <td id="vhs-${v.id}">${hsCell}</td>
        <td id="vprev-${v.id}"><span style="color:var(--muted);font-size:0.72rem;cursor:pointer" onclick="fetchUnitTxn(${v.id})">查詢</span></td>
        <td>${v.txn_price && v.txn_reg_date >= v.view_date ? `<span style="color:var(--accent)"><strong>${fmt(v.txn_price)}</strong></span><br><span style="color:var(--muted);font-size:0.75rem">${v.txn_reg_date}</span>` : '-'}</td>
        <td>${mgmtMonthly ? `$${mgmtMonthly.toLocaleString()}/月` : '-'}</td>
        <td id="vmatch-${v.id}">${buildMatchCell(v)}</td>
        <td>${v.notes ? `<span style="font-size:0.78rem;background:var(--surface2);border-radius:4px;padding:0.15rem 0.4rem">${escHtml(v.notes)}</span>` : '-'}</td>
        <td>${imgHtml || '-'}</td>
        <td style="white-space:nowrap">
          <button class="viewing-del-btn" onclick='openViewingModal(JSON.parse(decodeURIComponent("${vData}")))' title="更改" style="background:var(--surface2);margin-right:0.3rem">✏️</button>
          <button class="viewing-del-btn" onclick="deleteViewing(${v.id},${estateId})" title="刪除">🗑</button>
        </td>
      </tr>`;
    }).join('');
    panel.innerHTML = `<div class="listings-section" style="overflow-x:auto">
      <table class="history-table" style="min-width:700px;white-space:nowrap">
        <thead><tr>
          <th>睇樓日期</th><th>單位</th><th>房數</th><th>實用面積</th><th>售價</th><th>恒生估值</th><th>上次購買</th><th>成交記錄</th><th>管理費(每月)</th><th>對應放盤</th><th>備注</th><th>圖片</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

    // Auto-fetch 上次購買 for all rows using DetailByUnitCode
    for (const v of viewings) {
      fetchUnitTxn(v.id);
      await new Promise(r => setTimeout(r, 300));
    }
  } catch {
    panel.innerHTML = '<div class="listings-section" style="padding:1.5rem;color:var(--muted);text-align:center">載入失敗</div>';
  }
}

async function fetchUnitTxn(viewingId) {
  const v = window._viewingMap?.[viewingId];
  if (!v) return;
  const cell = document.getElementById(`vprev-${viewingId}`);
  if (!cell) return;
  const fmt = p => p ? `$${(p/1e4).toFixed(0)}萬` : '-';
  const building = /座$/.test(v.block||'') ? v.block : (v.block||'') + '座';
  const floor    = /[樓層]$/.test(v.floor||'') ? v.floor : (v.floor||'') + '樓';
  const unit     = /[室號]$/.test(v.unit||'') ? v.unit : (v.unit||'') + '室';
  try {
    const params = new URLSearchParams({ estate: _viewingEstateName, building, floor, unit, view_date: v.view_date || '' });
    const data = await api(`/api/viewings/unit-txn?${params}`);
    const t = data.txn;
    if (!t?.price) {
      cell.innerHTML = data.estateUrl
        ? `<a href="${data.estateUrl}" target="_blank" style="color:var(--muted);font-size:0.72rem">查歷史↗</a>`
        : '-';
      return;
    }
    const dateStr = t.reg_date ? t.reg_date.slice(0, 7) : null;
    const linkStart = data.estateUrl ? `<a href="${data.estateUrl}" target="_blank" style="text-decoration:none">` : '';
    const linkEnd = data.estateUrl ? '</a>' : '';
    cell.innerHTML = `${linkStart}<span style="color:var(--muted)"><strong>${fmt(t.price)}</strong></span>${dateStr ? `<br><span style="color:var(--muted);font-size:0.75rem">${dateStr}</span>` : ''}${linkEnd}`;
  } catch { cell.innerHTML = '-'; }
}

async function deleteViewing(id, estateId) {
  if (!confirm('確定刪除這個睇樓記錄？')) return;
  await api(`/api/viewings/${id}`, { method: 'DELETE' });
  loadViewings(estateId);
}

function viewImgFull(viewingId, startIdx) {
  const images = window._viewingImgsMap[viewingId] || [];
  if (!images.length) return;
  let cur = startIdx || 0;

  const ov = document.createElement('div');
  ov.id = 'img-lightbox';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center';

  const render = () => {
    const thumbs = images.map((src, i) => `<img src="${src}" data-i="${i}" style="height:64px;width:64px;object-fit:cover;border-radius:4px;cursor:pointer;flex-shrink:0;border:2.5px solid ${i===cur?'#e53e3e':'transparent'};opacity:${i===cur?1:0.6};transition:border 0.15s,opacity 0.15s">`).join('');
    ov.innerHTML = `
      <button onclick="document.getElementById('img-lightbox').remove()" style="position:absolute;top:1rem;right:1.2rem;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;line-height:1;z-index:1">✕</button>
      <div style="position:relative;display:flex;align-items:center;justify-content:center;width:100%;max-height:78vh">
        ${images.length>1?`<button onclick="event.stopPropagation();_lbNav(-1)" style="position:absolute;left:1rem;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:2rem;padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer;z-index:1">‹</button>`:''}
        <img id="lb-main" src="${images[cur]}" style="max-width:88vw;max-height:76vh;border-radius:6px;box-shadow:0 8px 32px rgba(0,0,0,0.7);object-fit:contain">
        ${images.length>1?`<button onclick="event.stopPropagation();_lbNav(1)" style="position:absolute;right:1rem;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:2rem;padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer;z-index:1">›</button>`:''}
      </div>
      ${images.length>1?`<div id="lb-thumbs" style="display:flex;gap:0.5rem;margin-top:1rem;overflow-x:auto;max-width:92vw;padding:0.3rem 0.5rem">${thumbs}</div>`:''}
      <div style="color:rgba(255,255,255,0.5);font-size:0.8rem;margin-top:0.5rem">${cur+1} / ${images.length}</div>`;
    ov.querySelector('#lb-thumbs')?.querySelectorAll('img').forEach(el => {
      el.addEventListener('click', e => { e.stopPropagation(); cur = +el.dataset.i; render(); });
    });
  };

  window._lbNav = (dir) => {
    cur = (cur + dir + images.length) % images.length;
    render();
  };

  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  document.addEventListener('keydown', function lbKey(e) {
    if (!document.getElementById('img-lightbox')) { document.removeEventListener('keydown', lbKey); return; }
    if (e.key === 'ArrowLeft') window._lbNav(-1);
    if (e.key === 'ArrowRight') window._lbNav(1);
    if (e.key === 'Escape') ov.remove();
  });

  document.body.appendChild(ov);
  render();
}


async function batchFetchHSVal() {
  const btn = document.getElementById("batch-hs-btn");
  const queryBtns = [...document.querySelectorAll('.hs-val-btn')].filter(b => b.textContent === '查估值' && !b.disabled);
  if (!queryBtns.length) { if (btn) { btn.textContent = '已全部查完'; setTimeout(() => { btn.textContent = '批量查估值'; }, 2000); } return; }
  if (btn) { btn.disabled = true; btn.textContent = `查詢中 0/${queryBtns.length}`; }
  for (let i = 0; i < queryBtns.length; i++) {
    if (btn) btn.textContent = `查詢中 ${i+1}/${queryBtns.length}`;
    queryBtns[i].click();
    await new Promise(r => setTimeout(r, 600));
  }
  if (btn) { btn.disabled = false; btn.textContent = '批量查估值'; }
}

let txnOffset = 0;
let txnEstateId = null;
let allTransactions = [];
let txnSortCol = "reg_date";
let txnSortDir = "desc";
let txnFilters = { dateMonths: 0, heldMin: '', heldMax: '', building: 'all', unit: 'all' };

function setTxnFilter(key, val) {
  txnFilters[key] = val;
  renderTransactionsTable(txnEstateId, txnOffset, !!document.querySelector(".load-more-btn"));
}

function applyHeldFilter() {
  txnFilters.heldMin = document.getElementById('txnHeldMin')?.value || '';
  txnFilters.heldMax = document.getElementById('txnHeldMax')?.value || '';
  renderTransactionsTable(txnEstateId, txnOffset, !!document.querySelector(".load-more-btn"));
}

function applyTxnFilters(txns) {
  return txns.filter(t => {
    if (txnFilters.dateMonths > 0) {
      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - txnFilters.dateMonths);
      if (!t.reg_date || new Date(t.reg_date) < cutoff) return false;
    }
    const years = t.held_days ? t.held_days / 365 : null;
    if (txnFilters.heldMin !== '' && (years === null || years < Number(txnFilters.heldMin))) return false;
    if (txnFilters.heldMax !== '' && (years === null || years > Number(txnFilters.heldMax))) return false;
    if (txnFilters.building !== 'all' && t.building !== txnFilters.building) return false;
    if (txnFilters.unit !== 'all' && t.unit !== txnFilters.unit) return false;
    return true;
  });
}

async function loadTransactions(estateId, offset, append) {
  txnEstateId = estateId;
  txnOffset = offset;
  const panel = document.getElementById("tab-transactions");

  if (!append) {
    panel.innerHTML = '<div class="listings-section"><div class="loading"><div class="spinner"></div> 載入中…</div></div>';
    txnFilters = { dateMonths: 0, heldMin: '', heldMax: '', building: 'all', unit: 'all' };
  } else {
    const btn = document.querySelector(".load-more-btn");
    if (btn) { btn.disabled = true; btn.textContent = '載入中…'; }
  }

  try {
    const { transactions } = await api(`/api/estates/${estateId}/transactions?offset=${offset}`);

    if (append) {
      allTransactions = allTransactions.concat(transactions);
    } else {
      allTransactions = transactions;
      txnSortCol = "reg_date";
      txnSortDir = "desc";
    }

    const hasMore = transactions.length >= 50;
    renderTransactionsTable(estateId, offset, hasMore);

    if (append && transactions.length === 0) {
      toast('已載入全部成交記錄', 'success');
    } else if (append) {
      toast(`已載入 ${transactions.length} 條記錄`, 'success');
    }
  } catch (err) {
    if (append) {
      const btn = document.querySelector(".load-more-btn");
      if (btn) { btn.disabled = false; btn.textContent = '載入更多…'; }
      toast(`載入失敗：${err.message}`, 'error');
    } else {
      panel.innerHTML = `<div class="listings-section"><div class="no-data">載入失敗：${err.message}</div></div>`;
    }
  }
}

function setTxnSort(col) {
  if (txnSortCol === col) txnSortDir = txnSortDir === "asc" ? "desc" : "asc";
  else { txnSortCol = col; txnSortDir = col === "reg_date" ? "desc" : "asc"; }
  renderTransactionsTable(txnEstateId, txnOffset, !!document.querySelector(".load-more-btn"));
}

function renderTransactionsTable(estateId, offset, hasMore) {
  const panel = document.getElementById("tab-transactions");
  if (!panel) return;
  const estateName = document.querySelector('.estate-title')?.textContent?.trim() || '';

  const colMap = {
    reg_date:       t => t.reg_date || '',
    price:          t => t.price || 0,
    price_per_ft:   t => t.price_per_ft_net || 0,
    held_days:      t => t.held_days || 0,
    gain_annual:    t => (t.held_days && t.gain_pct != null) ? (Math.pow(1 + t.gain_pct/100, 365/t.held_days) - 1)*100 : -Infinity,
    hs_price:       t => t.hs_price || 0,
  };
  const filtered = applyTxnFilters(allTransactions);
  const sorted = [...filtered].sort((a, b) => {
    const fn = colMap[txnSortCol] || (() => 0);
    const av = fn(a), bv = fn(b);
    return txnSortDir === "asc" ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });

  const thCols = [
    { key: "reg_date",     label: "登記日期" },
    { key: null,           label: "單位" },
    { key: "price",        label: "成交價" },
    { key: "price_per_ft", label: "實呎價" },
    { key: "held_days",    label: "持有年期" },
    { key: "gain_annual",  label: "升跌" },
    { key: "hs_price",     label: "恆生估值" },
    { key: null,           label: "查估值" },
    { key: null,           label: "" },
  ];
  const ths = thCols.map(c => {
    if (!c.key) return `<th>${c.label}</th>`;
    const cls = txnSortCol === c.key ? `sortable sort-${txnSortDir}` : "sortable";
    return `<th class="${cls}" onclick="setTxnSort('${c.key}')">${c.label}</th>`;
  }).join('');

  const rows = sorted.map((t, i) => {
    const years = t.held_days ? t.held_days / 365 : null;
    const heldStr = years ? years.toFixed(1) + '年' : '-';
    let annualHtml = '', totalHtml = '';
    if (t.gain_pct != null && years) {
      const annualPct = (Math.pow(1 + t.gain_pct / 100, 1 / years) - 1) * 100;
      const cls = t.gain_pct >= 0 ? 'gain-pos' : 'gain-neg';
      const arrow = t.gain_pct >= 0 ? '▲' : '▼';
      annualHtml = `<span class="${cls}">${arrow} ${Math.abs(annualPct).toFixed(1)}%/年</span>`;
      totalHtml = `<div class="unit-price">${arrow} ${Math.abs(t.gain_pct).toFixed(1)}%</div>`;
    } else if (t.gain_pct != null) {
      const cls = t.gain_pct >= 0 ? 'gain-pos' : 'gain-neg';
      annualHtml = `<span class="${cls}">${t.gain_pct >= 0 ? '▲' : '▼'} ${Math.abs(t.gain_pct).toFixed(1)}%</span>`;
    }
    const blockNum   = (t.building || '').match(/\d+/)?.[0] || t.building || '';
    const floorNum   = (t.floor || '').match(/\d+/)?.[0] || '';
    const flatLetter = (t.unit || '').replace(/[室層樓]/g, '').trim();
    const rowId = `txn-hs-${estateId}-s-${i}`;
    const canQuery = estateName && blockNum && floorNum && flatLetter;
    const onclickFetch = `fetchHSVal('${rowId}','${estateName.replace(/'/g,"\\'")}','${blockNum}','${floorNum}','${flatLetter.replace(/'/g,"\\'")}','${estateId}',${t.price||0})`;
    const onclickHist = `showHSHistory('${blockNum}','${floorNum}','${flatLetter.replace(/'/g,"\\'")}','${estateId}')`;
    const histBtn = t.hs_price ? `<div style="margin-top:4px"><button class="history-btn" onclick="${onclickHist}">歷史</button></div>` : '';
    const hsValCell = t.hs_price
      ? `<span id="${rowId}">${hsValHtml(t.hs_price)}${histBtn}</span>`
      : `<span id="${rowId}"></span>`;
    const hsQueryCell = canQuery
      ? `<button class="hs-val-btn" id="${rowId}-btn" onclick="${onclickFetch}">查估值</button>`
      : '-';
    return `<tr>
      <td class="txn-date">${t.reg_date || '-'}</td>
      <td>${escHtml(t.building||'')} ${escHtml(t.floor||'')} ${escHtml(t.unit||'')}</td>
      <td><span class="price-cell">$${t.price ? (t.price/1e4).toFixed(0)+'萬' : '-'}</span><span id="${rowId}-diff">${t.hs_price ? hsDiffHtml(t.hs_price, t.price) : ''}</span></td>
      <td>
        <div>$${t.price_per_ft_net ? t.price_per_ft_net.toLocaleString() : '-'}/呎</div>
        <div class="unit-price">實${t.size_net ? t.size_net+'呎' : ''}</div>
      </td>
      <td>${heldStr}</td>
      <td>${annualHtml}${totalHtml}</td>
      <td>${hsValCell}</td>
      <td>${hsQueryCell}</td>
      <td>${t.detail_url ? `<a href="${escHtml(t.detail_url)}" target="_blank" class="detail-link">詳情 ↗</a>` : ''}</td>
    </tr>`;
  }).join('');

  if (allTransactions.length === 0) {
    panel.innerHTML = '<div class="listings-section"><div class="no-data">暫無成交記錄</div></div>';
    return;
  }
  const datePresets = [
    { label: '所有', months: 0 },
    { label: '3個月', months: 3 },
    { label: '6個月', months: 6 },
    { label: '1年', months: 12 },
    { label: '2年', months: 24 },
    { label: '3年', months: 36 },
    { label: '5年', months: 60 },
  ];
  const txnBuildings = ["all", ...Array.from(new Set(allTransactions.map(t=>t.building).filter(Boolean))).sort()];
  const txnUnits = ["all", ...Array.from(new Set(allTransactions.map(t=>t.unit).filter(Boolean))).sort()];
  const txnSel = (key, opts) =>
    `<select class="filter-select" onchange="setTxnFilter('${key}',this.value)">${opts.map(o=>`<option value="${o}"${txnFilters[key]===o?'selected':''}>${o==='all'?'全部':o}</option>`).join('')}</select>`;
  const filterBar = `
    <div class="filter-bar">
      <div class="filter-pair">
        <span class="filter-label">登記日期</span>
        <div class="filter-group">
          ${datePresets.map(p => `<button class="filter-chip ${txnFilters.dateMonths===p.months?'active':''}" onclick="setTxnFilter('dateMonths',${p.months})">${p.label}</button>`).join('')}
        </div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">座</span>
        <div class="filter-group">${txnSel('building', txnBuildings)}</div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">單位</span>
        <div class="filter-group">${txnSel('unit', txnUnits)}</div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">持有年期</span>
        <div class="filter-group">
          <input class="filter-input" id="txnHeldMin" type="text" inputmode="decimal" placeholder="最少" value="${txnFilters.heldMin}" style="width:52px">
          <span style="color:var(--muted);font-size:0.75rem">–</span>
          <input class="filter-input" id="txnHeldMax" type="text" inputmode="decimal" placeholder="最多" value="${txnFilters.heldMax}" style="width:52px">
          <span class="filter-label">年</span>
          <button class="filter-chip" onclick="applyHeldFilter()">搜尋</button>
        </div>
      </div>
      <span class="filter-count">${filtered.length !== allTransactions.length ? `${filtered.length} / ${allTransactions.length} 條` : `${allTransactions.length} 條`}</span>
    </div>`;

  panel.innerHTML = `
    <div class="listings-section">
      ${filterBar}
      <div style="overflow-x:auto">
        <table style="min-width:700px;white-space:nowrap">
          <thead><tr>${ths}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${hasMore ? `<button class="load-more-btn" onclick="loadTransactions(${estateId}, ${allTransactions.length}, true)">載入更多…</button>` : ''}
      </div>
    </div>`;
}

function renderFilterBar() {
  const bar = document.getElementById("filterBar");
  if (!bar) return;
  const bedOptions = ["all","1","2","3","4+"];
  const floorOptions = ["all","高層","中層","低層"];
  // Dynamic options from current listings
  const buildings = ["all", ...Array.from(new Set((allListings||[]).map(l=>l.building_name).filter(Boolean))).sort()];
  const units = ["all", ...Array.from(new Set((allListings||[]).map(l=>l.unit).filter(Boolean))).sort()];
  const sel = (key, opts, labelFn) =>
    `<select class="filter-select" onchange="setFilter('${key}',this.value)">${opts.map(o=>`<option value="${o}"${filters[key]===o?'selected':''}>${labelFn(o)}</option>`).join('')}</select>`;
  bar.innerHTML = `
    <div class="filter-bar">
      <div class="filter-pair">
        <span class="filter-label">房數</span>
        <div class="filter-group">
          ${bedOptions.map(b => `<button class="filter-chip ${filters.beds===b?'active':''}" onclick="setFilter('beds','${b}')">${b==='all'?'全部':b+'房'}</button>`).join('')}
        </div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">樓層</span>
        <div class="filter-group">
          ${floorOptions.map(f => `<button class="filter-chip ${filters.floor===f?'active':''}" onclick="setFilter('floor','${f}')">${f==='all'?'全部':f}</button>`).join('')}
        </div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">座</span>
        <div class="filter-group">${sel('building', buildings, o => o==='all'?'全部':o)}</div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">單位</span>
        <div class="filter-group">${sel('unit', units, o => o==='all'?'全部':o)}</div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">售價(萬)</span>
        <div class="filter-group">
          <input class="filter-input" type="number" placeholder="最低" value="${filters.minPrice}" onchange="setRangeFilter('minPrice',this.value)">
          <span style="color:var(--muted);font-size:0.75rem">–</span>
          <input class="filter-input" type="number" placeholder="最高" value="${filters.maxPrice}" onchange="setRangeFilter('maxPrice',this.value)">
        </div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">實呎</span>
        <div class="filter-group">
          <input class="filter-input" type="number" placeholder="最低" value="${filters.minSize}" onchange="setRangeFilter('minSize',this.value)">
          <span style="color:var(--muted);font-size:0.75rem">–</span>
          <input class="filter-input" type="number" placeholder="最高" value="${filters.maxSize}" onchange="setRangeFilter('maxSize',this.value)">
        </div>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-pair">
        <span class="filter-label">售價變動</span>
        <div class="filter-group">
          <button class="filter-chip ${filters.priceChanged==='all'?'active':''}" onclick="setFilter('priceChanged','all')">全部</button>
          <button class="filter-chip ${filters.priceChanged==='yes'?'active':''}" onclick="setFilter('priceChanged','yes')">有變動</button>
          <button class="filter-chip ${filters.priceChanged==='no'?'active':''}" onclick="setFilter('priceChanged','no')">無變動</button>
        </div>
      </div>
      <span class="filter-count" id="filterCount"></span>
    </div>
  `;
}

function setFilter(key, val) {
  filters[key] = val;
  renderFilterBar();
  renderListingsTable();
}

function setRangeFilter(key, val) {
  filters[key] = val;
  renderListingsTable();
}

function applyFilters(listings) {
  return listings.filter(l => {
    if (filters.beds !== "all") {
      const b = l.bedrooms ?? 0;
      if (filters.beds === "4+" && b < 4) return false;
      if (filters.beds !== "4+" && String(b) !== filters.beds) return false;
    }
    if (filters.floor !== "all" && l.floor && !l.floor.includes(filters.floor)) return false;
    if (filters.building !== "all" && l.building_name !== filters.building) return false;
    if (filters.unit !== "all" && l.unit !== filters.unit) return false;
    if (filters.minPrice && l.price < filters.minPrice * 1e4) return false;
    if (filters.maxPrice && l.price > filters.maxPrice * 1e4) return false;
    if (filters.minSize && l.size_net < Number(filters.minSize)) return false;
    if (filters.maxSize && l.size_net > Number(filters.maxSize)) return false;
    const hasChange = l.prev_price && Math.abs(l.price - l.prev_price) > 1000;
    if (filters.priceChanged === 'yes' && !hasChange) return false;
    if (filters.priceChanged === 'no' && hasChange) return false;
    return true;
  });
}

function applySortAndFilter() {
  const filtered = applyFilters(allListings);
  const colMap = {
    price: l => l.price ?? 0,
    price_per_ft: l => l.price_per_ft ?? 0,
    size_net: l => l.size_net ?? 0,
    bedrooms: l => l.bedrooms ?? 0,
    floor: l => { const f = l.floor||""; return f.includes("高")?3:f.includes("中")?2:f.includes("低")?1:0; },
    building_name: l => l.building_name || "",
    direction: l => l.direction || "",
  };
  const fn = colMap[sortCol] || (l => 0);
  filtered.sort((a, b) => {
    const av = fn(a), bv = fn(b);
    if (av < bv) return sortDir === "asc" ? -1 : 1;
    if (av > bv) return sortDir === "asc" ? 1 : -1;
    return 0;
  });
  return filtered;
}

function setSort(col) {
  if (sortCol === col) sortDir = sortDir === "asc" ? "desc" : "asc";
  else { sortCol = col; sortDir = "asc"; }
  renderListingsTable();
}

function renderListingsTable() {
  const el = document.getElementById("listingsTable");
  if (!el) return;
  const visible = applySortAndFilter();

  const fc = document.getElementById("filterCount");
  if (fc) fc.textContent = `顯示 ${visible.length} / ${allListings.length} 個盤`;

  const cols = [
    { key: "first_seen",    label: "上盤日期" },
    { key: "building_name", label: "座" },
    { key: "floor",         label: "樓層/單位" },
    { key: "bedrooms",      label: "房數" },
    { key: "size_net",      label: "實呎" },
    { key: "price",         label: "售價" },
    { key: "price_per_ft",  label: "實呎價" },
    { key: "direction",     label: "座向" },
    { key: null,            label: "來源" },
    { key: null,            label: "" },
  ];

  const ths = cols.map(c => {
    if (!c.key) return `<th></th>`;
    const cls = c.key === sortCol
      ? `sortable sort-${sortDir}`
      : "sortable";
    return `<th class="${cls}" onclick="setSort('${c.key}')">${c.label}</th>`;
  }).join('');

  const rows = visible.length === 0
    ? `<tr><td colspan="${cols.length}" class="no-data" style="padding:2rem;text-align:center">無符合條件的放盤</td></tr>`
    : visible.map(l => `
      <tr${l.removed_date ? ' style="opacity:0.45"' : ''}>
        <td class="txn-date">
          ${l.first_seen || '-'}
          ${l.removed_date ? `<div style="color:var(--down);font-size:0.7rem">下架 ${l.removed_date}</div>` : ''}
        </td>
        <td>${escHtml(l.building_name||'-')}</td>
        <td>
          <span class="floor-badge ${floorClass(l.floor)}">${escHtml(l.floor||'-')}</span>
          <span style="margin-left:0.4rem">${escHtml(l.unit||'-')}</span>
        </td>
        <td>${l.bedrooms ?? '-'}房</td>
        <td>${l.size_net ? l.size_net.toLocaleString()+'呎' : '-'}</td>
        <td class="price-cell">
          $${l.price ? (l.price/1e4).toFixed(0)+'萬' : '-'}
          ${priceChangeBadge(l.price, l.prev_price)}
          ${l.ref_no ? `<br><button class="history-btn" onclick="showHistory('${escHtml(l.ref_no)}','${escHtml((l.building_name||'')+' '+(l.floor||'')+(l.unit||''))}')">歷史 ↓</button>` : ''}
        </td>
        <td>
          <div>$${l.price_per_ft ? l.price_per_ft.toLocaleString() : '-'}</div>
          <div class="unit-price">/呎</div>
        </td>
        <td>${escHtml(l.direction||'-')}</td>
        <td><span style="font-size:0.72rem;color:var(--muted);background:var(--surface2);border-radius:4px;padding:0.1rem 0.4rem">中原</span></td>
        <td>${l.detail_url ? `<a href="${escHtml(l.detail_url)}" target="_blank" class="detail-link">詳情 ↗</a>` : ''}</td>
      </tr>
    `).join('');

  el.innerHTML = `<div style="overflow-x:auto"><table style="min-width:700px;white-space:nowrap"><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function floorClass(floor) {
  if (!floor) return "";
  if (floor.includes("高")) return "floor-high";
  if (floor.includes("中")) return "floor-mid";
  if (floor.includes("低")) return "floor-low";
  return "";
}

// ── Chart ──────────────────────────────────────────────────────
function drawChart(trends) {
  const canvas = document.getElementById("trendChart");
  if (!canvas) return;

  const labels = trends.map(t => t.snapshot_date.slice(5));
  const data = trends.map(t => t.avg_price_ft);

  const W = canvas.parentElement.offsetWidth;
  const H = 160;
  canvas.width = W;
  canvas.height = H;

  const ctx = canvas.getContext("2d");
  const pad = { top: 20, right: 16, bottom: 28, left: 56 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;

  const minV = Math.min(...data) * 0.98;
  const maxV = Math.max(...data) * 1.02;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = "rgba(31,45,66,0.8)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (h / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + w, y);
    ctx.stroke();

    const val = maxV - ((maxV - minV) / 4) * i;
    ctx.fillStyle = "#64748b";
    ctx.font = "10px -apple-system, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText("$" + Math.round(val).toLocaleString(), pad.left - 6, y + 4);
  }

  // X labels
  ctx.fillStyle = "#64748b";
  ctx.textAlign = "center";
  const step = Math.ceil(labels.length / 10);
  labels.forEach((l, i) => {
    if (i % step === 0) {
      const x = pad.left + (w / (data.length - 1)) * i;
      ctx.fillText(l, x, H - 6);
    }
  });

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  grad.addColorStop(0, "rgba(245,158,11,0.25)");
  grad.addColorStop(1, "rgba(245,158,11,0)");

  ctx.beginPath();
  data.forEach((v, i) => {
    const x = pad.left + (w / (data.length - 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.left + w, pad.top + h);
  ctx.lineTo(pad.left, pad.top + h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = "#f59e0b";
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  data.forEach((v, i) => {
    const x = pad.left + (w / (data.length - 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Last point dot
  const lx = pad.left + w;
  const lv = data[data.length - 1];
  const ly = pad.top + h - ((lv - minV) / (maxV - minV)) * h;
  ctx.beginPath();
  ctx.arc(lx, ly, 4, 0, Math.PI * 2);
  ctx.fillStyle = "#f59e0b";
  ctx.fill();
}

// ── Sync all ──────────────────────────────────────────────────
async function syncAll() {
  toast("同步中…");
  try {
    const endpoint = activeEstateId ? `/api/sync?estateId=${activeEstateId}` : "/api/sync";
    const { results } = await api(endpoint, { method: "POST" });
    const ok = results.filter(r => r.ok).length;
    toast(`同步完成：${ok}/${results.length} 個屋苑`, "success");
    await loadEstates();
    if (activeEstateId) {
      const card = document.querySelector(".estate-card.active");
      if (card) card.click();
    }
  } catch (err) {
    toast("同步失敗：" + err.message, "error");
  }
}

async function showHistory(refNo, label) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      <div class="modal-title">${escHtml(label)}</div>
      <div class="modal-sub">放盤編號：<a href="https://hk.centanet.com/findproperty/buy/${escHtml(refNo)}" target="_blank" class="detail-link">${escHtml(refNo)} ↗</a></div>
      <div id="historyContent"><div class="loading"><div class="spinner"></div> 載入中…</div></div>
    </div>
  `;
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);

  try {
    const { history } = await api(`/api/listings/${encodeURIComponent(refNo)}/history`);
    const content = document.getElementById("historyContent");
    if (!history.length) {
      content.innerHTML = '<div class="no-data">暫無歷史記錄</div>';
      return;
    }
    const rows = [...history].reverse().map((h, i) => `
      <tr class="${i === 0 ? 'history-row-latest' : ''}">
        <td>${h.snapshot_date}</td>
        <td>$${(h.price/1e4).toFixed(0)}萬</td>
        <td>$${h.price_per_ft ? h.price_per_ft.toLocaleString() : '-'}/呎</td>
        <td>${i < history.length - 1 ? priceChangeBadge(h.price, history[history.length - 2 - i]?.price) : '首日'}</td>
      </tr>
    `).join('');
    content.innerHTML = `
      <table class="history-table">
        <thead><tr><th>日期</th><th>售價</th><th>實呎價</th><th>變化</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (err) {
    document.getElementById("historyContent").innerHTML = `<div class="no-data">載入失敗：${err.message}</div>`;
  }
}

function priceChangeBadge(price, prevPrice) {
  if (!prevPrice || !price) return '';
  const diff = price - prevPrice;
  const pct = (diff / prevPrice * 100).toFixed(1);
  if (Math.abs(pct) < 0.1) return '<span class="price-change-flat">持平</span>';
  const diffWan = (Math.abs(diff) / 1e4).toFixed(0);
  if (diff > 0) return `<span class="price-change-up">+${diffWan}萬 (+${pct}%)</span>`;
  return `<span class="price-change-down">-${diffWan}萬 (-${Math.abs(pct)}%)</span>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Init
if (getToken()) {
  hideLoginScreen();
  loadEstates();
  loadNotesOptions();
} else {
  showLoginScreen();
}
</script>
