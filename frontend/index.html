<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PropWatch — 香港樓市追蹤</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1a;
      --surface: #111827;
      --surface2: #1a2436;
      --border: #1f2d42;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #f59e0b;
      --accent2: #3b82f6;
      --up: #10b981;
      --down: #ef4444;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,15,26,0.92);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; }
    .logo-icon { font-size: 1.4rem; }
    .logo h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    .sync-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sync-btn:hover { color: var(--text); border-color: var(--accent); }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 57px);
    }

    /* Sidebar */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .search-box {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .search-input-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 0.9rem 0.65rem 2.2rem;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent2); }
    .search-icon {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .search-btn {
      position: absolute;
      right: 0.4rem;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .search-btn:hover { background: #d97706; }

    .autocomplete {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .autocomplete-item {
      padding: 0.7rem 0.9rem;
      cursor: pointer;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: var(--border); }
    .autocomplete-name { font-weight: 600; }
    .autocomplete-meta { color: var(--muted); font-size: 0.75rem; margin-top: 0.15rem; }

    .estate-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .estate-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .estate-card:hover { border-color: var(--accent2); }
    .estate-card.active { border-color: var(--accent); background: rgba(245,158,11,0.06); }
    .estate-card-name { font-weight: 600; font-size: 0.9rem; }
    .estate-card-meta { color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem; }
    .estate-card-delete {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 5px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .estate-card:hover .estate-card-delete { opacity: 1; }
    .estate-card-delete:hover { color: var(--down); }

    .estate-card-star {
      position: absolute;
      top: 0.6rem;
      right: 2rem;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1;
    }
    .estate-card:hover .estate-card-star { opacity: 1; }
    .estate-card-star.starred { opacity: 1; color: var(--accent); }
    .estate-card-star:hover { color: var(--accent); }

    .drag-handle {
      position: absolute;
      top: 50%;
      left: 0.5rem;
      transform: translateY(-50%);
      color: var(--border);
      cursor: grab;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.15s;
      user-select: none;
    }
    .estate-card:hover .drag-handle { opacity: 1; }
    .estate-card { padding-left: 1.6rem; }
    .estate-card.drag-over { border-color: var(--accent2); background: rgba(59,130,246,0.06); }
    .estate-card.dragging { opacity: 0.4; }

    .sidebar-empty {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Main content */
    .main {
      overflow-y: auto;
      padding: 1.5rem 2rem;
    }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
      color: var(--muted);
      text-align: center;
    }
    .welcome-icon { font-size: 3rem; }
    .welcome h2 { font-size: 1.1rem; color: var(--text); }
    .welcome p { font-size: 0.85rem; max-width: 280px; line-height: 1.6; }

    /* Dashboard */
    .dashboard { padding: 1.5rem 2rem; }
    .dashboard-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
    }
    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .dashboard-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .dashboard-card:hover { border-color: var(--accent2); }
    .dashboard-card-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; }
    .dashboard-card-count { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .dashboard-card-label { font-size: 0.7rem; color: var(--muted); }
    .dashboard-chart-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .dashboard-chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .estate-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }
    .estate-select:focus { border-color: var(--accent2); }

    /* Estate detail */
    .estate-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .estate-title { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    .estate-sub { color: var(--muted); font-size: 0.85rem; margin-top: 0.25rem; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .stat-label { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value { font-size: 1.4rem; font-weight: 700; margin-top: 0.25rem; color: var(--accent); }
    .stat-unit { font-size: 0.7rem; color: var(--muted); font-weight: 400; }

    /* Chart */
    .chart-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .chart-wrap { position: relative; height: 160px; }
    canvas { width: 100% !important; }

    .no-data {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Listings table */
    .listings-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .listings-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      padding: 0.65rem 1rem;
      text-align: left;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid rgba(31,45,66,0.5);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .price-cell { font-weight: 700; color: var(--accent); }
    .unit-price { color: var(--muted); font-size: 0.75rem; margin-top: 0.1rem; }
    .floor-badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .floor-high { background: rgba(16,185,129,0.15); color: var(--up); }
    .floor-mid  { background: rgba(59,130,246,0.15); color: var(--accent2); }
    .floor-low  { background: rgba(245,158,11,0.15); color: var(--accent); }

    .detail-link {
      color: var(--accent2);
      text-decoration: none;
      font-size: 0.75rem;
    }
    .detail-link:hover { text-decoration: underline; }

    .price-change-up { color: var(--down); font-size: 0.72rem; font-weight: 600; }
    .price-change-down { color: var(--up); font-size: 0.72rem; font-weight: 600; }
    .price-change-flat { color: var(--muted); font-size: 0.72rem; }
    .ref-link { color: var(--muted); font-size: 0.72rem; text-decoration: none; }
    .ref-link:hover { color: var(--accent2); }
    .price-prev { color: var(--muted); font-size: 0.72rem; text-decoration: line-through; }
    .history-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      font-size: 0.68rem;
      padding: 0.1rem 0.4rem;
      cursor: pointer;
      margin-top: 0.2rem;
      display: inline-block;
    }
    .history-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* History modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      min-width: 320px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .modal-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    .modal-sub { color: var(--muted); font-size: 0.78rem; margin-bottom: 1rem; }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      margin-top: -0.2rem;
    }
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .history-table th {
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.4rem 0.5rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .history-table td { padding: 0.5rem; border-bottom: 1px solid rgba(31,45,66,0.5); }
    .history-table tr:last-child td { border-bottom: none; }
    .history-row-latest td { color: var(--accent); font-weight: 600; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2rem;
      justify-content: center;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1.1rem;
      font-size: 0.85rem;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: fadeIn 0.2s ease;
    }
    .toast.success { border-color: var(--up); }
    .toast.error { border-color: var(--down); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Estate tabs */
    .estate-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .estate-tab {
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .estate-tab:hover { color: var(--text); }
    .estate-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Transaction table */
    .gain-pos { color: var(--up); font-size: 0.75rem; font-weight: 600; }
    .gain-neg { color: var(--down); font-size: 0.75rem; font-weight: 600; }
    .txn-date { color: var(--muted); font-size: 0.75rem; }
    .load-more-btn {
      display: block;
      width: 100%;
      padding: 0.75rem;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--accent2);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .load-more-btn:hover { background: rgba(59,130,246,0.06); }

    /* Sortable table headers */
    th.sortable {
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th.sortable:hover { color: var(--text); }
    th.sort-asc::after  { content: " ▲"; color: var(--accent); }
    th.sort-desc::after { content: " ▼"; color: var(--accent); }

    /* Filter bar */
    .filter-bar {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }
    .filter-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .filter-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-chip:hover  { border-color: var(--accent2); color: var(--text); }
    .filter-chip.active { background: rgba(245,158,11,0.12); border-color: var(--accent); color: var(--accent); }
    .filter-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      width: 72px;
      outline: none;
    }
    .filter-input:focus { border-color: var(--accent2); }
    .filter-sep {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 0.2rem;
    }
    .filter-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .sidebar { max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()" style="cursor:pointer">
    <span class="logo-icon">🏙️</span>
    <h1>Prop<span>Watch</span></h1>
  </div>
  <button class="sync-btn" onclick="syncAll()">↻ 立即同步</button>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="search-box">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="搜尋屋苑名稱…"
          autocomplete="off"
        >
        <button class="search-btn" id="searchBtn" onclick="handleSearchBtn()">搜尋</button>
        <div class="autocomplete hidden" id="autocomplete"></div>
      </div>
    </div>
    <div class="estate-list" id="estateList">
      <div class="sidebar-empty">載入中…</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="loading"><div class="spinner"></div> 載入中…</div>
  </main>
</div>

<script>
const API = "https://propwatch-worker.johnwong777.workers.dev";
let activeEstateId = null;
let searchTimer = null;
let chart = null;

// Listings state
let allListings = [];
let sortCol = "price";
let sortDir = "asc";
let filters = { beds: "all", floor: "all", minPrice: "", maxPrice: "", minSize: "", maxSize: "" };

// ── Toast ──────────────────────────────────────────────────────
function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── API calls ──────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "請求失敗");
  return data;
}

function goHome() {
  activeEstateId = null;
  document.querySelectorAll(".estate-card").forEach(c => c.classList.remove("active"));
  if (dashboardEstates.length) showDashboard(dashboardEstates);
  else loadEstates();
}

// ── Dashboard ──────────────────────────────────────────────────
let dashboardEstates = [];

let dashboardMetric = "count"; // "count" | "price"

async function showDashboard(estates) {
  dashboardEstates = estates;
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="dashboard">
      <div class="dashboard-chart-section">
        <div class="dashboard-chart-header">
          <div style="display:flex;gap:0.4rem">
            <button class="filter-chip ${dashboardMetric==='count'?'active':''}" onclick="setDashboardMetric('count')">放盤數量</button>
            <button class="filter-chip ${dashboardMetric==='price'?'active':''}" onclick="setDashboardMetric('price')">平均實呎價</button>
          </div>
          <select class="estate-select" id="dashboardSelect" onchange="loadDashboardChart(this.value)">
            ${estates.map(e => `<option value="${e.id}">${escHtml(e.name)}</option>`).join('')}
          </select>
        </div>
        <div class="chart-wrap" style="height:240px"><canvas id="dashboardChart"></canvas></div>
      </div>
    </div>
  `;

async function loadDashboardChart(estateId) {

  } catch (err) {

  }

function drawDashboardChart(trends) {
  const canvas = document.getElementById("dashboardChart");
  if (!canvas || trends.length < 2) return;

  const isPrice = dashboardMetric === "price";
  const labels = trends.map(t => t.snapshot_date.slice(5));
  const data = trends.map(t => isPrice ? t.avg_price_ft : t.listing_count);
  const color = isPrice ? "#f59e0b" : "#3b82f6";

  const W = canvas.parentElement.offsetWidth;
  const H = 200;
  canvas.width = W;
  canvas.height = H;

  const ctx = canvas.getContext("2d");
  const pad = { top: 20, right: 16, bottom: 28, left: 44 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;

  const minV = Math.max(0, Math.min(...data) - 2);
  const maxV = Math.max(...data) + 2;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = "rgba(31,45,66,0.8)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (h / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
  }

  // X labels
  ctx.fillStyle = "#64748b";
  ctx.font = "10px -apple-system,sans-serif";
  ctx.textAlign = "center";
  const step = Math.ceil(labels.length / 8);
  labels.forEach((l, i) => {
    if (i % step === 0) {
      const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
      ctx.fillText(l, x, H - 6);
    }
  });

  // Y label formatting
  const fmtY = v => isPrice ? `$${Math.round(v).toLocaleString()}` : String(Math.round(v));
  ctx.fillStyle = "#64748b";
  ctx.font = "10px -apple-system,sans-serif";
  ctx.textAlign = "right";
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (h / 4) * i;
    const val = maxV - ((maxV - minV) / 4) * i;
    ctx.fillText(fmtY(val), pad.left - 6, y + 4);
  }

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  const rgb = isPrice ? "245,158,11" : "59,130,246";
  grad.addColorStop(0, `rgba(${rgb},0.28)`);
  grad.addColorStop(1, `rgba(${rgb},0)`);

  ctx.beginPath();
  data.forEach((v, i) => {
    const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.left + w, pad.top + h);
  ctx.lineTo(pad.left, pad.top + h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  data.forEach((v, i) => {
    const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots
  data.forEach((v, i) => {
    const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    ctx.beginPath();
    ctx.arc(x, y, i === data.length - 1 ? 4 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  });
}

async function loadEstates() {
  const list = document.getElementById("estateList");
  try {
    const { estates } = await api("/api/estates");
    if (!estates.length) {

async function toggleFavourite(e, id) {
  e.stopPropagation();
  await api(`/api/estates/${id}/favourite`, { method: "POST" });
  loadEstates();
}

let dragSrc = null;

function initDragSort() {
  const cards = document.querySelectorAll("#estateList .estate-card");
  cards.forEach(card => {
    card.addEventListener("dragstart", e => {
      dragSrc = card;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => {
      card.classList.remove("dragging");
      document.querySelectorAll(".estate-card").forEach(c => c.classList.remove("drag-over"));
    });
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      if (card !== dragSrc) {
        document.querySelectorAll(".estate-card").forEach(c => c.classList.remove("drag-over"));
        card.classList.add("drag-over");
      }
    });
    card.addEventListener("drop", async e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === card) return;
      const list = document.getElementById("estateList");
      const cards = [...list.querySelectorAll(".estate-card")];
      const fromIdx = cards.indexOf(dragSrc);
      const toIdx = cards.indexOf(card);
      if (fromIdx < toIdx) card.after(dragSrc);
      else card.before(dragSrc);
      const newOrder = [...list.querySelectorAll(".estate-card")].map((c, i) => ({
        id: Number(c.dataset.id),
        sort_order: i,
      }));
      await api("/api/estates/reorder", { method: "POST", body: JSON.stringify({ order: newOrder }) });
    });
  });
}

async function deleteEstate(e, id) {
  e.stopPropagation();
  if (!confirm("確認移除此屋苑追蹤？")) return;
  await api(`/api/estates/${id}`, { method: "DELETE" });
  if (activeEstateId === id) {
    activeEstateId = null;
    document.getElementById("main").innerHTML = `<div class="welcome"><div class="welcome-icon">🏠</div><h2>選擇屋苑</h2></div>`;
  }
  loadEstates();
}

// ── Search autocomplete ────────────────────────────────────────
const searchInput = document.getElementById("searchInput");
const autocomplete = document.getElementById("autocomplete");

searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  const val = searchInput.value.trim();
  if (val.length < 2) { autocomplete.classList.add("hidden"); return; }
  searchTimer = setTimeout(() => doSearch(val), 400);
});

searchInput.addEventListener("blur", () => {
  setTimeout(() => autocomplete.classList.add("hidden"), 200);
});

searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    handleSearchBtn();
  }
});

async function handleSearchBtn() {
  const val = searchInput.value.trim();
  if (val.length < 2) return;
  clearTimeout(searchTimer);
  await doSearch(val);
  // 如果只有一個結果就直接追蹤
  const items = autocomplete.querySelectorAll(".autocomplete-item[data-code]");
  if (items.length === 1) items[0].click();
}

async function doSearch(keyword) {
  try {
    const { results } = await api("/api/search", {
      method: "POST",
      body: JSON.stringify({ keyword }),
    });

    if (!results?.length) {
      autocomplete.innerHTML = '<div class="autocomplete-item" style="color:var(--muted)">沒有結果</div>';
      autocomplete.classList.remove("hidden");
      return;
    }

    autocomplete.innerHTML = "";
    results.slice(0, 8).forEach(r => {
      const div = document.createElement("div");
      div.className = "autocomplete-item";
      div.dataset.code = r.bigestcode || r.bigCode || "";
      div.dataset.name = r.bigEstateName || r.name || "";
      div.dataset.district = r.districtName || r.district || "";
      div.dataset.isBigest = r.isBigest ? "1" : "0";
      div.innerHTML = `
        <div class="autocomplete-name">${escHtml(r.bigEstateName || r.name)}</div>
        <div class="autocomplete-meta">${escHtml(r.districtName || r.district || '')} ${r.bigestcode || r.bigCode || ''}</div>
      `;
      div.addEventListener("click", () => {
        trackEstate(div.dataset.name, div.dataset.code, div.dataset.district, div.dataset.isBigest === "1");
      });
      autocomplete.appendChild(div);
    });
    autocomplete.classList.remove("hidden");
  } catch (err) {
    console.error("Search error:", err);
    autocomplete.innerHTML = `<div class="autocomplete-item" style="color:var(--down)">搜尋失敗：${err.message}</div>`;
    autocomplete.classList.remove("hidden");
  }
}

async function trackEstate(name, bigestcode, district, isBigest) {
  autocomplete.classList.add("hidden");
  searchInput.value = "";
  toast("正在抓取 " + name + " 資料…");
  try {
    const data = await api("/api/track", {
      method: "POST",
      body: JSON.stringify({ name, bigestcode, district, isBigest }),
    });
    toast(`已新增 ${name}，共 ${data.count} 個盤`, "success");
    await loadEstates();
    showEstate(data.estate.id, name, district);
  } catch (err) {
    toast("新增失敗：" + err.message, "error");
  }
}

async function showEstate(id, name, district) {
  activeEstateId = id;

    const [{ listings }, { trends }] = await Promise.all([
      api(`/api/estates/${id}/listings`),
      api(`/api/estates/${id}/trends`),
    ]);

    const prices = listings.map(l => l.price).filter(Boolean);
    const pricesPerFt = listings.map(l => l.price_per_ft).filter(Boolean);

      const last = trends[trends.length-1].avg_price_ft;

      const color = pct >= 0 ? "var(--up)" : "var(--down)";
      trendChange = `<span style="color:${color};font-size:0.8rem">${pct>=0?'▲':'▼'} ${Math.abs(pct)}%</span>`;
    }

    main.innerHTML = `
      <div class="estate-header">
        <div>
          <div class="estate-title">${escHtml(name)}</div>
          <div class="estate-sub">${district ? escHtml(district) + ' · ' : ''}共 ${listings.length} 個在售單位</div>

      </div>

      <div class="estate-tabs">

      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">平均實呎價</div>
          <div class="stat-value">$${avgPricePerFt.toLocaleString()} <span class="stat-unit">/呎</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">最低售價</div>
          <div class="stat-value">$${(minPrice/1e6).toFixed(2)} <span class="stat-unit">M</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">最高售價</div>
          <div class="stat-value">$${(maxPrice/1e6).toFixed(2)} <span class="stat-unit">M</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">追蹤天數</div>
          <div class="stat-value">${trends.length} <span class="stat-unit">天</span></div>
        </div>
      </div>

      <div id="tab-listings">
        <div class="chart-section">
          <div class="section-title">實用呎價趨勢</div>
          ${trends.length < 2
            ? '<div class="no-data">需要至少 2 天數據才能顯示趨勢圖<br><small>每日 09:00 自動更新</small></div>'
            : '<div class="chart-wrap"><canvas id="trendChart"></canvas></div>'
          }

          <div class="listings-header">

function switchTab(tab, estateId) {
  document.querySelectorAll(".estate-tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".estate-tab").forEach(t => {
    if (t.getAttribute("onclick")?.includes(`'${tab}'`)) t.classList.add("active");
  });
  document.getElementById("tab-listings").style.display = tab === "listings" ? "" : "none";
  document.getElementById("tab-transactions").style.display = tab === "transactions" ? "" : "none";
  if (tab === "transactions") loadTransactions(estateId, 0, false);
}

let txnOffset = 0;
let txnEstateId = null;

async function loadTransactions(estateId, offset, append) {
  txnEstateId = estateId;
  txnOffset = offset;
  const panel = document.getElementById("tab-transactions");
  if (!append) {
    panel.innerHTML = '<div class="listings-section"><div class="loading"><div class="spinner"></div> 載入中…</div></div>';
  }

  try {
    const { transactions } = await api(`/api/estates/${estateId}/transactions?offset=${offset}`);

    const rows = transactions.map(t => {
      const years = t.held_days ? t.held_days / 365 : null;
      const heldStr = years ? years.toFixed(1) + '年' : '-';
      let annualHtml = '', totalHtml = '';
      if (t.gain_pct != null && years) {
        const annualPct = (Math.pow(1 + t.gain_pct / 100, 1 / years) - 1) * 100;
        const cls = t.gain_pct >= 0 ? 'gain-pos' : 'gain-neg';
        const arrow = t.gain_pct >= 0 ? '▲' : '▼';
        annualHtml = `<span class="${cls}">${arrow} ${Math.abs(annualPct).toFixed(1)}%/年</span>`;
        totalHtml = `<div class="unit-price">${arrow} ${Math.abs(t.gain_pct).toFixed(1)}%</div>`;
      } else if (t.gain_pct != null) {
        const cls = t.gain_pct >= 0 ? 'gain-pos' : 'gain-neg';
        annualHtml = `<span class="${cls}">${t.gain_pct >= 0 ? '▲' : '▼'} ${Math.abs(t.gain_pct).toFixed(1)}%</span>`;
      }
      return `<tr>
        <td class="txn-date">${t.reg_date || '-'}</td>
        <td>${escHtml(t.building||'')} ${escHtml(t.floor||'')} ${escHtml(t.unit||'')}</td>
        <td class="price-cell">$${t.price ? (t.price/1e4).toFixed(0)+'萬' : '-'}</td>
        <td>
          <div>$${t.price_per_ft_net ? t.price_per_ft_net.toLocaleString() : '-'}/呎</div>
          <div class="unit-price">實${t.size_net ? t.size_net+'呎' : ''}</div>
        </td>
        <td class="txn-date">${heldStr}</td>
        <td>${annualHtml}${totalHtml}</td>
        <td>${t.detail_url ? `<a href="${escHtml(t.detail_url)}" target="_blank" class="detail-link">詳情 ↗</a>` : ''}</td>
      </tr>`;
    }).join('');

    const tbody = append ? document.querySelector("#tab-transactions tbody") : null;
    if (append && tbody) {
      tbody.insertAdjacentHTML("beforeend", rows);
    } else {
      panel.innerHTML = `
        <div class="listings-section">
          ${transactions.length === 0
            ? '<div class="no-data">暫無成交記錄</div>'
            : `<div style="overflow-x:auto">
                <table>
                  <thead><tr>
                    <th>登記日期</th><th>單位</th><th>成交價</th><th>實呎價</th><th>持有年期</th><th>升跌</th><th></th>
                  </tr></thead>
                  <tbody>${rows}</tbody>
                </table>
                ${transactions.length >= 50
                  ? `<button class="load-more-btn" onclick="loadTransactions(${estateId}, ${offset+50}, true)">載入更多…</button>`
                  : ''}
              </div>`
          }
        </div>`;
    }

    // Update load-more button after append
    if (append) {
      const btn = document.querySelector(".load-more-btn");
      if (btn) {
        if (transactions.length >= 50) btn.setAttribute("onclick", `loadTransactions(${estateId}, ${offset+50}, true)`);
        else btn.remove();
      }
    }
  } catch (err) {
    panel.innerHTML = `<div class="listings-section"><div class="no-data">載入失敗：${err.message}</div></div>`;
  }
}

function renderFilterBar() {
  const bar = document.getElementById("filterBar");
  if (!bar) return;
  const bedOptions = ["all","1","2","3","4+"];
  const floorOptions = ["all","高層","中層","低層"];
  bar.innerHTML = `
    <div class="filter-bar">
      <span class="filter-label">房數</span>
      <div class="filter-group">
        ${bedOptions.map(b => `<button class="filter-chip ${filters.beds===b?'active':''}" onclick="setFilter('beds','${b}')">${b==='all'?'全部':b+'房'}</button>`).join('')}
      </div>
      <div class="filter-sep"></div>
      <span class="filter-label">樓層</span>
      <div class="filter-group">
        ${floorOptions.map(f => `<button class="filter-chip ${filters.floor===f?'active':''}" onclick="setFilter('floor','${f}')">${f==='all'?'全部':f}</button>`).join('')}
      </div>
      <div class="filter-sep"></div>
      <span class="filter-label">售價(萬)</span>
      <div class="filter-group">
        <input class="filter-input" type="number" placeholder="最低" value="${filters.minPrice}" onchange="setRangeFilter('minPrice',this.value)">
        <span style="color:var(--muted);font-size:0.75rem">–</span>
        <input class="filter-input" type="number" placeholder="最高" value="${filters.maxPrice}" onchange="setRangeFilter('maxPrice',this.value)">
      </div>
      <div class="filter-sep"></div>
      <span class="filter-label">實呎</span>
      <div class="filter-group">
        <input class="filter-input" type="number" placeholder="最低" value="${filters.minSize}" onchange="setRangeFilter('minSize',this.value)">
        <span style="color:var(--muted);font-size:0.75rem">–</span>
        <input class="filter-input" type="number" placeholder="最高" value="${filters.maxSize}" onchange="setRangeFilter('maxSize',this.value)">
      </div>
      <span class="filter-count" id="filterCount"></span>
    </div>
  `;
}

function setFilter(key, val) {
  filters[key] = val;
  renderFilterBar();
  renderListingsTable();
}

function setRangeFilter(key, val) {
  filters[key] = val;
  renderListingsTable();
}

function applyFilters(listings) {
  return listings.filter(l => {
    if (filters.beds !== "all") {
      const b = l.bedrooms ?? 0;
      if (filters.beds === "4+" && b < 4) return false;
      if (filters.beds !== "4+" && String(b) !== filters.beds) return false;
    }
    if (filters.floor !== "all" && l.floor && !l.floor.includes(filters.floor)) return false;
    if (filters.minPrice && l.price < filters.minPrice * 1e4) return false;
    if (filters.maxPrice && l.price > filters.maxPrice * 1e4) return false;
    if (filters.minSize && l.size_net < Number(filters.minSize)) return false;
    if (filters.maxSize && l.size_net > Number(filters.maxSize)) return false;
    return true;
  });
}

function applySortAndFilter() {
  const filtered = applyFilters(allListings);
  const colMap = {
    price: l => l.price ?? 0,
    price_per_ft: l => l.price_per_ft ?? 0,
    size_net: l => l.size_net ?? 0,
    bedrooms: l => l.bedrooms ?? 0,
    floor: l => { const f = l.floor||""; return f.includes("高")?3:f.includes("中")?2:f.includes("低")?1:0; },
    building_name: l => l.building_name || "",
    direction: l => l.direction || "",
  };
  const fn = colMap[sortCol] || (l => 0);
  filtered.sort((a, b) => {
    const av = fn(a), bv = fn(b);
    if (av < bv) return sortDir === "asc" ? -1 : 1;
    if (av > bv) return sortDir === "asc" ? 1 : -1;
    return 0;
  });
  return filtered;
}

function setSort(col) {
  if (sortCol === col) sortDir = sortDir === "asc" ? "desc" : "asc";
  else { sortCol = col; sortDir = "asc"; }
  renderListingsTable();
}

function renderListingsTable() {
  const el = document.getElementById("listingsTable");
  if (!el) return;
  const visible = applySortAndFilter();

  const fc = document.getElementById("filterCount");
  if (fc) fc.textContent = `顯示 ${visible.length} / ${allListings.length} 個盤`;

  const cols = [
    { key: "building_name", label: "座" },
    { key: "floor",         label: "樓層/單位" },
    { key: "bedrooms",      label: "房數" },
    { key: "size_net",      label: "實呎" },
    { key: "price",         label: "售價" },
    { key: "price_per_ft",  label: "實呎價" },
    { key: "direction",     label: "座向" },
    { key: null,            label: "" },
  ];

  const ths = cols.map(c => {
    if (!c.key) return `<th></th>`;
    const cls = c.key === sortCol
      ? `sortable sort-${sortDir}`
      : "sortable";
    return `<th class="${cls}" onclick="setSort('${c.key}')">${c.label}</th>`;
  }).join('');

  const rows = visible.length === 0
    ? `<tr><td colspan="${cols.length}" class="no-data" style="padding:2rem;text-align:center">無符合條件的放盤</td></tr>`
    : visible.map(l => `
      <tr>
        <td>${escHtml(l.building_name||'-')}</td>
        <td>
          <span class="floor-badge ${floorClass(l.floor)}">${escHtml(l.floor||'-')}</span>
          <span style="margin-left:0.4rem">${escHtml(l.unit||'-')}</span>
        </td>
        <td>${l.bedrooms ?? '-'}房</td>
        <td>${l.size_net ? l.size_net.toLocaleString()+'呎' : '-'}</td>
        <td class="price-cell">
          $${l.price ? (l.price/1e4).toFixed(0)+'萬' : '-'}
          ${l.prev_price ? `<div class="price-prev">$${(l.prev_price/1e4).toFixed(0)}萬</div>` : ''}
          ${priceChangeBadge(l.price, l.prev_price)}
          ${l.ref_no ? `<br><button class="history-btn" onclick="showHistory('${escHtml(l.ref_no)}','${escHtml((l.building_name||'')+' '+(l.floor||'')+(l.unit||''))}')">歷史 ↓</button>` : ''}
        </td>
        <td>
          <div>$${l.price_per_ft ? l.price_per_ft.toLocaleString() : '-'}</div>
          <div class="unit-price">/呎</div>
        </td>
        <td>${escHtml(l.direction||'-')}</td>
        <td>${l.detail_url ? `<a href="${escHtml(l.detail_url)}" target="_blank" class="detail-link">詳情 ↗</a>` : ''}</td>
      </tr>
    `).join('');

  el.innerHTML = `<div style="overflow-x:auto"><table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function floorClass(floor) {
  if (!floor) return "";
  if (floor.includes("高")) return "floor-high";
  if (floor.includes("中")) return "floor-mid";
  if (floor.includes("低")) return "floor-low";
  return "";
}

// ── Chart ──────────────────────────────────────────────────────
function drawChart(trends) {
  const canvas = document.getElementById("trendChart");
  if (!canvas) return;

  const labels = trends.map(t => t.snapshot_date.slice(5));
  const data = trends.map(t => t.avg_price_ft);

  const W = canvas.parentElement.offsetWidth;
  const H = 160;
  canvas.width = W;
  canvas.height = H;

  const ctx = canvas.getContext("2d");
  const pad = { top: 20, right: 16, bottom: 28, left: 56 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;

  const minV = Math.min(...data) * 0.98;
  const maxV = Math.max(...data) * 1.02;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = "rgba(31,45,66,0.8)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (h / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + w, y);
    ctx.stroke();

    const val = maxV - ((maxV - minV) / 4) * i;
    ctx.fillStyle = "#64748b";
    ctx.font = "10px -apple-system, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText("$" + Math.round(val).toLocaleString(), pad.left - 6, y + 4);
  }

  // X labels
  ctx.fillStyle = "#64748b";
  ctx.textAlign = "center";
  const step = Math.ceil(labels.length / 10);
  labels.forEach((l, i) => {
    if (i % step === 0) {
      const x = pad.left + (w / (data.length - 1)) * i;
      ctx.fillText(l, x, H - 6);
    }
  });

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  grad.addColorStop(0, "rgba(245,158,11,0.25)");
  grad.addColorStop(1, "rgba(245,158,11,0)");

  ctx.beginPath();
  data.forEach((v, i) => {
    const x = pad.left + (w / (data.length - 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.left + w, pad.top + h);
  ctx.lineTo(pad.left, pad.top + h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = "#f59e0b";
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  data.forEach((v, i) => {
    const x = pad.left + (w / (data.length - 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Last point dot
  const lx = pad.left + w;
  const lv = data[data.length - 1];
  const ly = pad.top + h - ((lv - minV) / (maxV - minV)) * h;
  ctx.beginPath();
  ctx.arc(lx, ly, 4, 0, Math.PI * 2);
  ctx.fillStyle = "#f59e0b";
  ctx.fill();
}

// ── Sync all ──────────────────────────────────────────────────
async function syncAll() {
  toast("同步中…");
  try {
    const { results } = await api("/api/sync", { method: "POST" });
    const ok = results.filter(r => r.ok).length;
    toast(`同步完成：${ok}/${results.length} 個屋苑`, "success");
    await loadEstates();
    if (activeEstateId) {
      const card = document.querySelector(".estate-card.active");
      if (card) card.click();
    }
  } catch (err) {
    toast("同步失敗：" + err.message, "error");
  }
}

async function showHistory(refNo, label) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      <div class="modal-title">${escHtml(label)}</div>
      <div class="modal-sub">放盤編號：<a href="https://hk.centanet.com/findproperty/buy/${escHtml(refNo)}" target="_blank" class="detail-link">${escHtml(refNo)} ↗</a></div>
      <div id="historyContent"><div class="loading"><div class="spinner"></div> 載入中…</div></div>
    </div>
  `;
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);

  try {
    const { history } = await api(`/api/listings/${encodeURIComponent(refNo)}/history`);
    const content = document.getElementById("historyContent");
    if (!history.length) {
      content.innerHTML = '<div class="no-data">暫無歷史記錄</div>';
      return;
    }
    const rows = [...history].reverse().map((h, i) => `
      <tr class="${i === 0 ? 'history-row-latest' : ''}">
        <td>${h.snapshot_date}</td>
        <td>$${(h.price/1e4).toFixed(0)}萬</td>
        <td>$${h.price_per_ft ? h.price_per_ft.toLocaleString() : '-'}/呎</td>
        <td>${i < history.length - 1 ? priceChangeBadge(h.price, history[history.length - 2 - i]?.price) : '首日'}</td>
      </tr>
    `).join('');
    content.innerHTML = `
      <table class="history-table">
        <thead><tr><th>日期</th><th>售價</th><th>實呎價</th><th>變化</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (err) {
    document.getElementById("historyContent").innerHTML = `<div class="no-data">載入失敗：${err.message}</div>`;
  }
}

function priceChangeBadge(price, prevPrice) {
  if (!prevPrice || !price) return '<span class="price-change-flat">—</span>';
  const diff = price - prevPrice;
  const pct = (diff / prevPrice * 100).toFixed(1);
  if (Math.abs(pct) < 0.1) return '<span class="price-change-flat">持平</span>';
  if (diff > 0) return `<span class="price-change-up">▲ ${pct}%</span>`;
  return `<span class="price-change-down">▼ ${Math.abs(pct)}%</span>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Init
loadEstates();
</script>
