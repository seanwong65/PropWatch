<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PropWatch — 香港樓市追蹤</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1a;
      --surface: #111827;
      --surface2: #1a2436;
      --border: #1f2d42;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #f59e0b;
      --accent2: #3b82f6;
      --up: #10b981;
      --down: #ef4444;
      --radius: 10px;
      --btn-bg: #3a5c59;
      --btn-hover: #4d7a77;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,15,26,0.92);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; }
    .logo-icon { font-size: 1.4rem; }
    .logo h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    .sync-btn {
      background: var(--btn-bg);
      border: 1px solid var(--btn-bg);
      color: var(--text);
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sync-btn:hover { background: var(--btn-hover); border-color: var(--btn-hover); }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 57px);
    }

    /* Sidebar */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .search-box {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .search-input-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 0.9rem 0.65rem 2.2rem;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent2); }
    .search-icon {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .search-btn {
      position: absolute;
      right: 0.4rem;
      top: 50%;
      transform: translateY(-50%);
      background: var(--btn-bg);
      color: var(--text);
      border: none;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .search-btn:hover { background: var(--btn-hover); }

    .autocomplete {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .autocomplete-item {
      padding: 0.7rem 0.9rem;
      cursor: pointer;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: var(--border); }
    .autocomplete-name { font-weight: 600; }
    .autocomplete-meta { color: var(--muted); font-size: 0.75rem; margin-top: 0.15rem; }

    .estate-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .estate-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .estate-card:hover { border-color: var(--accent2); }
    .estate-card.active { border-color: var(--accent); background: rgba(245,158,11,0.06); }
    .estate-card-name { font-weight: 600; font-size: 0.9rem; }
    .estate-card-meta { color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem; }
    .estate-card-delete {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 5px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .estate-card:hover .estate-card-delete { opacity: 1; }
    .estate-card-delete:hover { color: var(--down); }

    .estate-card-star {
      position: absolute;
      top: 0.6rem;
      right: 2rem;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1;
    }
    .estate-card:hover .estate-card-star { opacity: 1; }
    .estate-card-star.starred { opacity: 1; color: var(--accent); }
    .estate-card-star:hover { color: var(--accent); }

    .drag-handle {
      position: absolute;
      top: 50%;
      left: 0.5rem;
      transform: translateY(-50%);
      color: var(--border);
      cursor: grab;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.15s;
      user-select: none;
    }
    .estate-card:hover .drag-handle { opacity: 1; }
    .estate-card { padding-left: 1.6rem; }
    .estate-card.drag-over { border-color: var(--accent2); background: rgba(59,130,246,0.06); }
    .estate-card.dragging { opacity: 0.4; }

    .sidebar-empty {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Main content */
    .main {
      overflow-y: auto;
      padding: 1.5rem 2rem;
    }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
      color: var(--muted);
      text-align: center;
    }
    .welcome-icon { font-size: 3rem; }
    .welcome h2 { font-size: 1.1rem; color: var(--text); }
    .welcome p { font-size: 0.85rem; max-width: 280px; line-height: 1.6; }

    /* Dashboard */
    .dashboard { padding: 1.5rem 2rem; }
    .dashboard-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
    }
    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .dashboard-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .dashboard-card:hover { border-color: var(--accent2); }
    .dashboard-card-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; }
    .dashboard-card-count { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .dashboard-card-label { font-size: 0.7rem; color: var(--muted); }
    .dashboard-chart-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .highlights-section {
      background: var(--surface2);
      border: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
      border-radius: var(--radius);
      padding: 1rem;
      margin-top: 1.25rem;
    }
    .highlights-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 1.25rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .highlights-group {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .highlights-group:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .highlights-estate-header {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .highlights-subgroup { margin-top: 0.75rem; }
    .highlights-group-label {
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
      padding: 0.2rem 0;
    }
    .hl-table {
      width: 100%;
      min-width: 480px;
      border-collapse: collapse;
      font-size: 0.78rem;
      color: var(--text);
    }
    .hl-scroll { overflow-x: auto; }
    .hl-tr td {
      padding: 0.4rem 0.5rem 0.4rem 0;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
      vertical-align: middle;
    }
    .hl-tr:last-child td { border-bottom: none; }
    .hl-th th { padding: 0.25rem 0.5rem 0.25rem 0; font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
    .hl-c1 { width: 28%; }
    .hl-c2 { width: 20%; color: var(--muted); }
    .hl-c3 { width: 20%; }
    .hl-c4 { width: 20%; color: var(--muted); }
    .hl-c5 { width: 14%; }
    .hl-c6 { width: 10%; text-align: right; }
    .hl-link { color: #3b82f6; font-size: 0.78rem; white-space: nowrap; text-decoration: none; }
    .hl-link:hover { text-decoration: underline; }
    .highlights-estate { color: var(--muted); font-size: 0.75rem; }
    .dashboard-chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .estate-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }
    .estate-select:focus { border-color: var(--accent2); }

    /* Estate detail */
    .estate-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .estate-title { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    .estate-sub { color: var(--muted); font-size: 0.85rem; margin-top: 0.25rem; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .stat-label { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value { font-size: 1.4rem; font-weight: 700; margin-top: 0.25rem; color: var(--accent); }
    .stat-breakdown { display: flex; flex-direction: column; gap: 0.15rem; margin-top: 0.5rem; }
    .stat-breakdown span { font-size: 0.72rem; color: var(--muted); }
    .stat-unit { font-size: 0.7rem; color: var(--muted); font-weight: 400; }

    /* Chart */
    .chart-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .chart-wrap { position: relative; height: 160px; }
    canvas { width: 100% !important; }

    .no-data {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Listings table */
    .listings-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .listings-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      padding: 0.65rem 1rem;
      text-align: left;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid rgba(31,45,66,0.5);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .price-cell { font-weight: 700; color: var(--accent); }
    .unit-price { color: var(--muted); font-size: 0.75rem; margin-top: 0.1rem; }
    .floor-badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .floor-high { background: rgba(16,185,129,0.15); color: var(--up); }
    .floor-mid  { background: rgba(59,130,246,0.15); color: var(--accent2); }
    .floor-low  { background: rgba(245,158,11,0.15); color: var(--accent); }

    .detail-link {
      color: var(--accent2);
      text-decoration: none;
      font-size: 0.75rem;
    }
    .detail-link:hover { text-decoration: underline; }

    .price-change-up { color: var(--down); font-size: 0.72rem; font-weight: 600; }
    .price-change-down { color: var(--up); font-size: 0.72rem; font-weight: 600; }
    .price-change-flat { color: var(--muted); font-size: 0.72rem; }
    .ref-link { color: var(--muted); font-size: 0.72rem; text-decoration: none; }
    .ref-link:hover { color: var(--accent2); }
    .price-prev { color: var(--muted); font-size: 0.72rem; text-decoration: line-through; }
    .history-btn {
      background: var(--btn-bg);
      border: 1px solid var(--btn-bg);
      color: var(--text);
      border-radius: 4px;
      font-size: 0.68rem;
      padding: 0.1rem 0.4rem;
      cursor: pointer;
      margin-top: 0.2rem;
      display: inline-block;
    }
    .history-btn:hover { background: var(--btn-hover); border-color: var(--btn-hover); }

    /* History modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      min-width: 320px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .modal-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    .modal-sub { color: var(--muted); font-size: 0.78rem; margin-bottom: 1rem; }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      margin-top: -0.2rem;
    }
    /* Viewing modal form */
    .vf-label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; margin-top: 0.75rem; }
    .vf-label span { color: var(--down); margin-left: 2px; }
    .vf-input, .vf-select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 0.45rem 0.65rem;
      font-size: 0.82rem; outline: none; box-sizing: border-box;
    }
    .vf-input:focus, .vf-select:focus { border-color: var(--accent2); }
    .vf-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .vf-upload-label {
      display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
      background: var(--surface2); border: 1px dashed var(--border); border-radius: 6px;
      padding: 0.6rem 0.75rem; font-size: 0.8rem; color: var(--muted);
      transition: border-color 0.2s;
    }
    .vf-upload-label:hover { border-color: var(--accent2); color: var(--text); }
    .vf-img-preview { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
    .vf-img-thumb {
      position: relative; width: 64px; height: 64px;
      border-radius: 4px; overflow: hidden; background: var(--surface2);
    }
    .vf-img-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .vf-img-rm {
      position: absolute; top: 1px; right: 2px; background: rgba(0,0,0,0.6);
      border: none; color: #fff; font-size: 0.7rem; cursor: pointer;
      border-radius: 2px; padding: 0 3px; line-height: 14px;
    }
    .notes-chip { background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:0.25rem 0.7rem;font-size:0.78rem;cursor:pointer;transition:all 0.15s; }
    .notes-chip.active { background:var(--accent2);border-color:var(--accent2);color:#fff; }
    .vf-submit {
      margin-top: 1.1rem; width: 100%; background: var(--btn-bg);
      border: none; color: var(--text); border-radius: 6px;
      padding: 0.55rem; font-size: 0.88rem; font-weight: 600; cursor: pointer;
    }
    .vf-submit:hover { background: var(--btn-hover); }
    /* Viewings tab */
    .viewings-list { padding: 0.75rem 0; }
    .viewing-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.85rem 1rem; margin-bottom: 0.75rem;
    }
    .viewing-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .viewing-card-title { font-weight: 700; font-size: 0.88rem; }
    .viewing-card-date { color: var(--muted); font-size: 0.75rem; }
    .viewing-card-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.3rem 0.75rem;
      font-size: 0.78rem; margin-bottom: 0.5rem;
    }
    .viewing-card-kv { display: flex; flex-direction: column; }
    .viewing-card-k { color: var(--muted); font-size: 0.68rem; margin-bottom: 1px; }
    .viewing-card-imgs { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.4rem; }
    .viewing-card-img {
      width: 72px; height: 72px; object-fit: cover; border-radius: 4px;
      cursor: pointer; border: 1px solid var(--border);
    }
    .viewing-del-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.78rem; padding: 0.1rem 0.35rem; border-radius: 4px;
    }
    .viewing-del-btn:hover { color: var(--down); }

    .history-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .history-table th {
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.4rem 0.5rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .history-table td { padding: 0.5rem; border-bottom: 1px solid rgba(31,45,66,0.5); }
    .history-table tr:last-child td { border-bottom: none; }
    .history-row-latest td { color: var(--accent); font-weight: 600; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2rem;
      justify-content: center;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1.1rem;
      font-size: 0.85rem;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: fadeIn 0.2s ease;
    }
    .toast.success { border-color: var(--up); }
    .toast.error { border-color: var(--down); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Estate tabs */
    .estate-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .estate-tab {
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .estate-tab:hover { color: var(--text); }
    .estate-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Transaction table */
    .gain-pos { color: var(--up); font-size: 0.75rem; font-weight: 600; }
    .gain-neg { color: var(--down); font-size: 0.75rem; font-weight: 600; }
    .txn-date { color: var(--muted); font-size: 0.75rem; }
    .hs-val-btn {
      background: var(--btn-bg); border: 1px solid var(--btn-bg); color: var(--text);
      border-radius: 4px; padding: 2px 8px; font-size: 0.72rem; cursor: pointer;
      white-space: nowrap;
    }
    .hs-val-btn:hover { background: var(--btn-hover); border-color: var(--btn-hover); }
    .load-more-btn {
      display: block;
      width: 100%;
      padding: 0.75rem;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--accent2);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .load-more-btn:hover { background: rgba(59,130,246,0.06); }

    /* Sortable table headers */
    th.sortable {
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th.sortable:hover { color: var(--text); }
    th.sort-asc::after  { content: " ▲"; color: var(--accent); }
    th.sort-desc::after { content: " ▼"; color: var(--accent); }

    /* Filter bar */
    .filter-bar {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }
    .filter-pair {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }
    .filter-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .filter-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-chip:hover  { border-color: var(--accent2); color: var(--text); }
    .filter-chip.active { background: rgba(245,158,11,0.12); border-color: var(--accent); color: var(--accent); }
    .filter-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      width: 72px;
      outline: none;
    }
    .filter-input:focus { border-color: var(--accent2); }
    .filter-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.25rem 0.4rem;
      font-size: 0.75rem;
      outline: none;
      cursor: pointer;
      max-width: 120px;
    }
    .filter-select:focus { border-color: var(--accent2); }
    .filter-sep {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 0.2rem;
    }
    .filter-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Hamburger button — hidden on desktop */
    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.3rem 0.5rem;
      flex-direction: column;
      gap: 5px;
      margin-right: 0.6rem;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: background 0.2s;
    }
    .hamburger:hover span { background: var(--accent); }

    /* Sidebar mobile top bar */
    .sidebar-mobile-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-home-btn, .sidebar-close-btn {
      background: var(--btn-bg);
      border: 1px solid var(--btn-bg);
      color: var(--text);
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .sidebar-home-btn:hover { background: var(--btn-hover); border-color: var(--btn-hover); }
    .sidebar-close-btn:hover { background: var(--btn-hover); border-color: var(--btn-hover); }
    @media (max-width: 768px) {
      .sidebar-mobile-bar { display: flex; }
    }

    /* Mobile drawer overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 199;
    }
    .sidebar-overlay.open { display: block; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 80vw; max-width: 300px;
        border-right: 1px solid var(--border);
        border-bottom: none;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        z-index: 200;
        background: var(--surface);
      }
      .sidebar.open { transform: translateX(0); }
      .hamburger { display: flex; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 0.5rem; }
      .dashboard { padding: 0.75rem 0.75rem; }
      .highlights-group { margin-bottom: 1rem; padding-bottom: 1rem; }
      .highlights-title { margin-bottom: 0.75rem; }
      .highlights-estate-header { font-size: 0.95rem; margin-bottom: 0.5rem; }
      .highlights-subgroup { margin-top: 0.5rem; }
      .hl-tr td { padding: 0.3rem 0.4rem 0.3rem 0; }
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="屋苑列表">
      <span></span><span></span><span></span>
    </button>
    <div class="logo" onclick="goHome()" style="cursor:pointer">

</header>

<!-- Login Screen -->
<div id="login-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;align-items:center;justify-content:center">
  <div style="background:var(--surface1);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.4)">
    <div style="text-align:center;margin-bottom:1.5rem">

    <input id="login-username" type="text" placeholder="用戶名" autocomplete="username"
      style="width:100%;padding:0.65rem 0.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;box-sizing:border-box;margin-bottom:0.75rem"
      onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()">
    <input id="login-password" type="password" placeholder="密碼" autocomplete="current-password"
      style="width:100%;padding:0.65rem 0.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;box-sizing:border-box;margin-bottom:1rem"

<!-- Settings Modal -->

    <textarea id="settings-notes-options" style="width:100%;min-height:140px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;padding:0.6rem;box-sizing:border-box;resize:vertical;font-family:inherit" placeholder="例：&#10;心水&#10;一般&#10;唔考慮&#10;太貴"></textarea>
    <button class="vf-submit" onclick="saveSettings()" style="margin-top:0.75rem">儲存設定</button>
  </div>
</div>

<!-- Viewing Modal -->
<div class="modal-overlay" id="viewingModalOverlay" style="display:none" onclick="if(event.target===this)closeViewingModal()">
  <div class="modal" style="max-width:520px;max-height:90vh;overflow-y:auto">
    <button class="modal-close" onclick="closeViewingModal()">✕</button>
    <div class="modal-title">＋ 新增睇樓記錄</div>
    <div class="modal-sub" id="viewing-modal-estate-name"></div>
    <form id="viewingForm" onsubmit="submitViewing(event)">
      <label class="vf-label">睇樓日期<span>*</span></label>
      <input class="vf-input" type="date" id="vf-date" required>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem">
        <div>
          <label class="vf-label">座數<span>*</span></label>
          <input class="vf-input" type="text" id="vf-block" placeholder="例：3座" required>

      </div>

            <option value="">-- 不選 --</option>
            <option>東</option><option>南</option><option>西</option><option>北</option>
            <option>東南</option><option>東北</option><option>西南</option><option>西北</option>

        <div>
          <label class="vf-label">管理費/呎<span>*</span></label>
          <input class="vf-input" type="number" id="vf-mgmt" placeholder="$" min="0" step="0.01" required>
        </div>

      <label class="vf-label">備注</label>
      <div id="vf-notes-chips" style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.45rem"></div>

</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-mobile-bar">

      <button class="sidebar-close-btn" onclick="closeSidebar()">✕ 關閉</button>

        <span class="search-icon">🔍</span>

          type="text"

          placeholder="搜尋屋苑名稱…"

        >

      </div>

      <div class="sidebar-empty">載入中…</div>
    </div>

  <!-- Main -->
  <main class="main" id="main">
    <div class="loading"><div class="spinner"></div> 載入中…</div>

<script>
const API = "https://propwatch-worker.johnwong777.workers.dev";
let activeEstateId = null;
let searchTimer = null;
let chart = null;

// Listings state
let allListings = [];
let sortCol = "price";
let sortDir = "asc";
let filters = { beds: "all", floor: "all", building: "all", unit: "all", minPrice: "", maxPrice: "", minSize: "", maxSize: "", priceChanged: "all" };

// ── Toast ──────────────────────────────────────────────────────
function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── API calls ──────────────────────────────────────────────────
function getToken() { return localStorage.getItem("propwatch_token"); }

async function api(path, opts = {}) {
  const token = getToken();
  const res = await fetch(API + path, {
    headers: { "Content-Type": "application/json", ...(token ? { "Authorization": "Bearer " + token } : {}) },
    ...opts,
  });
  if (res.status === 401) { showLoginScreen(); throw new Error("請先登入"); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "請求失敗");
  return data;
}

function showLoginScreen() {
  localStorage.removeItem("propwatch_token");
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("logout-btn").style.display = "none";
}

function hideLoginScreen() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("logout-btn").style.display = "";
}

async function doLogin() {
  const username = document.getElementById("login-username").value.trim();
  const password = document.getElementById("login-password").value;
  const errEl = document.getElementById("login-error");
  errEl.style.display = "none";
  try {
    const data = await fetch(API + "/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    }).then(async r => { const d = await r.json(); if (!r.ok) throw new Error(d.error); return d; });
    localStorage.setItem("propwatch_token", data.token);
    hideLoginScreen();
    loadEstates();
    loadNotesOptions();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

async function doLogout() {
  try { await api("/api/logout", { method: "POST" }); } catch (_) {}
  showLoginScreen();
}

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const isOpen = sidebar.classList.contains('open');
  isOpen ? closeSidebar() : (sidebar.classList.add('open'), overlay.classList.add('open'));
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function goHome() {
  activeEstateId = null;
  _viewingEstateId = null;
  document.querySelectorAll(".estate-card").forEach(c => c.classList.remove("active"));
  if (dashboardEstates.length) showDashboard(dashboardEstates);
  else loadEstates();
}

// ── Dashboard ──────────────────────────────────────────────────
let dashboardEstates = [];

let dashboardMetric = "count"; // "count" | "price"

async function showDashboard(estates) {
  dashboardEstates = estates;
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="dashboard">
      <div class="highlights-section" id="highlights-section">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.75rem">
          <div style="display:flex;gap:0;border-bottom:2px solid var(--border)">
            <button id="dash-tab-today" onclick="switchDashTab('today')" style="background:none;border:none;border-bottom:2px solid var(--accent);margin-bottom:-2px;color:var(--text);font-size:0.9rem;font-weight:600;padding:0.35rem 0.85rem;cursor:pointer">今日動態 <span id="highlights-date" style="font-weight:400;color:var(--muted);font-size:0.8rem"></span></button>
            <button id="dash-tab-unsold" onclick="switchDashTab('unsold')" style="background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);font-size:0.9rem;padding:0.35rem 0.85rem;cursor:pointer">追蹤中放盤</button>
          </div>
          <button class="history-btn" style="font-size:0.88rem;padding:0.35rem 0.85rem" onclick="showHistoryPage()">歷史動態 →</button>
        </div>
        <div id="dash-panel-today"><div id="highlights-body" style="color:var(--muted);font-size:0.75rem">載入中…</div></div>
        <div id="dash-panel-unsold" style="display:none"><div id="unsold-body" style="color:var(--muted);font-size:0.75rem">載入中…</div></div>
      </div>
      <div class="dashboard-chart-section" style="margin-top:1.25rem">
        <div class="dashboard-chart-header">
          <div style="display:flex;gap:0.4rem">
            <button class="filter-chip ${dashboardMetric==='count'?'active':''}" onclick="setDashboardMetric('count')">放盤數量</button>
            <button class="filter-chip ${dashboardMetric==='price'?'active':''}" onclick="setDashboardMetric('price')">平均實呎價</button>
          </div>
          <select class="estate-select" id="dashboardSelect" onchange="loadDashboardChart(this.value)">
            ${estates.map(e => `<option value="${e.id}">${escHtml(e.name)}</option>`).join('')}
          </select>
        </div>
        <div class="chart-wrap" style="height:240px"><canvas id="dashboardChart"></canvas></div>
      </div>
    </div>
  `;
  if (estates.length) loadDashboardChart(estates[0].id);
  loadTodayHighlights();
  loadUnsoldViewings();
}

function switchDashTab(tab) {
  const isToday = tab === 'today';
  document.getElementById('dash-panel-today').style.display = isToday ? '' : 'none';
  document.getElementById('dash-panel-unsold').style.display = isToday ? 'none' : '';
  document.getElementById('dash-tab-today').style.borderBottomColor = isToday ? 'var(--accent)' : 'transparent';
  document.getElementById('dash-tab-today').style.color = isToday ? 'var(--text)' : 'var(--muted)';
  document.getElementById('dash-tab-today').style.fontWeight = isToday ? '600' : '400';
  document.getElementById('dash-tab-unsold').style.borderBottomColor = isToday ? 'transparent' : 'var(--accent)';
  document.getElementById('dash-tab-unsold').style.color = isToday ? 'var(--muted)' : 'var(--text)';
  document.getElementById('dash-tab-unsold').style.fontWeight = isToday ? '400' : '600';
}

async function loadUnsoldViewings() {
  const body = document.getElementById("unsold-body");
  if (!body) return;
  try {
    const { viewings } = await api("/api/viewings/unsold");
    if (!viewings.length) { body.innerHTML = '<span style="color:var(--muted)">未有追蹤中放盤</span>'; return; }

    // Fetch listings for each unique estate so buildMatchCell works
    const estateIds = [...new Set(viewings.map(v => v.estate_id).filter(Boolean))];
    const listingsByEstate = {};
    await Promise.all(estateIds.map(async eid => {
      try {
        const { listings } = await api(`/api/estates/${eid}/listings`);
        listingsByEstate[eid] = listings || [];
      } catch(_) { listingsByEstate[eid] = []; }
    }));

    const savedAllListings = allListings;
    const fmt = p => p ? `$${(p/1e4).toFixed(0)}萬` : '-';
    const rows = viewings.map(v => {
      const fmtBlock = v.block ? (/座$/.test(v.block) ? v.block : v.block+'座') : null;
      const fmtFloor = v.floor ? (/樓$|層$/.test(v.floor) ? v.floor : v.floor+'樓') : null;
      const fmtUnit  = v.unit  ? (/室$|號$/.test(v.unit)  ? v.unit  : v.unit+'室')  : null;
      const unitStr = [fmtBlock, fmtFloor, fmtUnit].filter(Boolean).join(' ');
      const psfStr = v.price && v.size_net ? `$${Math.round(v.price/v.size_net).toLocaleString()}/呎` : '';
      const estateId = v.estate_id || (dashboardEstates.find(e => e.name === v.estate_name)||{}).id || '';
      allListings = listingsByEstate[v.estate_id] || [];
      const matchCell = buildMatchCell(v);
      return `<tr class="hl-tr">
        <td class="hl-c1"><strong>${escHtml(v.estate_name)}</strong><br><span style="color:var(--muted);font-size:0.72rem">${escHtml(unitStr)}</span></td>
        <td class="hl-c2"><span style="font-weight:700;color:var(--accent)">${fmt(v.price)}</span>${psfStr ? `<br><span style="color:var(--muted);font-size:0.72rem">${psfStr}</span>` : ''}</td>
        <td class="hl-c3" id="umatch-${v.id}">${matchCell}</td>

    const hlTxnQueue = [];

    // 對應放盤售價變動
    const linkedChanges = data.linkedPriceChanges || [];
    if (linkedChanges.length) {
      let rows = "";
      for (const c of linkedChanges) {
        const diff = c.new_price - c.old_price;
        const diffHtml = `<span style="color:${diff<=0?'var(--up)':'var(--down)'}">${diff<=0?'▼':'▲'} ${fmt(Math.abs(diff))}</span>`;
        const link = c.detail_url ? `<a href="${escHtml(c.detail_url)}" target="_blank" style="color:var(--accent2);text-decoration:none">↗</a>` : '';
        rows += TR(
          `<strong>${escHtml(c.estate_name||'')}</strong> ${escHtml(c.building_name||'')} ${escHtml(c.floor||'')} ${escHtml(c.l_unit||'')} ${link}`,
          c.view_price ? fmt(c.view_price) : '-',
          `<span style="text-decoration:line-through;color:var(--muted)">${fmt(c.old_price)}</span>`,
          `<span style="font-weight:700;color:var(--accent)">${fmt(c.new_price)}</span>`,
          diffHtml
        );
      }
      html += `<div class="highlights-group" style="border:1px solid rgba(251,191,36,0.35);border-radius:8px;padding:0.75rem;background:rgba(251,191,36,0.06);margin-bottom:1rem"><div class="highlights-group-label" style="color:#fbbf24;font-size:0.9rem;margin-bottom:0.5rem">🏷️ 睇過嘅放盤售價變動 (${linkedChanges.length})</div>${tbl(TH('屋苑 / 單位','睇樓價','原價','新價','變動'), rows)}</div>`;
    }

    // 睇過嘅單位成交 — consolidated at top across all estates
    const allViewedTxns = (data.byEstate || []).flatMap(e => (e.viewedTxns || []).map(v => ({ ...v, estate_name: e.estate })));
    if (allViewedTxns.length) {
      let rows = "";
      for (const v of allViewedTxns) {
        const diff = v.view_price && v.txn_price ? v.txn_price - v.view_price : null;
        const diffHtml = diff != null
          ? `<span style="color:${diff<=0?'var(--up)':'var(--down)'}">${diff<=0?'▼':'▲'} ${fmt(Math.abs(diff))}</span>`
          : '-';
        rows += TR(
          `<strong>${escHtml(v.estate_name||'')}</strong> ${escHtml(v.building||'')} ${escHtml(v.floor||'')} ${escHtml(v.unit||'')}`,
          v.view_price ? fmt(v.view_price) : '-',
          `<span style="font-weight:700;color:var(--accent)">${v.txn_price ? fmt(v.txn_price) : '-'}</span>`,
          diffHtml,
          `<span style="color:var(--muted);font-size:0.72rem">${v.view_date||''}</span>`
        );
      }
      html += `<div class="highlights-group" style="border:1px solid rgba(248,113,113,0.35);border-radius:8px;padding:0.75rem;background:rgba(248,113,113,0.06);margin-bottom:1rem"><div class="highlights-group-label" style="color:#f87171;font-size:0.9rem;margin-bottom:0.5rem">👀 睇過嘅單位成交 (${allViewedTxns.length})</div>${tbl(TH('屋苑 / 單位','睇樓價','成交價','差價','睇樓日期'), rows)}</div>`;
    }

    for (const { estate, newTransactions = [], priceChanges = [], newListings = [], removedListings = [] } of (data.byEstate || [])) {
      let inner = "";

      if (newTransactions.length) {
        let rows = "";
        for (let ti = 0; ti < newTransactions.length; ti++) {
          const t = newTransactions[ti];
          const years = t.held_days ? t.held_days / 365 : null;
          const heldStr = years ? years.toFixed(1) + '年' : '-';
          let gainHtml = '-';
          if (t.gain_pct != null && years) {
            const annualPct = (Math.pow(1 + t.gain_pct / 100, 1 / years) - 1) * 100;
            const cls = t.gain_pct >= 0 ? 'gain-pos' : 'gain-neg';
            const arrow = t.gain_pct >= 0 ? '▲' : '▼';
            gainHtml = `<span class="${cls}">${arrow} ${Math.abs(annualPct).toFixed(1)}%/年</span><div class="unit-price">${arrow} ${Math.abs(t.gain_pct).toFixed(1)}%</div>`;
          } else if (t.gain_pct != null) {
            const cls = t.gain_pct >= 0 ? 'gain-pos' : 'gain-neg';
            gainHtml = `<span class="${cls}">${t.gain_pct>=0?'▲':'▼'} ${Math.abs(t.gain_pct).toFixed(1)}%</span>`;
          }
          const rowId = `hl-txn-${estate.replace(/\s/g,'')}-${ti}`;
          rows += `<tr class="hl-tr">
            <td class="hl-c1">${escHtml(t.building||'')} ${escHtml(t.floor||'')} ${escHtml(t.unit||'')}</td>
            <td class="hl-c2">${t.size_net ? t.size_net+'實呎' : ''}</td>
            <td class="hl-c3"><span style="font-weight:700;color:var(--accent)">${t.price ? fmt(t.price) : '-'}</span><span id="${rowId}-diff"></span></td>
            <td class="hl-c4">${heldStr}<div class="unit-price">${gainHtml}</div></td>
            <td class="hl-c5"><span id="${rowId}-val" style="color:var(--accent)"></span></td>
            <td class="hl-c6">${lnk(t.detail_url)}</td>
          </tr>`;
          hlTxnQueue.push({ rowId, estate, t });
        }
        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:#a78bfa">🏠 新成交 (${newTransactions.length})</div>${tbl(TH('單位','面積','成交價','持有 / 升跌','恆生估值',''), rows)}</div>`;
      }

      if (priceChanges.length) {
        let rows = "";
        for (const c of priceChanges) {
          const d = pct(c.new_price, c.old_price);
          const col = d > 0 ? 'var(--up)' : 'var(--down)';
          rows += TR(
            `${escHtml(c.building_name||'')} ${escHtml(c.floor||'')} ${escHtml(c.unit||'')}`,
            `<span style="text-decoration:line-through;color:var(--muted)">${fmt(c.old_price)}</span>`,
            `<span style="font-weight:700">${fmt(c.new_price)}</span>`,
            `<span style="color:${col}">${d>0?'▲':'▼'} ${Math.abs(d)}%</span>`,
            lnk(c.detail_url),
            srcBadge
          );
        }
        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:var(--accent)">💰 售價變動 (${priceChanges.length})</div>${tbl(TH('單位','原價','新價','變動','','來源'), rows)}</div>`;
      }

      if (newListings.length) {
        let rows = "";
        for (const l of newListings) {
          rows += TR(
            `${escHtml(l.building_name||'')} ${escHtml(l.floor||'')} ${escHtml(l.unit||'')}`,
            `${l.bedrooms!=null?l.bedrooms+'房':'-'}${l.size_net?' '+l.size_net+'呎':''}`,
            `<span style="font-weight:700;color:var(--accent)">${fmt(l.price)}</span>`,
            l.price_per_ft ? `$${Math.round(l.price_per_ft).toLocaleString()}/呎` : '',
            lnk(l.detail_url),
            srcBadge
          );
        }
        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:var(--up)">🆕 新放盤 (${newListings.length})</div>${tbl(TH('單位','房間 / 面積','價格','呎價','','來源'), rows)}</div>`;
      }

      if (removedListings.length) {
        let rows = "";
        for (const l of removedListings) {
          rows += TR(
            `${escHtml(l.building_name||'')} ${escHtml(l.floor||'')} ${escHtml(l.unit||'')}`,
            l.bedrooms!=null ? l.bedrooms+'房' : '-',
            `<span style="text-decoration:line-through;color:var(--muted)">${fmt(l.price)}</span>`,
            '',
            lnk(l.detail_url),
            srcBadge
          );
        }
        inner += `<div class="highlights-subgroup"><div class="highlights-group-label" style="color:var(--down)">❌ 已下架 (${removedListings.length})</div>${tbl(TH('單位','房間','原價','','','來源'), rows)}</div>`;
      }

      if (inner) {
        const estateObj = dashboardEstates.find(e => e.name === estate);
        const hdr = estateObj
          ? `<div class="highlights-estate-header" style="cursor:pointer" onclick="showEstate(${estateObj.id},'${escHtml(estate).replace(/'/g,"\\'")}','${escHtml(estateObj.district||'').replace(/'/g,"\\'")}');closeSidebar()">${escHtml(estate)} <span style="font-size:0.72rem;color:var(--accent2);vertical-align:middle">↗</span></div>`
          : `<div class="highlights-estate-header">${escHtml(estate)}</div>`;
        html += `<div class="highlights-group">${hdr}${inner}</div>`;
      }
    }

    if (!html) html = `<span style="color:var(--muted)">今日暫無更新</span>`;
    body.innerHTML = html;

    // Auto-fetch HS valuation for new transactions
    for (const { rowId, estate: estateName, t } of hlTxnQueue) {
      const blockNum   = (t.building || '').match(/\d+/)?.[0] || '';
      const floorNum   = (t.floor || '').match(/\d+/)?.[0] || '';
      const flatLetter = (t.unit || '').replace(/[室層樓]/g, '').trim();
      if (!estateName || !blockNum || !floorNum || !flatLetter) continue;
      (async () => {
        try {
          const params = new URLSearchParams({ estate: estateName, block: blockNum, floor: floorNum, flat: flatLetter });
          const hsData = await api(`/api/hangseng-valuation?${params}`);
          if (hsData?.price) {
            const hp = Number(hsData.price);
            const diffSpan = document.getElementById(rowId + '-diff');
            if (diffSpan) diffSpan.innerHTML = hsDiffHtml(hp, t.price);
            const valSpan = document.getElementById(rowId + '-val');
            if (valSpan) {
              const eid = (dashboardEstates.find(e => e.name === estateName) || {}).id || '';
              valSpan.innerHTML = `${hsValHtml(hp)}<button class="history-btn" style="display:block;margin-top:3px" onclick="showHSHistory('${blockNum}','${floorNum}','${flatLetter}','${eid}')">歷史</button>`;
            }
          }
        } catch {}
      })();
    }
  } catch(e) {
    if (body) body.innerHTML = `<span style="color:var(--muted)">載入失敗</span>`;
  }
}

          ? `<div class="highlights-estate-header" style="cursor:pointer" onclick="showEstate(${estateObj.id},'${escHtml(estate).replace(/'/g,"\\'")}','${escHtml(estateObj.district||'').replace(/'/g,"\\'")}');closeSidebar()">${escHtml(estate)} <span style="font-size:0.72rem;color:var(--accent2);vertical-align:middle">↗</span></div>`

function drawDashboardChart(trends) {
  const canvas = document.getElementById("dashboardChart");
  if (!canvas || trends.length < 2) return;

  const isPrice = dashboardMetric === "price";
  const labels = trends.map(t => t.snapshot_date.slice(5));
  const data = trends.map(t => isPrice ? t.avg_price_ft : t.listing_count);
  const color = isPrice ? "#f59e0b" : "#3b82f6";

  const W = canvas.parentElement.offsetWidth;
  const H = 200;
  canvas.width = W;
  canvas.height = H;

  const ctx = canvas.getContext("2d");
  const pad = { top: 20, right: 16, bottom: 28, left: 44 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;

  const minV = Math.max(0, Math.min(...data) - 2);
  const maxV = Math.max(...data) + 2;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = "rgba(31,45,66,0.8)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (h / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
  }

  // X labels
  ctx.fillStyle = "#64748b";
  ctx.font = "10px -apple-system,sans-serif";
  ctx.textAlign = "center";
  const step = Math.ceil(labels.length / 8);
  labels.forEach((l, i) => {
    if (i % step === 0) {
      const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
      ctx.fillText(l, x, H - 6);
    }
  });

  // Y label formatting
  const fmtY = v => isPrice ? `$${Math.round(v).toLocaleString()}` : String(Math.round(v));
  ctx.fillStyle = "#64748b";
  ctx.font = "10px -apple-system,sans-serif";
  ctx.textAlign = "right";
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (h / 4) * i;
    const val = maxV - ((maxV - minV) / 4) * i;
    ctx.fillText(fmtY(val), pad.left - 6, y + 4);
  }

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  const rgb = isPrice ? "245,158,11" : "59,130,246";
  grad.addColorStop(0, `rgba(${rgb},0.28)`);
  grad.addColorStop(1, `rgba(${rgb},0)`);

  ctx.beginPath();
  data.forEach((v, i) => {
    const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.left + w, pad.top + h);
  ctx.lineTo(pad.left, pad.top + h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  data.forEach((v, i) => {
    const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots
  data.forEach((v, i) => {
    const x = pad.left + (w / Math.max(data.length - 1, 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    ctx.beginPath();
    ctx.arc(x, y, i === data.length - 1 ? 4 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  });
}

async function loadEstates() {

async function toggleFavourite(e, id) {
  e.stopPropagation();
  await api(`/api/estates/${id}/favourite`, { method: "POST" });
  loadEstates();
}

let dragSrc = null;

function initDragSort() {
  const cards = document.querySelectorAll("#estateList .estate-card");
  cards.forEach(card => {
    card.addEventListener("dragstart", e => {
      dragSrc = card;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => {
      card.classList.remove("dragging");
      document.querySelectorAll(".estate-card").forEach(c => c.classList.remove("drag-over"));
    });
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      if (card !== dragSrc) {
        document.querySelectorAll(".estate-card").forEach(c => c.classList.remove("drag-over"));
        card.classList.add("drag-over");
      }
    });
    card.addEventListener("drop", async e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === card) return;
      const list = document.getElementById("estateList");
      const cards = [...list.querySelectorAll(".estate-card")];
      const fromIdx = cards.indexOf(dragSrc);
      const toIdx = cards.indexOf(card);
      if (fromIdx < toIdx) card.after(dragSrc);
      else card.before(dragSrc);
      const newOrder = [...list.querySelectorAll(".estate-card")].map((c, i) => ({
        id: Number(c.dataset.id),
        sort_order: i,
      }));
      await api("/api/estates/reorder", { method: "POST", body: JSON.stringify({ order: newOrder }) });
    });
  });
}

async function deleteEstate(e, id) {
  e.stopPropagation();
  if (!confirm("確認移除此屋苑追蹤？")) return;
  await api(`/api/estates/${id}`, { method: "DELETE" });
  if (activeEstateId === id) {
    activeEstateId = null;
    document.getElementById("main").innerHTML = `<div class="welcome"><div class="welcome-icon">🏠</div><h2>選擇屋苑</h2></div>`;
  }
  loadEstates();
}

// ── Search autocomplete ────────────────────────────────────────
const searchInput = document.getElementById("searchInput");
const autocomplete = document.getElementById("autocomplete");

searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  const val = searchInput.value.trim();
  if (val.length < 2) { autocomplete.classList.add("hidden"); return; }
  searchTimer = setTimeout(() => doSearch(val), 400);
});

searchInput.addEventListener("blur", () => {
  setTimeout(() => autocomplete.classList.add("hidden"), 200);
});

searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    handleSearchBtn();
  }
});

async function handleSearchBtn() {
  const val = searchInput.value.trim();
  if (val.length < 2) return;
  clearTimeout(searchTimer);
  await doSearch(val);
  // 如果只有一個結果就直接追蹤
  const items = autocomplete.querySelectorAll(".autocomplete-item[data-code]");
  if (items.length === 1) items[0].click();
}

async function doSearch(keyword) {
  try {
    const { results } = await api("/api/search", {
      method: "POST",
      body: JSON.stringify({ keyword }),
    });

    if (!results?.length) {
      autocomplete.innerHTML = '<div class="autocomplete-item" style="color:var(--muted)">沒有結果</div>';
      autocomplete.classList.remove("hidden");
      return;
    }

    autocomplete.innerHTML = "";
    results.slice(0, 8).forEach(r => {
      const div = document.createElement("div");
      div.className = "autocomplete-item";
      div.dataset.code = r.bigestcode || r.bigCode || "";
      div.dataset.name = r.bigEstateName || r.name || "";
      div.dataset.district = r.districtName || r.district || "";
      div.dataset.isBigest = r.isBigest ? "1" : "0";
      div.innerHTML = `
        <div class="autocomplete-name">${escHtml(r.bigEstateName || r.name)}</div>
        <div class="autocomplete-meta">${escHtml(r.districtName || r.district || '')} ${r.bigestcode || r.bigCode || ''}</div>
      `;
      div.addEventListener("click", () => {
        trackEstate(div.dataset.name, div.dataset.code, div.dataset.district, div.dataset.isBigest === "1");
      });
      autocomplete.appendChild(div);
    });
    autocomplete.classList.remove("hidden");
  } catch (err) {
    console.error("Search error:", err);
    autocomplete.innerHTML = `<div class="autocomplete-item" style="color:var(--down)">搜尋失敗：${err.message}</div>`;
    autocomplete.classList.remove("hidden");
  }
}

async function trackEstate(name, bigestcode, district, isBigest) {
  autocomplete.classList.add("hidden");
  searchInput.value = "";
  toast("正在抓取 " + name + " 資料…");
  try {
    const data = await api("/api/track", {
      method: "POST",
      body: JSON.stringify({ name, bigestcode, district, isBigest }),
    });
    toast(`已新增 ${name}，共 ${data.count} 個盤`, "success");
    await loadEstates();
    showEstate(data.estate.id, name, district);
  } catch (err) {
    toast("新增失敗：" + err.message, "error");
  }
}

      const vals = ls.map(l => l.price).filter(Boolean);

  } catch (err) {
