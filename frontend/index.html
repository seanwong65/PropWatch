function estateEnabledMap() {
  const bar = document.getElementById('estate-info-bar');
  try { return JSON.parse(bar?.dataset.enabled || '{}'); } catch (_) { return {}; }
}

function renderSourceToggles() {
  const el = document.getElementById('sourceToggles');
  if (!el) return;
  const enabled = estateEnabledMap();
  const btnStyle = (active) => `background:${active ? 'rgba(251,191,36,0.12)' : 'var(--surface2)'};border:1px solid ${active ? 'var(--accent)' : 'var(--border)'};border-radius:var(--radius);padding:0.25rem 0.65rem;font-size:0.75rem;cursor:pointer;color:${active ? 'var(--accent)' : 'var(--muted)'};font-weight:${active ? '600' : '400'}`;
  el.innerHTML = `<div style="display:flex;gap:0.4rem">
    ${SOURCES.map(s => `<button style="${btnStyle(!!enabled[s.id])}" onclick="toggleSource('${s.id}')">${s.label}</button>`).join('')}
  </div>`;
}

async function toggleSource(src) {
  const bar = document.getElementById('estate-info-bar');
  if (!bar) return;
  const id = bar.dataset.id;
  const label = sourceLabel(src);
  const enabled = estateEnabledMap();
  const newVal = enabled[src] ? 0 : 1;
  await api(`/api/estates/${id}`, { method: 'PATCH', body: JSON.stringify({ [`${src}_enabled`]: newVal }) });
  enabled[src] = newVal;
  bar.dataset.enabled = JSON.stringify(enabled);
  toast(newVal ? `已啟用${label}資料（下次同步生效）` : `已停用${label}資料`, newVal ? 'success' : 'info');
  renderSourceToggles();
}

function setFilter(key, val) {
  filters[key] = val;
  renderFilterBar();
  renderListingsTable();
}

function setRangeFilter(key, val) {
  filters[key] = val;
  renderListingsTable();
}

function applyFilters(listings) {
  return listings.filter(l => {
    if (filters.beds !== "all") {
      const b = l.bedrooms ?? 0;
      if (filters.beds === "4+" && b < 4) return false;
      if (filters.beds !== "4+" && String(b) !== filters.beds) return false;
    }
    if (filters.floor !== "all" && l.floor && !l.floor.includes(filters.floor)) return false;
    if (filters.building !== "all" && l.building_name !== filters.building) return false;
    if (filters.unit !== "all" && l.unit !== filters.unit) return false;
    if (filters.minPrice && l.price < filters.minPrice * 1e4) return false;
    if (filters.maxPrice && l.price > filters.maxPrice * 1e4) return false;
    if (filters.minSize && l.size_net < Number(filters.minSize)) return false;
    if (filters.maxSize && l.size_net > Number(filters.maxSize)) return false;
    const hasChange = l.prev_price && Math.abs(l.price - l.prev_price) > 1000;
    if (filters.priceChanged === 'yes' && !hasChange) return false;
    if (filters.priceChanged === 'no' && hasChange) return false;
    if (filters.source !== 'all' && l.source !== filters.source) return false;
    if (filters.dom !== 'all') {
      const days = domDays(l);
      if (days == null || days < Number(filters.dom)) return false;
    }
    return true;
  });
}

function applySortAndFilter() {
  const filtered = applyFilters(allListings);
  const colMap = {
    price: l => l.price ?? 0,
    price_per_ft: l => l.price_per_ft ?? 0,
    size_net: l => l.size_net ?? 0,
    bedrooms: l => l.bedrooms ?? 0,
    floor: l => { const f = l.floor||""; return f.includes("高")?3:f.includes("中")?2:f.includes("低")?1:0; },
    building_name: l => l.building_name || "",
    direction: l => l.direction || "",
  };
  const fn = colMap[sortCol] || (l => 0);
  filtered.sort((a, b) => {
    const av = fn(a), bv = fn(b);
    if (av < bv) return sortDir === "asc" ? -1 : 1;
    if (av > bv) return sortDir === "asc" ? 1 : -1;
    return 0;
  });
  return filtered;
}

function setSort(col) {
  if (sortCol === col) sortDir = sortDir === "asc" ? "desc" : "asc";
  else { sortCol = col; sortDir = "asc"; }
  renderListingsTable();
}

// Merge listings that are the SAME unit (座+樓層+單位+實呎) across different
// sources into one row — but only when their prices are within 5% of each
// other. A bigger gap likely means different actual flats inside the same
// floor band (floor is masked to 高/中/低層), so those stay separate.
function makeCombined(items, isManual) {
  const byPrice = [...items].sort((a, b) => (a.price || 0) - (b.price || 0));
  const prices = byPrice.map(i => i.price).filter(Boolean);
  const ppf = byPrice.map(i => i.price_per_ft).filter(Boolean);
  const firstSeen = items.map(i => i.first_seen).filter(Boolean).sort()[0] || null;
  return {
    _combined: true,
    _manual: !!isManual,
    building_name: items[0].building_name, floor: items[0].floor,
    unit: items[0].unit, size_net: items[0].size_net, bedrooms: items[0].bedrooms,
    direction: items.map(i => i.direction).find(Boolean) || null,
    first_seen: firstSeen,
    publish_date: items.map(i => i.publish_date).filter(Boolean).sort()[0] || null,
    removed_date: items.every(i => i.removed_date) ? items[0].removed_date : null,
    price_min: Math.min(...prices), price_max: Math.max(...prices),
    ppf_min: ppf.length ? Math.min(...ppf) : null, ppf_max: ppf.length ? Math.max(...ppf) : null,
    sources: byPrice.map(i => ({ source: i.source, price: i.price, detail_url: i.detail_url, ref_no: i.ref_no })),
  };
}

// Groups same-unit cross-source listings (price within 5%), honouring any
// saved overrides: a ref_no marked 'ungrouped' is always forced solo (breaks
// out of whatever auto/manual grouping it would otherwise join); refs sharing
// a manual 'grouped' group_key are combined unconditionally.
function groupListings(listings) {
  const groups = new Map();
  const order = [];
  let soloId = 0;
  for (const l of listings) {
    const ov = l.ref_no && groupOverrides[l.ref_no];
    let key;
    if (ov && ov.status === 'grouped' && ov.group_key) key = `m|${ov.group_key}`;
    else if (ov && ov.status === 'ungrouped') key = `s|${soloId++}`;
    else key = (l.building_name && l.unit && l.size_net)
      ? `g|${l.building_name}|${l.floor || ''}|${l.unit}|${l.size_net}`
      : `s|${soloId++}`;
    if (!groups.has(key)) { groups.set(key, []); order.push(key); }
    groups.get(key).push(l);
  }
  const rows = [];
  for (const key of order) {
    const items = groups.get(key);
    if (key.startsWith('m|')) {
      rows.push(items.length > 1 ? makeCombined(items, true) : items[0]);
      continue;
    }
    const nSrc = new Set(items.map(i => i.source)).size;
    if (items.length > 1 && nSrc > 1) {
      const prices = items.map(i => i.price).filter(Boolean);
      const min = Math.min(...prices), max = Math.max(...prices);
      if (min > 0 && (max - min) / min <= 0.05) { rows.push(makeCombined(items)); continue; }
    }
    for (const i of items) rows.push(i);
  }
  return rows;
}

// Persist a group-override action then refresh the current estate's listings.
async function applyGroupOverride(action, refNos) {
  if (!activeEstateId || !refNos.length) return;
  try {
    await api(`/api/estates/${activeEstateId}/group-overrides`, {
      method: 'POST', body: JSON.stringify({ action, ref_nos: refNos }),
    });
    const { overrides } = await api(`/api/estates/${activeEstateId}/group-overrides`);
    groupOverrides = {};
    for (const o of overrides) groupOverrides[o.ref_no] = o;
    groupSelected.clear();
    renderListingsTable();
  } catch (e) { toast('操作失敗：' + e.message, 'error'); }
}

function toggleGroupSelectMode() {
  groupSelectMode = !groupSelectMode;
  groupSelected.clear();
  renderListingsTable();
}

function toggleGroupSelect(refNo) {
  groupSelected.has(refNo) ? groupSelected.delete(refNo) : groupSelected.add(refNo);
  renderListingsTable();
}

// Days on market — use the EARLIER of the source's publish date and the day we
// first recorded it. Our first_seen is a hard floor (we saw it live that day),
// so if a portal "refreshes" a stale listing to look new (publish date later
// than our record), the fake-fresh date is ignored and we keep the earlier one.
function listingDate(l) {
  const dates = [l.publish_date, l.first_seen].filter(Boolean);
  return dates.length ? dates.sort()[0] : null;   // earliest (YYYY-MM-DD sorts lexically)
}
function domDays(l) {
  const d = listingDate(l);
  if (!d) return null;
  const days = Math.floor((Date.now() - Date.parse(d)) / 86400000);
  return days >= 0 ? days : null;
}
function domBadge(l) {
  const days = domDays(l);
  if (days == null) return '';
  const color = days >= 180 ? 'var(--down)' : days >= 90 ? 'var(--accent)' : 'var(--muted)';
  return `<div style="font-size:0.72rem;color:${color}">放 ${days.toLocaleString()} 日</div>`;
}

function renderListingsTable() {
  const el = document.getElementById("listingsTable");
  if (!el) return;
  const visible = applySortAndFilter();
  const displayRows = groupListings(visible);

  const fc = document.getElementById("filterCount");
  if (fc) fc.textContent = `顯示 ${visible.length} / ${allListings.length} 個盤${displayRows.length < visible.length ? `(合併為 ${displayRows.length} 行)` : ''}`;

  const modeBtn = document.getElementById('groupModeBtn');
  if (modeBtn) {
    modeBtn.textContent = groupSelectMode ? '✕ 取消群組模式' : '群組模式';
    modeBtn.style.background = groupSelectMode ? 'var(--btn-hover)' : '';
  }
  const selBar = document.getElementById('groupSelectBar');
  if (selBar) {
    selBar.innerHTML = groupSelectMode
      ? `<div style="display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0;font-size:0.8rem;color:var(--muted)">
           剔選 2 個或以上盤(建議唔同來源)夾成一行 —— 已選 ${groupSelected.size} 個
           <button class="history-btn" ${groupSelected.size < 2 ? 'disabled style="opacity:0.5"' : ''} onclick="applyGroupOverride('group', [...groupSelected])">合併選中</button>
         </div>` : '';
  }

  const cols = [
    ...(groupSelectMode ? [{ key: null, label: '' }] : []),
    { key: "first_seen",    label: "上盤日期" },
    { key: "size_net",      label: "座/樓層/房數/實呎" },
    { key: "price",         label: "售價" },
    { key: "price_per_ft",  label: "實呎價" },
    { key: "direction",     label: "座向" },
    { key: null,            label: "來源" },
  ];

  const ths = cols.map(c => {
    if (!c.key) return `<th>${c.label||''}</th>`;
    const cls = c.key === sortCol
      ? `sortable sort-${sortDir}`
      : "sortable";
    return `<th class="${cls}" onclick="setSort('${c.key}')">${c.label}</th>`;
  }).join('');

  const unitCell = l => `
    ${escHtml(l.building_name||'-')}
    <span class="floor-badge ${floorClass(l.floor)}">${escHtml(l.floor||'-')}</span>
    <span style="margin-left:0.4rem">${escHtml(l.unit||'-')}</span>
    <div style="color:var(--muted);font-size:0.75rem;margin-top:0.15rem;display:flex;align-items:center;gap:0.35rem;flex-wrap:wrap">
      <span>${l.bedrooms ?? '-'}房 · ${l.size_net ? l.size_net.toLocaleString()+'呎' : '-'}</span>
      ${l.building_name && l.unit ? `<button class="history-btn" style="font-size:0.7rem;padding:0.1rem 0.4rem;margin:0" onclick="openLineHistory('${escHtml(l.building_name)}','${escHtml(l.unit)}','${escHtml(l.floor||'')}')">類近成交 ↓</button>` : ''}
    </div>`;

  const priceCell = l => l._combined
    ? `<div style="color:var(--accent);font-weight:600">$${(l.price_min/1e4).toFixed(0)}${l.price_max > l.price_min ? `–${(l.price_max/1e4).toFixed(0)}` : ''}萬</div>
       <div style="font-size:0.72rem;color:var(--muted)">最平 ${sourceLabel(l.sources[0].source)} · ${l.sources.length} 個源</div>`
    : `$${l.price ? (l.price/1e4).toFixed(0)+'萬' : '-'}
       ${priceChangeBadge(l.price, l.prev_price)}
       ${l.price_variants > 1 ? `<div style="font-size:0.72rem;color:${l.price < l.prev_price ? 'var(--up)' : 'var(--accent)'}">改價 ${l.price_variants - 1} 次</div>` : ''}
       ${l.ref_no ? `<br><button class="history-btn" onclick="showHistory('${escHtml(l.ref_no)}','${escHtml((l.building_name||'')+' '+(l.floor||'')+(l.unit||''))}')">歷史 ↓</button>` : ''}`;

  const ppfCell = l => {
    const lo = l._combined ? l.ppf_min : l.price_per_ft;
    const hi = l._combined ? l.ppf_max : l.price_per_ft;
    return `<div>$${lo ? lo.toLocaleString() : '-'}${(hi && hi > lo) ? `–${hi.toLocaleString()}` : ''}</div><div class="unit-price">/呎</div>`;
  };

  const sourceCell = l => {
    if (l._combined) {
      const links = l.sources.map(s => s.detail_url
        ? `<a href="${safeUrl(s.detail_url)}" target="_blank" class="detail-link" style="font-size:0.72rem;white-space:nowrap">${sourceLabel(s.source)} $${(s.price/1e4).toFixed(0)} ↗</a>`
        : `<span style="font-size:0.72rem;white-space:nowrap;color:var(--muted)">${sourceLabel(s.source)} $${(s.price/1e4).toFixed(0)}</span>`
      ).join('<br>');
      const refs = l.sources.map(s => s.ref_no).filter(Boolean);
      const undoLabel = l._manual ? '還原' : '拆開';
      const undoAction = l._manual ? 'reset' : 'ungroup';
      const undoBtn = refs.length
        ? `<button class="history-btn" style="font-size:0.68rem;padding:0.05rem 0.35rem;margin-top:0.25rem" onclick='applyGroupOverride("${undoAction}", ${JSON.stringify(refs)})'>${undoLabel}</button>`
        : '';
      return links + '<br>' + undoBtn;
    }
    const link = l.detail_url
      ? `<a href="${safeUrl(l.detail_url)}" target="_blank" class="detail-link" style="font-size:0.75rem">${sourceLabel(l.source)} ↗</a>`
      : `<span style="font-size:0.75rem">${sourceLabel(l.source)}</span>`;
    const hasOverride = l.ref_no && groupOverrides[l.ref_no];
    const resetBtn = hasOverride
      ? `<br><button class="history-btn" style="font-size:0.68rem;padding:0.05rem 0.35rem;margin-top:0.2rem" onclick="applyGroupOverride('reset',['${escHtml(l.ref_no)}'])">↺ 還原自動</button>`
      : '';
    return link + resetBtn;
  };

  const rows = displayRows.length === 0
    ? `<tr><td colspan="${cols.length}" class="no-data" style="padding:2rem;text-align:center">無符合條件的放盤</td></tr>`
    : displayRows.map(l => {
      const rowStyle = (l.removed_date || l._combined)
        ? ` style="${l.removed_date ? 'opacity:0.45;' : ''}${l._combined ? 'background:rgba(16,185,129,0.06);' : ''}"` : '';
      const checkboxCell = groupSelectMode
        ? `<td>${(!l._combined && l.ref_no) ? `<input type="checkbox" ${groupSelected.has(l.ref_no) ? 'checked' : ''} onchange="toggleGroupSelect('${escHtml(l.ref_no)}')">` : ''}</td>`
        : '';
      return `
      <tr${rowStyle}>
        ${checkboxCell}
        <td class="txn-date">
          ${listingDate(l) || '-'}
          ${l.removed_date ? `<div style="color:var(--down);font-size:0.75rem">下架 ${l.removed_date}</div>` : domBadge(l)}
        </td>
        <td>${unitCell(l)}</td>
        <td class="price-cell">${priceCell(l)}</td>
        <td>${ppfCell(l)}</td>
        <td>${escHtml(l.direction||'-')}</td>
        <td>${sourceCell(l)}</td>
      </tr>`;
    }).join('');

  renderFrozenTable(el, ths, rows);
}

function floorClass(floor) {
  if (!floor) return "";
  if (floor.includes("高")) return "floor-high";
  if (floor.includes("中")) return "floor-mid";
  if (floor.includes("低")) return "floor-low";
  return "";
}

// Listing sources registry — add a source here and the filter chips, per-estate
// toggles, badges and labels all pick it up automatically.
const SOURCES = [
  { id: "centanet", label: "中原",     defaultOn: true },
  { id: "ricacorp", label: "利嘉閣",   defaultOn: false },
  { id: "hkp",      label: "香港置業", defaultOn: false },
];
function sourceLabel(s) {
  const src = SOURCES.find(x => x.id === s);
  return src ? src.label : (s || "中原");
}
// centanet is on unless explicitly 0; others must be truthy.
function sourceEnabledFE(est, id) {
  const v = est ? est[id + "_enabled"] : undefined;
  return id === "centanet" ? v !== 0 : !!v;
}

// ── Chart ──────────────────────────────────────────────────────
function drawChart(trends, overlay) {
  const canvas = document.getElementById("trendChart");
  if (!canvas) return;

  const labels = trends.map(t => t.snapshot_date.slice(5));
  const data = trends.map(t => t.avg_price_ft);

  const W = canvas.parentElement.offsetWidth;
  const H = 160;
  canvas.width = W;
  canvas.height = H;

  const ctx = canvas.getContext("2d");
  const pad = { top: 20, right: 16, bottom: 28, left: 56 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;

  const allVals = data.concat((overlay || []).filter(v => v != null));
  const minV = Math.min(...allVals) * 0.98;
  const maxV = Math.max(...allVals) * 1.02;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = "rgba(31,45,66,0.8)";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (h / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + w, y);
    ctx.stroke();

    const val = maxV - ((maxV - minV) / 4) * i;
    ctx.fillStyle = "#64748b";
    ctx.font = "10px -apple-system, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText("$" + Math.round(val).toLocaleString(), pad.left - 6, y + 4);
  }

  // X labels
  ctx.fillStyle = "#64748b";
  ctx.textAlign = "center";
  const step = Math.ceil(labels.length / 10);
  labels.forEach((l, i) => {
    if (i % step === 0) {
      const x = pad.left + (w / (data.length - 1)) * i;
      ctx.fillText(l, x, H - 6);
    }
  });

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  grad.addColorStop(0, "rgba(251,191,36,0.25)");
  grad.addColorStop(1, "rgba(251,191,36,0)");

  ctx.beginPath();
  data.forEach((v, i) => {
    const x = pad.left + (w / (data.length - 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.left + w, pad.top + h);
  ctx.lineTo(pad.left, pad.top + h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = "#f59e0b";
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  data.forEach((v, i) => {
    const x = pad.left + (w / (data.length - 1)) * i;
    const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Last point dot
  const lx = pad.left + w;
  const lv = data[data.length - 1];
  const ly = pad.top + h - ((lv - minV) / (maxV - minV)) * h;
  ctx.beginPath();
  ctx.arc(lx, ly, 4, 0, Math.PI * 2);
  ctx.fillStyle = "#f59e0b";
  ctx.fill();

  // 全組合指數 overlay — dashed blue line, scaled to start at the estate's
  // first point so divergence = out/under-performing the tracked market.
  if (overlay && overlay.filter(v => v != null).length >= 2) {
    ctx.beginPath();
    ctx.setLineDash([5, 4]);
    ctx.strokeStyle = "#3b82f6";
    ctx.lineWidth = 1.5;
    let started = false;
    overlay.forEach((v, i) => {
      if (v == null) return;
      const x = pad.left + (w / (data.length - 1)) * i;
      const y = pad.top + h - ((v - minV) / (maxV - minV)) * h;
      started ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
      started = true;
    });
    ctx.stroke();
    ctx.setLineDash([]);
    // Legend
    ctx.font = "10px -apple-system, sans-serif";
    ctx.textAlign = "left";
    ctx.fillStyle = "#f59e0b"; ctx.fillText("── 本屋苑", pad.left + 4, 12);
    ctx.fillStyle = "#3b82f6"; ctx.fillText("╌╌ 全組合", pad.left + 64, 12);
  }
}

// ── Sync all ──────────────────────────────────────────────────
async function syncAll() {
  toast("同步中…");
  try {
    const endpoint = activeEstateId ? `/api/sync?estateId=${activeEstateId}` : "/api/sync";
    const { results } = await api(endpoint, { method: "POST" });
    const ok = results.filter(r => r.ok).length;
    toast(`同步完成：${ok}/${results.length} 個屋苑`, "success");
    await loadEstates();
    if (activeEstateId) {
      const card = document.querySelector(".estate-card.active");
      if (card) card.click();
    }
  } catch (err) {
    toast("同步失敗：" + err.message, "error");
  }
}

async function showHistory(refNo, label) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      <div class="modal-title">${escHtml(label)}</div>
      <div class="modal-sub" id="historyModalSub">放盤編號：${escHtml(refNo)}</div>
      <div id="historyContent"><div class="loading"><div class="spinner"></div> 載入中…</div></div>
    </div>
  `;
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);

  try {
    const { history, source, detail_url } = await api(`/api/listings/${encodeURIComponent(refNo)}/history`);
    const srcLabel = sourceLabel(source);
    const sub = document.getElementById("historyModalSub");
    if (sub) sub.innerHTML = `放盤編號：${detail_url
      ? `<a href="${safeUrl(detail_url)}" target="_blank" class="detail-link">${escHtml(refNo)} ↗</a>`
      : escHtml(refNo)
    } &nbsp;<span style="font-size:0.75rem;color:var(--muted);background:var(--surface2);border-radius:4px;padding:0.1rem 0.4rem">${srcLabel}</span>`;
    const content = document.getElementById("historyContent");
    if (!history.length) {
      content.innerHTML = '<div class="no-data">暫無歷史記錄</div>';
      return;
    }
    const rows = [...history].reverse().map((h, i) => `
      <tr class="${i === 0 ? 'history-row-latest' : ''}">
        <td>${h.snapshot_date}</td>
        <td>$${(h.price/1e4).toFixed(0)}萬</td>
        <td>$${h.price_per_ft ? h.price_per_ft.toLocaleString() : '-'}/呎</td>
        <td>${i < history.length - 1 ? priceChangeBadge(h.price, history[history.length - 2 - i]?.price) : '首日'}</td>
      </tr>
    `).join('');
    content.innerHTML = `
      <table class="history-table">
        <thead><tr><th>日期</th><th>售價</th><th>實呎價</th><th>變化</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (err) {
    document.getElementById("historyContent").innerHTML = `<div class="no-data">載入失敗：${err.message}</div>`;
  }
}

// 市場溫度卡:在售量 / 月成交 / 消化率 → 買家定賣家市場
async function loadMarketTemp(estateId) {
  const card = document.getElementById('market-temp-card');
  if (!card) return;
  try {
    const t = await api(`/api/estates/${estateId}/market-temp`);
    const months = t.txn_30d > 0 ? (t.active_listings / t.txn_30d) : null;
    let verdict, color;
    if (months == null || months > 12) { verdict = '極淡 · 買家話事'; color = 'var(--up)'; }
    else if (months > 6) { verdict = '偏淡 · 買家有利'; color = 'var(--up)'; }
    else if (months > 3) { verdict = '均衡'; color = 'var(--muted)'; }
    else { verdict = '偏熱 · 賣家有利'; color = 'var(--down)'; }
    card.innerHTML = `<div class="stat-label">市場溫度</div>
      <div style="margin-top:0.35rem"><span class="stat-value" style="font-size:1.1rem">${t.txn_30d}</span><span class="stat-unit"> 宗/30日</span> <span style="font-size:0.75rem;color:var(--muted)">(90日 ${t.txn_90d} 宗)</span></div>
      <div style="margin-top:0.25rem;font-size:0.8rem;color:var(--muted)">在售 ${t.active_listings} 個${months != null ? ` · 約 ${months.toFixed(0)} 個月去貨` : ''}</div>
      <div style="margin-top:0.25rem;font-size:0.8rem;font-weight:600;color:${color}">${verdict}</div>`;
  } catch (_) { card.innerHTML = `<div class="stat-label">市場溫度</div><div style="margin-top:0.35rem;font-size:0.8rem;color:var(--muted)">載入失敗</div>`; }
}

// 類近成交:一條線(座+室)嘅歷史成交,實際樓層清楚列出俾用戶對返個 band
async function openLineHistory(building, unit, floorBand) {
  document.getElementById('comp-modal-title').textContent = `${building} ${unit} · 類近成交`;
  document.getElementById('comp-modal-body').innerHTML = '<div class="loading"><div class="spinner"></div> 載入中…</div>';
  document.getElementById('compModalOverlay').style.display = 'flex';
  try {
    let { history } = await api(`/api/estates/${activeEstateId}/line-history?building=${encodeURIComponent(building)}&unit=${encodeURIComponent(unit)}`);
    // Same deal can exist from both centanet and ricacorp — dedupe, preferring
    // the row that carries held/gain info.
    const byDeal = new Map();
    for (const h of history) {
      const k = `${String(h.floor||'').replace(/\D/g,'')}|${h.reg_date}|${h.price}`;
      if (!byDeal.has(k) || (h.gain_pct != null && byDeal.get(k).gain_pct == null)) byDeal.set(k, h);
    }
    history = [...byDeal.values()];
    if (!history.length) {
      document.getElementById('comp-modal-body').innerHTML = '<div style="color:var(--muted);font-size:0.85rem;padding:0.5rem 0">呢條線暫無成交記錄(系統只有近年數據)。</div>';
      return;
    }
    const rows = history.map(h => {
      const held = h.held_days ? (h.held_days / 365).toFixed(1) + '年' : '';
      const gain = h.gain_pct != null ? `<span class="${h.gain_pct >= 0 ? 'gain-pos' : 'gain-neg'}">${h.gain_pct >= 0 ? '▲' : '▼'}${Math.abs(h.gain_pct).toFixed(0)}%</span>` : '';
      return `<tr style="border-top:1px solid var(--border)">
        <td style="padding:0.35rem 0.4rem 0.35rem 0;color:var(--text)">${escHtml(String(h.floor||'?'))}</td>
        <td style="text-align:right;padding:0.35rem 0.4rem;white-space:nowrap">$${(h.price/1e4).toFixed(0)}萬</td>
        <td style="text-align:right;padding:0.35rem 0.4rem;color:var(--muted);white-space:nowrap">${h.price_per_ft ? '@$'+Math.round(h.price_per_ft).toLocaleString() : '-'}</td>
        <td style="text-align:right;padding:0.35rem 0.4rem;white-space:nowrap;color:var(--muted);font-size:0.75rem">${h.reg_date || '-'}</td>
        <td style="text-align:right;padding:0.35rem 0 0.35rem 0.4rem;white-space:nowrap;font-size:0.75rem">${held} ${gain}</td>
      </tr>`;
    }).join('');
    document.getElementById('comp-modal-body').innerHTML = `
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:0.5rem">同座同室各層真實成交(放盤樓層顯示為「${escHtml(floorBand||'?')}」,自行對照)。持貨短/蝕讓 = 議價空間大。</div>
      <table style="width:100%;border-collapse:collapse;font-size:0.82rem">
        <thead><tr style="text-align:left;color:var(--muted);font-size:0.75rem"><th style="padding:0.3rem 0.4rem 0.3rem 0">樓層</th><th style="text-align:right">成交</th><th style="text-align:right">實呎價</th><th style="text-align:right">登記日</th><th style="text-align:right">持有/賺蝕</th></tr></thead>
        <tbody>${rows}</tbody></table>`;
  } catch (e) {
    document.getElementById('comp-modal-body').innerHTML = `<div style="color:var(--down)">載入失敗:${escHtml(e.message)}</div>`;
  }
}

function priceChangeBadge(price, prevPrice) {
  if (!prevPrice || !price) return '';
  const diff = price - prevPrice;
  const pct = (diff / prevPrice * 100).toFixed(1);
  if (Math.abs(pct) < 0.1) return '<span class="price-change-flat">持平</span>';
  const diffWan = (Math.abs(diff) / 1e4).toFixed(0);
  if (diff > 0) return `<span class="price-change-up">+${diffWan}萬 (+${pct}%)</span>`;
  return `<span class="price-change-down">-${diffWan}萬 (-${Math.abs(pct)}%)</span>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// 插入 onclick='fn("…")' 呢類 inline JS 字串參數用：escHtml 唔會 escape 單引號，
// 一定要行埋呢個，否則一個 ' 就爆得出嚟注入 JS
function escJsAttr(s) {
  return escHtml(String(s ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"));
}

// href 一定要行呢個：escHtml 擋唔到 javascript: URL，只准 http(s)
function safeUrl(u) {
  const s = String(u || '');
  return /^https?:\/\//i.test(s) ? escHtml(s) : '#';
}

// img src 用：准 http(s) 同 data:image（用戶上載嘅相係 data URL）
function safeImgSrc(u) {
  const s = String(u || '');
  return (/^https?:\/\//i.test(s) || /^data:image\//i.test(s)) ? escHtml(s) : '';
}

// Init
if (getToken()) {
  hideLoginScreen();
  loadEstates();
  loadNotesOptions();
  checkFirstLoginPrefs();
} else {
  showLoginScreen();
}
</script>
